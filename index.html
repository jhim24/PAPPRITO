<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu</title>

<style>
body {
    background: #0f0f0f;
    color: white;
    font-family: Arial;
    padding: 20px;
}

/* CATEGORY BOX */
.category {
    background: #111;
    border: 3px solid #ffcc00;
    border-radius: 15px;
    margin-bottom: 20px;
    padding: 15px;
    box-shadow: 0 0 15px red;
}

.category h2 {
    color: #ff3b3b;
    margin-bottom: 10px;
}

/* ITEM */
.item {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
}

.item:hover {
    background: rgba(255,255,255,0.1);
}

.price {
    color: #ffcc00;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: #111;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
    box-shadow: 0 0 20px red;
}

.close {
    color: red;
    float: right;
    cursor: pointer;
    font-size: 20px;
}

.modal-title {
    font-size: 20px;
    margin-top: 10px;
}

.modal-price {
    color: #ffcc00;
    font-size: 18px;
}
</style>
</head>

<body>

<h1 style="color:#ffcc00;">🔥 Restaurant Menu</h1>

<div id="menu"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">&times;</span>
        <div class="modal-title" id="title"></div>
        <div class="modal-price" id="price"></div>
    </div>
</div>

<script>

/* MENU DATA */
const menuData = {
    "BEEF": [
        ["Bulalo Grupo", 710],
        ["Bulalo Solo", 185],
        ["Bistek Tagalog", 279]
    ],
    "PORK": [
        ["Lechon Kawali", 395],
        ["Pork Sisig", 315],
        ["Lumpiang Shanghai", 235]
    ],
    "CHICKEN": [
        ["PapsChicken Platter", 315],
        ["Chicken Sisig", 295]
    ],
    "SEAFOOD": [
        ["Crispy Bangusarap", 315],
        ["Calamares", 305],
        ["Crispy Tawilis", 285]
    ],
    "VEGGIES": [
        ["Chop Suey", 235],
        ["Tortang Talong", 192]
    ],
    "NOODLES": [
        ["Canton-Bihon", 278],
        ["Palabok", 195],
        ["Beef Mami", 159],
        ["Chicken Mami", 149]
    ],
    "SIDES": [
        ["PapShots", 72],
        ["Spicy Tofu", 65],
        ["Bola Bola Soup", 68],
        ["Lumpiang Shanghai (3pcs)", 49],
        ["Fried Banana (4pcs)", 35],
        ["Garlic Rice", 46],
        ["Plain Rice", 32]
    ],
    "SWEETS & DRINKS": [
        ["Special Turon", 95],
        ["Leche Flan", 82],
        ["Coffee Jelly", 75],
        ["Softdrinks", 52],
        ["Softdrinks 1.5L", 145],
        ["Iced Tea", 52],
        ["Black Gulaman", 52],
        ["Pineapple Juice", 62],
        ["Calamansi Juice", 62],
        ["Iced Coffee", 59],
        ["Iced Mocha", 69],
        ["Coffee", 59],
        ["Hot Choco", 55],
        ["Water", 35]
    ],
    "BEERS": [
        ["San Mig Light", 95],
        ["San Miguel Pale Pilsen", 95],
        ["San Miguel Flavored", 95],
        ["Red Horse", 105]
    ]
};

/* RENDER MENU */
const menuContainer = document.getElementById("menu");

for (let category in menuData) {
    let box = document.createElement("div");
    box.className = "category";

    let title = document.createElement("h2");
    title.innerText = category;
    box.appendChild(title);

    menuData[category].forEach(item => {
        let div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<span>${item[0]}</span><span class="price">₱${item[1]}</span>`;
        
        div.onclick = () => openModal(item[0], item[1]);

        box.appendChild(div);
    });

    menuContainer.appendChild(box);
}

/* MODAL */
function openModal(name, price) {
    document.getElementById("title").innerText = name;
    document.getElementById("price").innerText = "₱" + price;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
