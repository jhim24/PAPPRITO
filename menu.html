<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAPPRITO MENU</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#111;
    color:white;
    overflow-x:hidden;
}

/* HEADER */
.header{
    background:#d71920;
    color:white;
    padding:12px;
    display:flex;
    align-items:center;
    gap:10px;
    position:sticky;
    top:0;
    z-index:999;
}

.back-btn{
    background:#ffcc00;
    border:none;
    padding:8px 14px;
    cursor:pointer;
    font-weight:bold;
    border-radius:8px;
}

#cartIcon{
    margin-left:auto;
    background:#ffcc00;
    color:black;
    padding:8px 14px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:140px;
    background:#d71920;
    color:white;
    padding:12px;
    overflow-y:auto;
}

.sidebar h3{
    font-size:14px;
    margin-bottom:12px;
    text-align:center;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    padding:10px;
    cursor:pointer;
    font-size:13px;
    border-radius:8px;
    margin-bottom:5px;
    transition:0.3s;
}

.sidebar li:hover{
    background:#ffcc00;
    color:black;
}

/* PRODUCTS */
.products{
    flex:1;
    padding:15px;

    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

/* CARD */
.card{
    background:#1a1a1a;
    border-radius:18px;
    overflow:hidden;
    border:2px solid #ffcc00;
    box-shadow:0 6px 18px rgba(0,0,0,0.4);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

/* IMAGE */
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
    cursor:pointer;
}

/* INFO */
.card-info{
    text-align:center;
}

.card-info h4{
    background:#ffcc00;
    color:black;
    padding:10px;
    font-size:15px;
    font-weight:bold;
}

.card-info p{
    background:#d71920;
    color:white;
    padding:10px;
    font-size:14px;
    font-weight:bold;
}

/* CART BUTTON */
.cart-btn{
    width:90%;
    margin:12px auto 15px;
    display:block;

    background:linear-gradient(45deg,#ffcc00,#ff3b3b);
    color:white;

    border:none;
    padding:10px;

    border-radius:30px;

    font-weight:bold;
    cursor:pointer;

    transition:0.3s;
}

.cart-btn:hover{
    transform:scale(1.05);

    box-shadow:
    0 0 10px #ffcc00,
    0 0 20px #ff0000;
}

/* ZOOM */
.zoom-modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.zoom-modal img{
    max-width:95%;
    max-height:90%;
    border-radius:12px;
}

.zoom-close{
    position:absolute;
    top:20px;
    right:20px;
    color:white;
    font-size:30px;
    cursor:pointer;
}

/* CART MODAL */
.cart-modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);

    justify-content:center;
    align-items:center;

    z-index:999999;
}

.cart-content{
    background:#1a1a1a;
    width:90%;
    max-width:420px;

    padding:20px;

    border-radius:15px;

    max-height:80vh;
    overflow-y:auto;
}

.cart-content h2{
    margin-bottom:15px;
    text-align:center;
}

.cart-item{
    padding:12px 0;
    border-bottom:1px solid #333;
}

.checkout-btn{
    display:block;

    margin-top:20px;

    background:#0084ff;
    color:white;

    text-align:center;

    padding:12px;

    border-radius:30px;

    text-decoration:none;

    font-weight:bold;
}

.close-cart{
    margin-top:10px;

    width:100%;

    padding:10px;

    background:#ff3b3b;

    border:none;

    color:white;

    border-radius:30px;

    cursor:pointer;
}

.remove-btn{
    background:#ff3b3b;
    border:none;
    color:white;
    padding:5px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
}
/* FLOATING CART */

#floatingCart{

position:fixed;

bottom:15px;

left:50%;

transform:translateX(-50%);

width:95%;

max-width:500px;

background:
linear-gradient(
45deg,
#ffcc00,
#ff3b3b
);

padding:15px 20px;

border-radius:20px;

display:flex;

justify-content:space-between;

align-items:center;

z-index:999999;

box-shadow:
0 10px 25px rgba(0,0,0,0.4);

}

#floatingCart button{

background:white;

color:black;

border:none;

padding:10px 18px;

border-radius:12px;

font-weight:bold;

cursor:pointer;

}
/* MOBILE */
@media(max-width:768px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
    overflow-x:auto;
}

.sidebar ul{
    display:flex;
    gap:8px;
}

.sidebar li{
    white-space:nowrap;
}

.products{
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.card img{
    height:180px;
}

.card-info h4{
    font-size:13px;
}

.card-info p{
    font-size:12px;
}

}
</style>
</head>

<body>

← Back

<!-- PRODUCTS -->
<div class="products" id="products"></div>

</div>

<!-- ZOOM -->
<div id="zoomModal" class="zoom-modal" onclick="closeZoom()">

<span class="zoom-close">✖</span>

<img id="zoomImg">

</div>
<!-- FLOATING CART BAR -->

<div id="floatingCart">

<div>

🛒
<span id="floatingCount">
0
</span>
items

</div>

<div id="floatingTotal">
₱0
</div>

<button onclick="openCart()">

View Cart

</button>

</div>
<!-- CART MODAL -->
<div id="cartModal" class="cart-modal">

<div class="cart-content">

<h2>
🛒 Your Cart
</h2>

<div id="cartItems"></div>

<h3 id="cartTotal">
Total: ₱0
</h3>

<input
type="text"
id="customerName"
placeholder="Customer Name"
style="
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#222;
color:white;
">

<input
type="text"
id="customerPhone"
placeholder="Phone Number"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#222;

">

<input
type="text"
id="tableNumber"
placeholder="Table Number"
style="
width:100%;
padding:12px;
margin-top:10px;

border-radius:10px;
background:#222;
color:white;
">

<textarea
id="customerAddress"
placeholder="Address"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#222;
color:white;
resize:none;
height:80px;
"></textarea>

<textarea
id="customerNotes"
placeholder="Order Notes (Optional)"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#222;
color:white;
resize:none;
height:70px;
"></textarea>

<select
id="orderType"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#222;
color:white;
">

<option value="DINE IN">
🍽 DINE IN
</option>

<option value="TAKE OUT">
🥡 TAKE OUT
</option>

<option value="DELIVERY">
🚚 DELIVERY
</option>

</select>

<select
id="paymentMethod"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#222;
color:white;
">

<option value="CASH">
💵 CASH
</option>

<option value="GCASH">
📱 GCASH
</option>

<option value="MAYA">
💳 MAYA
</option>

<option value="CARD">
🏦 CARD
</option>

</select>

<a href="#"
onclick="sendOrder()"
class="checkout-btn">

📩 PLACE ORDER

</a>

<button class="close-cart"
onclick="closeCart()">

Close

</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain: "papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId: "papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId: "831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const data = {

beef:[
{name:"Bulalo Grupo",price:"₱710",img:"bulalogroup.jpg"},
{name:"Bulalo Solo",price:"₱185",img:"bulalo.jpg"},
{name:"Bistek Tagalog",price:"₱279",img:"bistek.jpg"}
],

pork:[

{name:"Coming Soon",price:"Soon",img:"no-image.jpg"}
],

chicken:[

{name:"Chicken Sisig",price:"₱295",img:"chicken-sisig.jpg"}
],

seafood:[
{name:"Crispy Bangusarap",price:"₱315",img:"bangus.jpg"},
{name:"Calamares",price:"₱305",img:"calamares.jpg"},
{name:"Crispy Tawilis",price:"₱285",img:"tawilis.jpg"}
],

veggies:[
{name:"Chop Suey",price:"₱235",img:"chopsuey.jpg"},
{name:"Tortang Talong",price:"₱192",img:"talong.jpg"},
{name:"Coming Soon",price:"Soon",img:"no-image.jpg"},
{name:"Coming Soon",price:"Soon",img:"no-image.jpg"}
],

noodles:[
{name:"Canton-Bihon",price:"₱278",img:"canton.jpg"},
{name:"Palabok",price:"₱195",img:"palabok.jpg"},
{name:"Beef Mami",price:"₱159",img:"mami.jpg"},
{name:"Chicken Mami",price:"₱149",img:"mami2.jpg"}
],

sides:[
{name:"PapShots",price:"₱72",img:"restaurant-hero.jpg"},
{name:"Spicy Tofu",price:"₱65",img:"tofu.jpg"},
{name:"Bola Bola Soup",price:"₱68",img:"soup.jpg"},
{name:"Lumpiang Shanghai",price:"₱49",img:"lumpia.jpg"},
{name:"Fried Banana",price:"₱35",img:"banana.jpg"},
{name:"Garlic Rice",price:"₱46",img:"rice.jpg"},
{name:"Plain Rice",price:"₱32",img:"rice.jpg"}
],

drinks:[
{name:"Softdrinks",price:"₱52",img:"drinks.jpg"},
{name:"1.5L Softdrinks",price:"₱145",img:"drinks.jpg"},
{name:"Iced Tea",price:"₱52",img:"icedtea.jpg"},
{name:"Black Gulaman",price:"₱52",img:"gulaman.jpg"},
{name:"Pineapple Juice",price:"₱62",img:"juice.jpg"},
{name:"Calamansi Juice",price:"₱62",img:"juice.jpg"},
{name:"Iced Coffee",price:"₱59",img:"coffee.jpg"},
{name:"Hot Choco",price:"₱55",img:"choco.jpg"},
{name:"Water",price:"₱35",img:"water.jpg"}
],

beers:[
{name:"San Mig Light",price:"₱95",img:"sanmig-light.jpg"},
{name:"San Miguel Pale",price:"₱95",img:"sanmig-pale.jpg"},
{name:"San Miguel Flavored",price:"₱95",img:"sanmig-flavored.jpg"},
{name:"Red Horse",price:"₱105",img:"redhorse.jpg"}
]

};

/* SHOW CATEGORY */
function show(cat){

const container =
document.getElementById("products");

container.innerHTML = "";

data[cat].forEach(item=>{

container.innerHTML += `

<div class="card">

<img src="${item.img}"
onclick="openZoom('${item.img}')">

<div class="card-info">

<h4>${item.name}</h4>

<p>${item.price}</p>

<button class="cart-btn"
onclick="addToCart(
'${item.name}',
'${item.price}'
)">

🛒 Add to Cart

</button>

</div>

</div>

`;

});

}

/* ZOOM */
function openZoom(img){

document.getElementById("zoomModal")
.style.display="flex";

document.getElementById("zoomImg")
.src = img;

}

function closeZoom(){

document.getElementById("zoomModal")
.style.display="none";

}

/* CART */
let cart = [];

/* ADD */
function addToCart(name,price){

const cleanPrice =
parseInt(price.replace(/[₱,]/g,"")) || 0;

const existing =
cart.find(item=>item.name === name);

if(existing){

existing.qty += 1;

}else{

cart.push({
name:name,
price:cleanPrice,
qty:1
});

}

updateCart();

alert(name + " added to cart!");

}
/* INCREASE */

function increaseQty(name){

const item =
cart.find(
i => i.name === name
);

if(item){

item.qty++;

}

updateCart();

}

/* DECREASE */

function decreaseQty(name){

const item =
cart.find(
i => i.name === name
);

if(item){

item.qty--;

if(item.qty <= 0){

cart = cart.filter(
i => i.name !== name
);

}

}

updateCart();

}
/* REMOVE */
function removeItem(name){

cart = cart.filter(item=>item.name !== name);

updateCart();

}

/* UPDATE */
function updateCart(){

document.getElementById("cartCount")
.innerText = cart.length;

const items =
document.getElementById("cartItems");

items.innerHTML = "";

let total = 0;

cart.forEach(item=>{

total += item.price * item.qty;

items.innerHTML += `

<div class="cart-item">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
">

<div>

${item.name}

<br><br>

<div style="
display:flex;
align-items:center;
gap:10px;
">

<button
onclick="decreaseQty('${item.name}')"
style="
width:30px;
height:30px;
border:none;
border-radius:50%;
background:#ff3b3b;
color:white;
cursor:pointer;
">

−

</button>

<span>

${item.qty}

</span>

<button
onclick="increaseQty('${item.name}')"
style="
width:30px;
height:30px;
border:none;
border-radius:50%;
background:#22c55e;
color:white;
cursor:pointer;
">

+

</button>

</div>

</div>

<div>

₱${item.price * item.qty}

</div>

<button
class="remove-btn"
onclick="removeItem('${item.name}')">

✖

</button>

</div>

</div>

`;

});

document.getElementById("cartTotal")
.innerText = "Total: ₱" + total;
document.getElementById(
"floatingCount"
).innerText = cart.length;

document.getElementById(
"floatingTotal"
).innerText = "₱" + total;
}

/* OPEN CART */
document.getElementById("cartIcon")
.addEventListener("click",()=>{

document.getElementById("cartModal")
.style.display="flex";

});
function openCart(){

document.getElementById(
"cartModal"
).style.display = "flex";

}
/* CLOSE CART */
function closeCart(){

document.getElementById("cartModal")
.style.display="none";

}

/* SEND ORDER */
function sendOrder(){

if(cart.length === 0){

alert("Cart is empty!");

return;

}

const customer =
document.getElementById("customerName").value;

if(customer === ""){

alert("Enter customer name");

return;

}

const phone =
document.getElementById("customerPhone").value;

if(phone === ""){

alert("Enter phone number");

return;

}

let total = 0;

cart.forEach(item=>{

total += item.price * item.qty;

});

const order = {

orderNumber:
"PAP-" + Date.now(),

customer:
document.getElementById("customerName").value,

phone:
document.getElementById("customerPhone").value,

address:
document.getElementById("customerAddress").value,

notes:
document.getElementById("customerNotes").value,

table:
document.getElementById("tableNumber").value,

payment:
document.getElementById("paymentMethod").value,

orderType:
document.getElementById("orderType").value,

items: cart,

total: total,

status: "NEW",

createdAt:
new Date().toISOString()

};

/* SAVE TO FIREBASE */
firebase.database()
.ref("orders")
.push(order)
.then(()=>{

window.location.href =

"track.html?order=" +

order.orderNumber;

});

cart = [];

updateCart();

closeCart();

}

/* DEFAULT */
show('beef');
/* TRACK MODAL */

function openTrackModal(){

document.getElementById(
"trackModal"
).style.display = "flex";

}

function closeTrackModal(){

document.getElementById(
"trackModal"
).style.display = "none";

}

/* GO TRACK */

function goTrackOrder(){

const orderNumber =
document.getElementById(
"trackOrderInput"
).value;

if(orderNumber === ""){

alert("Enter order number");

return;

}

window.location.href =

"track.html?order=" +

orderNumber;

}
</script>
<!-- TRACK MODAL -->

<div id="trackModal"
class="cart-modal">

<div class="cart-content">

<h2>
📦 Track Your Order
</h2>

<input
type="text"
id="trackOrderInput"
placeholder="Enter Order Number"
style="
width:100%;

border-radius:10px;
background:#222;

margin-top:10px;
">

<button
onclick="goTrackOrder()"
class="checkout-btn"
style="border:none;cursor:pointer;">

TRACK ORDER

</button>

<button
class="close-cart"
onclick="closeTrackModal()">

Close

</button>

</div>

</div>
</body>
