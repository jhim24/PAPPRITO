<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie POS</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    display: flex;
    background: #0d0d0d;
    color: white;
}

/* SIDEBAR MAIN */
.sidebar {
    width: 220px;
    background: #111;
    height: 100vh;
    padding: 20px;
}

.sidebar li {
    padding: 10px;
    cursor: pointer;
    border-radius: 8px;
    margin-bottom: 10px;
}

.sidebar li:hover {
    background: linear-gradient(45deg, red, yellow);
    color: black;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
}

/* CATEGORY SIDEBAR */
.category-bar {
    width: 180px;
    background: #1a1a1a;
    padding: 10px;
}

.category {
    padding: 10px;
    margin-bottom: 8px;
    background: #111;
    border-radius: 8px;
    cursor: pointer;
}

.category:hover {
    background: linear-gradient(45deg, red, yellow);
    color: black;
}

/* PRODUCTS */
.products {
    flex: 1;
    padding: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

/* PRODUCT CARD */
.card {
    width: 160px;
    background: #111;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255,0,0,0.3);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.name {
    background: #ffcc00;
    color: black;
    text-align: center;
    padding: 5px;
    font-weight: bold;
}

.price {
    background: #ff3b3b;
    text-align: center;
    padding: 5px;
}

/* PREVIEW PANEL */
.preview {
    width: 250px;
    background: #111;
    padding: 15px;
    border-left: 2px solid #ffcc00;
}

.preview img {
    width: 100%;
    border-radius: 10px;
}

.preview h3 {
    margin-top: 10px;
    color: #ffcc00;
}

.preview p {
    color: #ff3b3b;
    font-size: 18px;
}

</style>
</head>

<body>

<!-- MAIN SIDEBAR -->
<div class="sidebar">
    <h2 style="color:red;">🔥 Foodie</h2>
    <ul>
        <li onclick="loadMenu()">Menu</li>
    </ul>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <!-- CATEGORY -->
    <div class="category-bar" id="categories"></div>

    <!-- PRODUCTS -->
    <div class="products" id="products"></div>

    <!-- PREVIEW -->
    <div class="preview">
        <h3>Preview</h3>
        <img id="pimg" src="">
        <h3 id="pname">Select product</h3>
        <p id="pprice"></p>
    </div>

</div>

<script>

/* MENU DATA WITH IMAGE */
const menu = {
    "BEEF": [
        ["Bulalo Grupo",710,"https://images.unsplash.com/photo-1604908176997-431c4ed5b8c0"],
        ["Bulalo Solo",185,"https://images.unsplash.com/photo-1604908176997-431c4ed5b8c0"],
        ["Bistek Tagalog",279,"https://images.unsplash.com/photo-1555939594-58d7cb561ad1"]
    ],
    "PORK": [
        ["Lechon Kawali",395,"https://images.unsplash.com/photo-1555939594-58d7cb561ad1"],
        ["Pork Sisig",315,"https://images.unsplash.com/photo-1546069901-ba9599a7e63c"]
    ],
    "CHICKEN": [
        ["Chicken Platter",315,"https://images.unsplash.com/photo-1604908176997-431c4ed5b8c0"]
    ],
    "SEAFOOD": [
        ["Calamares",305,"https://images.unsplash.com/photo-1555939594-58d7cb561ad1"]
    ]
};

/* LOAD MENU */
function loadMenu() {
    const catDiv = document.getElementById("categories");
    catDiv.innerHTML = "";

    for (let cat in menu) {
        let div = document.createElement("div");
        div.className = "category";
        div.innerText = cat;

        div.onclick = () => showProducts(cat);

        catDiv.appendChild(div);
    }
}

/* SHOW PRODUCTS */
function showProducts(cat) {
    const prodDiv = document.getElementById("products");
    prodDiv.innerHTML = "";

    menu[cat].forEach(item => {
        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${item[2]}">
            <div class="name">${item[0]}</div>
            <div class="price">₱${item[1]}</div>
        `;

        card.onclick = () => preview(item);

        prodDiv.appendChild(card);
    });
}

/* PREVIEW */
function preview(item) {
    document.getElementById("pimg").src = item[2];
    document.getElementById("pname").innerText = item[0];
    document.getElementById("pprice").innerText = "₱" + item[1];
}

/* INIT */
loadMenu();

</script>

</body>
</html>
