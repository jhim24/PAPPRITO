<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PAPPRITO SALES</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.header h1{
font-size:35px;
}

.back-btn{
background:#ffcc00;
color:black;
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
padding:25px;
border-radius:20px;
}

.sales{
background:
linear-gradient(
135deg,
#ff4d6d,
#c9184a
);
}

.orders{
background:
linear-gradient(
135deg,
#1e90ff,
#2563eb
);
}

.completed{
background:
linear-gradient(
135deg,
#10b981,
#059669
);
}

.profit{
background:
linear-gradient(
135deg,
#8b5cf6,
#6d28d9
);
}

.card h3{
font-size:15px;
margin-bottom:10px;
}

.card p{
font-size:35px;
font-weight:bold;
}

/* TABLE */

.table-box{
background:#111827;
padding:20px;
border-radius:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
margin-top:20px;
}

th{
background:#1e293b;
color:#ffcc00;
padding:12px;
font-size:12px;
border:1px solid rgba(255,255,255,0.08);
}

td{
padding:10px;
font-size:12px;
border:1px solid rgba(255,255,255,0.05);
text-align:center;
}

/* STATUS */

.status{
padding:6px 12px;
border-radius:20px;
font-size:11px;
font-weight:bold;
display:inline-block;
}

.delivered{
background:#10b981;
}

.pending{
background:#f59e0b;
}

/* MOBILE */

@media(max-width:768px){

.header h1{
font-size:26px;
}

.cards{
display:flex;
overflow-x:auto;
gap:10px;
}

.card{
min-width:220px;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<h1>
💰 Sales Report
</h1>

<button
class="back-btn"
onclick="history.back()">

← Back

</button>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card sales">

<h3>Total Sales</h3>

<p id="totalSales">
₱0
</p>

</div>

<div class="card orders">

<h3>Total Orders</h3>

<p id="totalOrders">
0
</p>

</div>

<div class="card completed">

<h3>Completed Orders</h3>

<p id="completedOrders">
0
</p>

</div>

<div class="card profit">

<h3>Gross Profit</h3>

<p id="grossProfit">
₱0
</p>

</div>

</div>

<!-- TABLE -->

<div class="table-box">

<h2>
📦 Sales Transactions
</h2>

<table>

<thead>

<tr>

<th>TRACKING #</th>
<th>CUSTOMER</th>
<th>PHONE</th>
<th>TYPE</th>
<th>PAYMENT</th>
<th>REFERENCE</th>
<th>PRODUCT</th>
<th>QTY</th>
<th>AMOUNT</th>
<th>STATUS</th>
<th>DATE</th>

</tr>

</thead>

<tbody id="salesTable">

</tbody>

</table>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey:
"AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain:
"papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId:
"papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId:
"831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

/* MONEY */

function peso(num){

return "₱" +

Number(num || 0)
.toLocaleString();

}

const salesTable =
document.getElementById(
"salesTable"
);

/* LOAD SALES */

firebase.database()
.ref("orders")
.on("value", snapshot=>{

salesTable.innerHTML = "";

let totalSales = 0;
let totalOrders = 0;
let completedOrders = 0;
let grossProfit = 0;

snapshot.forEach(child=>{

const order = child.val();

totalOrders++;

if(
(order.status || '')
.toUpperCase()
=== 'DELIVERED'
){
completedOrders++;
}

(order.items || [])
.forEach(item=>{

const amount =

Number(item.price || 0)

*

Number(item.qty || 1);

totalSales += amount;

grossProfit += amount;

salesTable.innerHTML += `

<tr>

<td>
${order.trackingnumber || '-'}
</td>

<td>
${order.customer || '-'}
</td>

<td>
${order.phone || '-'}
</td>

<td>
${order.orderType || '-'}
</td>

<td>
${order.payment || '-'}
</td>

<td>

${order.payment !== 'CASH'
? (order.reference || '-')
: '-'}

</td>

<td>
${item.name || '-'}
</td>

<td>
${item.qty || 1}
</td>

<td>
${peso(amount)}
</td>

<td>

<span class="status ${

(order.status || '')
.toUpperCase() === 'DELIVERED'

? 'delivered'

: 'pending'

}">

${order.status || 'NEW'}

</span>

</td>

<td>

${new Date(
order.timestamp || Date.now()
).toLocaleString()}

</td>

</tr>

`;

});

});

document.getElementById(
"totalSales"
).innerText =
peso(totalSales);

document.getElementById(
"totalOrders"
).innerText =
totalOrders;

document.getElementById(
"completedOrders"
).innerText =
completedOrders;

document.getElementById(
"grossProfit"
).innerText =
peso(grossProfit);

});

</script>

</body>
</html>
