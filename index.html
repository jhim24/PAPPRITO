<!DOCTYPE html>
<html>
<head>
<title>Rapsilog Promo</title>

<style>
body{
    margin:0;
    overflow:hidden;
}

/* BACKGROUND IMAGE */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    animation: zoom 8s infinite alternate;
}

/* ZOOM EFFECT */
@keyframes zoom{
    0%{ transform:scale(1); }
    100%{ transform:scale(1.1); }
}

/* DARK OVERLAY */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.2);
}

/* TEXT GLOW */
.text{
    position:absolute;
    top:100px;
    width:100%;
    text-align:center;
    color:#fff;
    font-size:60px;
    font-weight:bold;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px red; }
    to{ text-shadow:0 0 30px yellow; }
}
</style>

</head>

<body>

<img src="rapsilog.jpg" class="bg">

<div class="overlay"></div>

<div class="text">Pappprito Promo</div>

</body>
</html>
