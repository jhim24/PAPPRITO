<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie Red Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    background: #0f0f0f;
    color: #fff;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #111;
    padding: 20px;
}

.sidebar h2 {
    color: #ff3b3b;
    margin-bottom: 30px;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.sidebar ul li:hover,
.active {
    background: linear-gradient(45deg, #ff0000, #ffcc00);
    color: black;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.search {
    padding: 8px;
    border-radius: 20px;
    border: none;
    width: 200px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    padding: 15px;
    border-radius: 15px;
    color: #000;
    font-weight: bold;
}

.red { background: #ff3b3b; }
.yellow { background: #ffcc00; }
.orange { background: #ff6b00; }
.light { background: #ffd966; }

/* CHART */
.chart {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    height: 200px;
    margin-bottom: 30px;
}

.bar {
    width: 30px;
    background: #444;
    border-radius: 5px;
}

.bar.active {
    background: #ffcc00;
}

/* FOOD CARDS */
.food-section {
    margin-top: 20px;
}

.food-container {
    display: flex;
    gap: 15px;
}

.food-card {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 15px;
    width: 200px;
}

.food-card img {
    width: 100%;
    border-radius: 10px;
}

.food-title {
    margin-top: 10px;
    font-weight: bold;
}

.price {
    color: #ffcc00;
}

/* GLOW EFFECT */
.card, .food-card {
    box-shadow: 0 0 10px rgba(255,0,0,0.3);
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🔥 Foodie</h2>
    <ul>
        <li class="active">Dashboard</li>
        <li>Menu</li>
        <li>Orders</li>
        <li>Analytics</li>
        <li>Settings</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h2>Welcome, Chef 👨‍🍳</h2>
        <input class="search" placeholder="Search...">
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card red">$11,256<br>Revenue</div>
        <div class="card yellow">245<br>Orders</div>
        <div class="card orange">$6,556<br>Expenses</div>
        <div class="card light">$4,227<br>Profit</div>
    </div>

    <!-- CHART -->
    <div class="chart">
        <div class="bar" style="height:120px;"></div>
        <div class="bar" style="height:160px;"></div>
        <div class="bar" style="height:140px;"></div>
        <div class="bar active" style="height:180px;"></div>
        <div class="bar" style="height:150px;"></div>
        <div class="bar" style="height:130px;"></div>
    </div>

    <!-- FOOD -->
    <div class="food-section">
        <h3>🔥 Trending Orders</h3>

        <div class="food-container">

            <div class="food-card">
                <img src="https://images.unsplash.com/photo-1604908176997-431c4ed5b8c0">
                <div class="food-title">Chicken Meal</div>
                <div class="price">$5.99</div>
            </div>

            <div class="food-card">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
                <div class="food-title">Healthy Bowl</div>
                <div class="price">$6.50</div>
            </div>

            <div class="food-card">
                <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1">
                <div class="food-title">Rice Combo</div>
                <div class="price">$5.25</div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
