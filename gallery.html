<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - PAPPRITO</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    margin:0;
}

/* HEADER */
.header{
    background:#d71920;
    padding:15px;
    text-align:center;
}

.header a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

/* GALLERY */
.gallery{
    padding:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html">⬅ Back to Home</a>
    <h2>Gallery</h2>
</div>

<div class="gallery">

    <img src="spaghetti.jpg">
    <img src="bulalo.jpg">
    <img src="sisig.jpg">
    <img src="lechon.jpg">
    <img src="restaurant.jpg">
    <img src="customers.jpg">

</div>

</body>
</html>
