<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO Branches</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#111;
    color:white;
}

/* HEADER */
.header{
    background:#d71920;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* GRID */
.branches{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

/* CARD */
.card{
    background:#1a1a1a;
    border-radius:12px;
    padding:15px;
    text-align:center;
    border:2px solid #ffcc00;
}

.card h3{
    margin-bottom:10px;
    color:#ffcc00;
}

.card p{
    margin:5px 0;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:6px 12px;
    background:#d71920;
    color:white;
    text-decoration:none;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="header">OUR BRANCHES</div>

<div class="branches">

<div class="card">
<h3>Tagaytay</h3>
<p>Main Branch</p>
<p>📞 09123456789</p>
<a href="#" class="btn">View Map</a>
</div>

<div class="card">
<h3>Manila</h3>
<p>Branch</p>
<p>📞 09987654321</p>
<a href="#" class="btn">View Map</a>
</div>

<div class="card">
<h3>Cebu</h3>
<p>Branch</p>
<p>📞 09111111111</p>
<a href="#" class="btn">View Map</a>
</div>

</div>

</body>
</html>
