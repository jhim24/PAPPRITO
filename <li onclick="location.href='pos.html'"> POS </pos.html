<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PAPPRITO POS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#111827;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* LEFT */

.left{

flex:2;
padding:15px;
overflow:auto;

}

/* RIGHT */

.right{

width:350px;
background:#1f2937;
padding:15px;
display:flex;
flex-direction:column;

}

/* PRODUCTS */

.products{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;

}

.card{

background:#1f2937;
border-radius:15px;
overflow:hidden;
border:2px solid #ffcc00;
cursor:pointer;

}

.card img{

width:100%;
height:140px;
object-fit:cover;

}

.card h3{

padding:10px;
font-size:15px;

}

.card p{

padding:0 10px 10px;
color:#ffcc00;
font-weight:bold;

}

/* CART */

.cart-items{

flex:1;
overflow:auto;
margin-top:15px;

}

.cart-item{

padding:10px;
background:#111827;
margin-bottom:10px;
border-radius:10px;

}

.checkout{

margin-top:15px;

}

.checkout button{

width:100%;
padding:15px;
border:none;
background:#ffcc00;
font-size:18px;
font-weight:bold;
border-radius:15px;
cursor:pointer;

}

.total{

font-size:25px;
font-weight:bold;
margin-top:15px;

}

/* MOBILE */

@media(max-width:768px){

body{

flex-direction:column;

}

.right{

width:100%;
height:45vh;

}

.products{

grid-template-columns:repeat(2,1fr);

}

}

</style>

</head>

<body>

<!-- LEFT -->

<div class="left">

<h1>
🧾 POS SYSTEM
</h1>

<br>

<div
class="products"
id="products">

</div>

</div>

<!-- RIGHT -->

<div class="right">

<h2>
🛒 CART
</h2>

<div
class="cart-items"
id="cartItems">

</div>

<div class="total"
id="total">

₱0

</div>

<div class="checkout">

<button onclick="checkout()">

CHECKOUT

</button>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
