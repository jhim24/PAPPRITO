<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie Restaurant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    z-index:10;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:white;
}

.nav-links{
    display:flex;
    gap:30px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:14px;
    letter-spacing:1px;
}

.nav-links a:hover{
    color:#ffcc00;
}

.book-btn{
    background:#ffcc00;
    color:black;
    padding:10px 20px;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* HERO */
.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1542314831-068cd1dbfeeb') no-repeat center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

/* DARK OVERLAY */
.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
}

/* HERO CONTENT */
.hero-content{
    position:relative;
    color:white;
}

.hero-content h1{
    font-size:60px;
    letter-spacing:5px;
    margin-bottom:10px;
}

.hero-content p{
    font-size:18px;
    opacity:0.8;
}

/* SECTION */
.section{
    padding:60px;
    background:#111;
    color:white;
}

.section h2{
    margin-bottom:20px;
}

/* MENU GRID */
.menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.menu-card{
    background:#1a1a1a;
    border-radius:10px;
    overflow:hidden;
}

.menu-card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.menu-card h3{
    padding:10px;
    background:#ffcc00;
    color:black;
}

.menu-card p{
    padding:10px;
    color:#ff3b3b;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🍴 Foodie</div>

    <div class="nav-links">
        <a href="#">HOME</a>
        <a href="#">MENU</a>
        <a href="#">ABOUT</a>
        <a href="#">CONTACT</a>
    </div>

    <button class="book-btn">ORDER NOW</button>
</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>FOODIE RESTAURANT</h1>
        <p>Delicious Meals • Doha Qatar</p>
    </div>
</div>

<!-- MENU SECTION -->
<div class="section">
    <h2>🔥 Popular Dishes</h2>

    <div class="menu-grid">

        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1">
            <h3>Bulalo</h3>
            <p>₱710</p>
        </div>

        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
            <h3>Chicken Sisig</h3>
            <p>₱295</p>
        </div>

        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1604908176997-431c4ed5b8c0">
            <h3>Lechon Kawali</h3>
            <p>₱395</p>
        </div>

    </div>
</div>

</body>
</html>
