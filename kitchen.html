<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Kitchen Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

h1{
margin-bottom:20px;
font-size:32px;
}

/* ORDERS GRID */

.orders{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(350px,1fr));

gap:20px;

}

/* CARD */

.order-card{

background:#111827;

padding:20px;

border-radius:20px;

border-left:8px solid orange;

box-shadow:
0 10px 25px rgba(0,0,0,0.3);

}

/* HEADER */

.order-card h2{

margin-bottom:15px;

font-size:22px;

color:#ffcc00;

}

/* DETAILS */

.order-card p{

margin-bottom:8px;

color:#ddd;

font-size:14px;

}

/* STATUS */

.status{

margin-top:10px;

margin-bottom:15px;

font-weight:bold;

font-size:14px;

padding:8px 12px;

border-radius:10px;

display:inline-block;

}

.new{
background:#f59e0b;
color:white;
}

.preparing{
background:#22c55e;
color:white;
}

.ready{
background:#3b82f6;
color:white;
}

.completed{
background:#64748b;
color:white;
}

/* ITEMS */

.items{

margin-top:15px;

padding-top:15px;

border-top:
1px solid rgba(255,255,255,0.08);

}

/* TABLE */

.items-table{

width:100%;

border-collapse:collapse;

margin-top:10px;

overflow:hidden;

border-radius:12px;

}

.items-table th{

background:#1e293b;

padding:12px;

font-size:13px;

text-align:left;

}

.items-table td{

padding:12px;

border-bottom:
1px solid rgba(255,255,255,0.08);

font-size:14px;

}

.items-table tr:hover{

background:
rgba(255,255,255,0.04);

}

/* BUTTONS */

.btns{

display:flex;

gap:10px;

margin-top:20px;

}

.btn{

flex:1;

padding:12px;

border:none;

border-radius:12px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

.btn:hover{

transform:scale(1.03);

}

.prepare{
background:#f59e0b;
color:white;
}

.ready-btn{
background:#22c55e;
color:white;
}

.complete{
background:#3b82f6;
color:white;
}

/* MOBILE */

@media(max-width:768px){

.orders{

grid-template-columns:1fr;

}

h1{

font-size:24px;

}

.order-card{

padding:15px;

}

.items-table th,
.items-table td{

padding:8px;
font-size:12px;

}

.btn{

padding:10px;
font-size:12px;

}

}

</style>

</head>

<body>

<h1>
🍳 Kitchen Dashboard
</h1>

<div class="orders"
id="ordersContainer">

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain: "papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId: "papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId: "831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

/* LOAD ORDERS */

firebase.database()
.ref("orders")
.on("value", snapshot=>{

let html = "";

snapshot.forEach(child=>{

const order = child.val();

let itemsHTML = "";

itemsHTML += `

<table class="items-table">

<thead>

<tr>

<th>ITEM</th>
<th>QTY</th>
<th>AMOUNT</th>

</tr>

</thead>

<tbody>

`;

order.items.forEach(item=>{

itemsHTML += `

<tr>

<td>
${item.name}
</td>

<td>
${item.qty}
</td>

<td>
₱${item.price * item.qty}
</td>

</tr>

`;

});

itemsHTML += `

</tbody>

</table>

`;

html += `

<div class="order-card">

<h2>
${order.orderNumber}
</h2>

<p>
👤 ${order.customer}
</p>

<p>
📞 ${order.phone}
</p>

<p>
📦 ${order.orderType}
</p>

<p>
💳 ${order.payment}
</p>

<p>
💰 ₱${order.total}
</p>

<div class="status
${order.status.toLowerCase()}
">

${order.status}

</div>

<div class="items">

${itemsHTML}

</div>

<div class="btns">

<button
class="btn prepare"
onclick="updateStatus(
'${child.key}',
'PREPARING'
)">

Preparing

</button>

<button
class="btn ready-btn"
onclick="updateStatus(
'${child.key}',
'READY'
)">

Ready

</button>

<button
class="btn complete"
onclick="updateStatus(
'${child.key}',
'COMPLETED'
)">

Completed

</button>

</div>

</div>

`;

});

document.getElementById(
"ordersContainer"
).innerHTML = html;

});

/* UPDATE STATUS */

function updateStatus(id,status){

firebase.database()
.ref("orders/" + id)
.update({

status:status

});

}

</script>

</body>
</html>
