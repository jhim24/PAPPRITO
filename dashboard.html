<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PAPPRITO DASHBOARD</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

/* ===== BODY ===== */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:
linear-gradient(
135deg,
#020617,
#071226,
#0f172a
);
color:white;
display:flex;
min-height:100vh;
overflow:hidden;
}

/* ===== SIDEBAR ===== */
.sidebar{
width:240px;
background:
linear-gradient(
180deg,
#020617,
#081226,
#0f172a
);
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
border-right:
1px solid rgba(255,255,255,0.08);
box-shadow:
5px 0 20px rgba(0,0,0,0.3);
}

/* ===== LOGO ===== */
.logo{
font-size:34px;
font-weight:bold;
color:#ffcc00;
margin-bottom:30px;
}

/* ===== MENU ===== */
.menu{
list-style:none;
padding:0;
margin:0;
}

.menu li{
padding:16px 18px;
margin-bottom:10px;
border-radius:16px;
cursor:pointer;
font-size:15px;
transition:0.3s;
display:flex;
align-items:center;
gap:12px;
color:#ddd;
}

.menu li:hover{
background:
linear-gradient(
135deg,
#111827,
#1e293b
);
transform:translateX(5px);
color:white;
}

.menu li.active{
background:
linear-gradient(
135deg,
#111827,
#1e293b
);
border:
1px solid rgba(255,204,0,0.25);
box-shadow:
0 0 15px rgba(255,204,0,0.1);
color:#ffcc00;
}

/* ===== MAIN ===== */
.main{
flex:1;
padding:25px;
overflow-y:auto;
}

/* ===== TOPBAR ===== */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.topbar h1{
font-size:44px;
margin:0;
font-weight:700;
}

.top-right{
display:flex;
gap:15px;
align-items:center;
}

.top-box{
background:
rgba(255,255,255,0.05);
padding:12px 18px;
border-radius:18px;
border:
1px solid rgba(255,255,255,0.08);
}

/* ===== DASHBOARD GRID ===== */
.dashboard-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(240px,1fr));
gap:18px;
margin-bottom:25px;
}

/* ===== CARD ===== */
.card{
padding:22px;
border-radius:22px;
position:relative;
overflow:hidden;
box-shadow:
0 10px 25px rgba(0,0,0,0.3);
border:
1px solid rgba(255,255,255,0.08);
}

.card h3{
margin:0;
font-size:16px;
color:white;
}

.card p{
margin-top:12px;
font-size:42px;
font-weight:bold;
}

/* COLORS */
.sales{
background:
linear-gradient(
135deg,
#ff4d6d,
#c9184a
);
}

.orders{
background:
linear-gradient(
135deg,
#1e90ff,
#2563eb
);
}

.completed{
background:
linear-gradient(
135deg,
#10b981,
#059669
);
}

.profit{
background:
linear-gradient(
135deg,
#8b5cf6,
#6d28d9
);
}

/* ===== LIVE ORDERS ===== */
.orders-section{
background:
rgba(255,255,255,0.04);
padding:25px;
border-radius:24px;
border:
1px solid rgba(255,255,255,0.08);
box-shadow:
0 10px 30px rgba(0,0,0,0.25);
}

/* ===== TABLE ===== */
.order-table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.order-table th{
background:
rgba(255,255,255,0.05);
padding:14px;
font-size:13px;
color:#ffcc00;
text-align:left;
border-bottom:
1px solid rgba(255,255,255,0.08);
}

.order-table td{
padding:14px;
font-size:13px;
border-bottom:
1px solid rgba(255,255,255,0.05);
color:#eee;
}

/* ===== STATUS ===== */
.status{
padding:6px 14px;
border-radius:30px;
font-size:11px;
font-weight:bold;
display:inline-block;
}

.new{
background:#ef4444;
}

.preparing{
background:#f59e0b;
}

.ready{
background:#3b82f6;
}

.done{
background:#10b981;
}

/* ===== ACTION BUTTONS ===== */
.action-buttons{
display:flex;
gap:6px;
overflow-x:auto;
white-space:nowrap;
}

.action-buttons::-webkit-scrollbar{
height:4px;
}

.action-buttons::-webkit-scrollbar-thumb{
background:#555;
border-radius:20px;
}

/* ===== BUTTONS ===== */
.accept-btn,
.preparing-btn,
.ready-btn,
.done-btn,
.delete-btn{

border:none;
padding:7px 10px;
border-radius:12px;
font-size:11px;
cursor:pointer;
font-weight:bold;
color:white;
transition:0.3s;
}

.accept-btn{
background:#10b981;
}

.preparing-btn{
background:#f59e0b;
}

.ready-btn{
background:#2563eb;
}

.done-btn{
background:#64748b;
}

.delete-btn{
background:#ef4444;
}

.accept-btn:hover,
.preparing-btn:hover,
.ready-btn:hover,
.done-btn:hover,
.delete-btn:hover{
transform:scale(1.05);
opacity:0.9;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

body{
flex-direction:column;
overflow:auto;
}

/* SIDEBAR */
.sidebar{
width:100%;
padding:12px;
}

/* MENU */
.menu{
display:flex;
overflow-x:auto;
gap:10px;
}

.menu li{
white-space:nowrap;
margin-bottom:0;
}

/* MAIN */
.main{
padding:15px;
}

/* TOPBAR */
.topbar{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.topbar h1{
font-size:28px;
}

/* DASHBOARD */
.dashboard-grid{
display:flex;
overflow-x:auto;
gap:12px;
padding-bottom:5px;
}

.dashboard-grid::-webkit-scrollbar{
display:none;
}

.card{
min-width:220px;
flex-shrink:0;
}

.card p{
font-size:30px;
}

/* TABLE */
.orders-section{
overflow-x:auto;
}

.order-table{
min-width:900px;
}

}
</style>

</head>

<body>
<!-- LOGIN SCREEN -->
<div id="loginPage" class="login-page">

<div class="login-box">

<h2>
🔐 PAPPRITO LOGIN
</h2>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
LOGIN
</button>

<p id="errorMsg"></p>

</div>

</div>
<div id="dashboardContent"
style="display:none;">

<!-- SIDEBAR -->
<div class="sidebar">

<div>

<div class="logo">
🍔 PAPPRITO
</div>

<ul class="menu">

<li class="active"
onclick="showPage('dashboardPage')">
🏠 Dashboard
</li>

<li onclick="showPage('ordersPage')">
📦 Live Orders
</li>

<li onclick="showPage('salesPage')">
💰 Sales
</li>

<li onclick="showPage('completedPage')">
✅ Completed
</li>

<li onclick="showPage('reportsPage')">
📊 Reports
</li>

<li onclick="showPage('settingsPage')">
⚙ Settings
</li>

</ul>

</div>

<button class="delete-btn">
🚪 Logout
</button>

</div>
<!-- MAIN -->
<div class="main">

<!-- TOP -->
<div class="topbar">

<h1>
Dashboard Overview
</h1>

</div>
<div id="dashboardPage">
  
<!-- DASHBOARD CARDS -->
<div class="dashboard-grid">

<div class="card sales">
<h3>Net Sales Today</h3>
<p id="salesToday">₱0</p>
</div>

<div class="card orders">
<h3>Total Orders</h3>
<p id="totalOrders">0</p>
</div>

<div class="card completed">
<h3>Completed Orders</h3>
<p id="completedOrders">0</p>
</div>

<div class="card profit">
<h3>Gross Profit</h3>
<p id="grossProfit">₱0</p>
</div>

</div>
</div>
<!-- LIVE ORDERS -->
<div id="ordersPage" style="display:none;">

<div class="orders-section">

<h2>
🧾 Live Orders
</h2>

<table>

<thead>

<tr>

<th>Order #</th>

<th>Product</th>

<th>Qty</th>

<th>Amount</th>

<th>Status</th>

<th>Time</th>
  
<th>Action</th>
</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>
  
</div>

<script>
 /* LOGIN */
function login(){

const pass =
document.getElementById("password").value;

if(pass === "papprito123"){

document.getElementById("loginPage")
.style.display = "none";

document.getElementById("dashboardContent")
.style.display = "flex";

}else{

document.getElementById("errorMsg")
.innerText = "Wrong Password";

}

}

/* PAGE SWITCH */
function showPage(pageId){
document.getElementById("dashboardPage")
.style.display = "none";

document.getElementById("ordersPage")
.style.display = "none";

document.getElementById(pageId)
.style.display = "block";

}
/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain: "papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId: "papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId: "831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

const table =
document.getElementById("ordersTable");

/* LIVE DATA */
firebase.database()
.ref("orders")
.on("value", snapshot=>{

table.innerHTML = "";

let sales = 0;

let totalOrders = 0;

let completed = 0;

snapshot.forEach(child=>{

const order = child.val();

const orderId =
child.key.slice(-5);

totalOrders++;

sales += Number(order.total);

if(order.status === "DELIVERED"){

completed++;

}

order.items.forEach(item=>{

table.innerHTML += `

<tr>

<td>
#${orderId}
</td>

<td>
${item.name}
</td>

<td>
1
</td>

<td>
₱${item.price}
</td>

<td>

<span class="status ${order.status}">

${order.status}

</span>

</td>

<td>
${order.createdAt}
</td>
<td>

<div class="action-buttons">

<button class="accept-btn"
onclick="
updateStatus(
'${child.key}',
'ACCEPTED'
)">
ACCEPT
</button>

<button class="preparing-btn"
onclick="
updateStatus(
'${child.key}',
'PREPARING'
)">
PREP
</button>

<button class="ready-btn"
onclick="
updateStatus(
'${child.key}',
'READY'
)">
READY
</button>

<button class="done-btn"
onclick="
updateStatus(
'${child.key}',
'DELIVERED'
)">
DONE
</button>

<button class="delete-btn"
onclick="
deleteOrder(
'${child.key}'
)">
DELETE
</button>

</div>

</td>
</tr>

`;

});

});

/* UPDATE DASHBOARD */

document.getElementById("salesToday")
.innerText = "₱" + sales;

document.getElementById("totalOrders")
.innerText = totalOrders;

document.getElementById("completedOrders")
.innerText = completed;

document.getElementById("grossProfit")
.innerText = "₱" + sales;

});
function updateStatus(orderKey,status){

firebase.database()
.ref("orders/" + orderKey)
.update({

status: status

});

}
  function deleteOrder(orderKey){

if(confirm("Delete this order?")){

firebase.database()
.ref("orders/" + orderKey)
.remove();

}

}
</script>

</body>
</html>
