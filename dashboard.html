<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PAPPRITO DASHBOARD</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color"
content="#ffcc00">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
border-right:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:28px;
font-weight:bold;
color:#ffcc00;
margin-bottom:30px;
}

.menu{
list-style:none;
}

.menu li{
padding:14px;
margin-bottom:10px;
border-radius:15px;
cursor:pointer;
transition:.3s;
font-size:14px;
}

.menu li:hover,
.menu li.active{
background:#111827;
color:#ffcc00;
}

/* MAIN */

.main{
flex:1;
padding:20px;
overflow:auto;
}

/* TOP */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.topbar h1{
font-size:35px;
}

/* CARDS */

.dashboard-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
padding:25px;
border-radius:20px;
}

.sales{
background:linear-gradient(135deg,#ff4d6d,#c9184a);
}

.orders{
background:linear-gradient(135deg,#1e90ff,#2563eb);
}

.completed{
background:linear-gradient(135deg,#10b981,#059669);
}

.profit{
background:linear-gradient(135deg,#8b5cf6,#6d28d9);
}

.card h3{
font-size:15px;
margin-bottom:10px;
}

.card p{
font-size:35px;
font-weight:bold;
}

/* LIVE ORDERS */

.orders-section{
background:#111827;
padding:20px;
border-radius:20px;
overflow:auto;
}

.order-table{
width:100%;
border-collapse:collapse;
min-width:2400px;
margin-top:20px;
}

.order-table th{
background:#1e293b;
color:#ffcc00;
padding:12px;
font-size:12px;
border:1px solid rgba(255,255,255,0.08);
text-align:center;
}

.order-table td{
padding:10px;
font-size:11px;
border:1px solid rgba(255,255,255,0.05);
text-align:center;
vertical-align:middle;
}

/* STATUS */

.status{
padding:6px 12px;
border-radius:20px;
font-size:11px;
font-weight:bold;
display:inline-block;
}

.new{
background:#ef4444;
}

.accepted{
background:#22c55e;
}

.preparing{
background:#f59e0b;
color:black;
}

.ready{
background:#3b82f6;
}

.delivered{
background:#8b5cf6;
}

/* ACTIONS */

.action-buttons{
display:flex;
justify-content:center;
align-items:center;
gap:6px;
flex-wrap:wrap;
}

.action-buttons button{
border:none;
padding:7px 10px;
border-radius:10px;
font-size:11px;
font-weight:bold;
cursor:pointer;
color:white;
min-width:70px;
}

.accept-btn{
background:#10b981;
}

.preparing-btn{
background:#f59e0b;
}

.ready-btn{
background:#2563eb;
}

.done-btn{
background:#64748b;
}

.delete-btn{
background:#ef4444;
}

.rider-btn{
background:#8b5cf6;
}

.print-btn{
background:#111;
}

/* ADDRESS */

.address-cell{
max-width:220px;
white-space:normal;
word-break:break-word;
line-height:1.5;
}

/* MOBILE */

@media(max-width:768px){

body{
flex-direction:column;
height:auto;
overflow:auto;
}

.sidebar{
width:100%;
overflow-x:auto;
}

.main{
padding:10px;
}

.topbar h1{
font-size:25px;
}

.dashboard-grid{
display:flex;
overflow-x:auto;
gap:10px;
}

.card{
min-width:220px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div>

<div class="logo">
PAPPRITO
</div>

<ul class="menu">

<li class="active">
Dashboard
</li>

<li>
Live Orders
</li>

<li>
Sales
</li>

<li onclick="location.href='products.html'">
Products
</li>

<li onclick="location.href='pos.html'">
POS
</li>
  
</ul>

</div>

<button
class="delete-btn"
onclick="logout()">
Logout
</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>
Dashboard Overview
</h1>

</div>

<!-- CARDS -->

<div class="dashboard-grid">

<div class="card sales">

<h3>Net Sales</h3>

<p id="salesToday">
₱0
</p>

</div>

<div class="card orders">

<h3>Total Orders</h3>

<p id="totalOrders">
0
</p>

</div>

<div class="card completed">

<h3>Completed</h3>

<p id="completedOrders">
0
</p>

</div>

<div class="card profit">

<h3>Gross Profit</h3>

<p id="grossProfit">
₱0
</p>

</div>

</div>

<!-- LIVE ORDERS -->

<div class="orders-section">

<h2>
📦 Live Orders
</h2>

<table class="order-table">

<thead>

<tr>

<th>ORDER #</th>
<th>CUSTOMER</th>
<th>PHONE</th>
<th>TYPE</th>
<th>PAYMENT MODE</th>
<th>REFERENCE #</th>
<th>ADDRESS</th>
<th>PRODUCT</th>
<th>QTY</th>
<th>AMOUNT</th>
<th>STATUS</th>
<th>TIME</th>
<th>DRIVER</th>
<th>DRIVER PHONE</th>
<th>VEHICLE</th>
<th>ACTIONS</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey:
"AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain:
"papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId:
"papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId:
"831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

const table =
document.getElementById(
"ordersTable"
);

/* MONEY */

function peso(num){

return "₱" +

Number(num || 0)
.toLocaleString();

}

/* LOAD ORDERS */

firebase.database()
.ref("orders")
.on("value", snapshot=>{

table.innerHTML = "";

let totalSales = 0;
let totalOrders = 0;
let completed = 0;
let gross = 0;

snapshot.forEach(child=>{

const order = child.val();

const key = child.key;

totalOrders++;

if(
(order.status || "")
.toUpperCase() ===
"DELIVERED"
){
completed++;
}

(order.items || [])
.forEach(item=>{

let amount =

Number(item.price || 0)

*

Number(item.qty || 1);

totalSales += amount;

gross += amount;

table.innerHTML += `

<tr>

<td>
${order.trackingnumber || '-'}
</td>

<td>
${order.customer || '-'}
</td>

<td>
${order.phone || '-'}
</td>

<td>
${order.orderType || '-'}
</td>

<td>
${order.payment || '-'}
</td>

<td>

${order.payment !== 'CASH'
? (order.reference || '-')
: '-'}

</td>

<td class="address-cell">
${order.address || '-'}
</td>

<td>
${item.name || '-'}
</td>

<td>
${item.qty || 1}
</td>

<td>
${peso(amount)}
</td>

<td>

<span class="status ${(order.status || 'NEW').toLowerCase()}">

${order.status || 'NEW'}

</span>

</td>

<td>

${new Date(
order.timestamp || Date.now()
).toLocaleString()}

</td>

<td>
${order.riderName || '-'}
</td>

<td>
${order.riderPhone || '-'}
</td>

<td>
${order.riderVehicle || '-'}
</td>

<td>

<div class="action-buttons">

<button
class="print-btn"
onclick="printReceipt(
'${order.trackingnumber}',
'${order.customer}',
'${order.phone}',
'${order.address}',
'${item.name}',
'${item.qty}',
'${amount}',
'${order.payment}',
'${order.reference}',
'${order.orderType}',
'${order.riderName || "-"}',
'${order.riderPhone || "-"}',
'${order.riderVehicle || "-"}'
)">

PRINT

</button>

<button
class="rider-btn"
onclick="assignRider('${key}')">

RIDER

</button>

<button
class="accept-btn"
onclick="updateStatus(
'${key}',
'ACCEPTED'
)">

ACCEPT

</button>

<button
class="preparing-btn"
onclick="updateStatus(
'${key}',
'PREPARING'
)">

PREP

</button>

<button
class="ready-btn"
onclick="updateStatus(
'${key}',
'READY'
)">

READY

</button>

<button
class="done-btn"
onclick="updateStatus(
'${key}',
'DELIVERED'
)">

DONE

</button>

<button
class="delete-btn"
onclick="deleteOrder('${key}')">

DELETE

</button>

</div>

</td>

</tr>

`;

});

});

document.getElementById(
"salesToday"
).innerText =
peso(totalSales);

document.getElementById(
"totalOrders"
).innerText =
totalOrders;

document.getElementById(
"completedOrders"
).innerText =
completed;

document.getElementById(
"grossProfit"
).innerText =
peso(gross);

});

/* UPDATE STATUS */

function updateStatus(
orderKey,
status
){

firebase.database()
.ref("orders/" + orderKey)
.update({

status:status

});

}

/* RIDER */

function assignRider(orderKey){

const riderName =
prompt("Driver Name");

if(!riderName){
return;
}

const riderPhone =
prompt("Driver Phone");

const riderVehicle =
prompt("Vehicle");

firebase.database()
.ref("orders/" + orderKey)
.update({

riderName:riderName,

riderPhone:riderPhone,

riderVehicle:riderVehicle

});

alert("Driver Assigned");

}

/* DELETE */

function deleteOrder(orderKey){

if(confirm(
"Delete this order?"
)){

firebase.database()
.ref("orders/" + orderKey)
.remove();

}

}

/* LOGOUT */

function logout(){

localStorage.removeItem(
"pappritoLogin"
);

location.reload();

}

/* PRINT RECEIPT */

function printReceipt(
tracking,
customer,
phone,
address,
product,
qty,
amount,
payment,
reference,
type,
driver,
driverPhone,
vehicle
){

const receiptWindow =
window.open(
'',
'',
'width=400,height=700'
);

receiptWindow.document.write(`

<html>

<head>

<title>
PAPPRITO RECEIPT
</title>

<style>

body{
font-family:monospace;
padding:15px;
color:black;
}

.center{
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:5px;
}

hr{
border:none;
border-top:1px dashed black;
margin:12px 0;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.total{
font-size:22px;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:25px;
font-size:12px;
}

</style>

</head>

<body>

<div class="center">

<div class="logo">
🍔 PAPPRITO
</div>

<div>
THERMAL RECEIPT
</div>

</div>

<hr>

<div>

<b>Tracking:</b><br>
${tracking}

</div>

<hr>

<div>

<b>Customer:</b><br>
${customer}

</div>

<div>

<b>Phone:</b><br>
${phone}

</div>

<div>

<b>Address:</b><br>
${address}

</div>

<div>

<b>Order Type:</b><br>
${type}

</div>

<hr>

<div class="row">

<div>
${qty}x ${product}
</div>

<div>
₱${amount}
</div>

</div>

<hr>

<div class="row">

<div>
Payment
</div>

<div>
${payment}
</div>

</div>

<div class="row">

<div>
Reference
</div>

<div>
${reference || "-"}
</div>

</div>

<hr>

<div>

<b>Driver:</b><br>
${driver}

</div>

<div>

<b>Driver Phone:</b><br>
${driverPhone}

</div>

<div>

<b>Vehicle:</b><br>
${vehicle}

</div>

<hr>

<div class="row total">

<div>
TOTAL
</div>

<div>
₱${amount}
</div>

</div>

<div class="footer">

Thank You!<br>
Please Come Again

</div>

<script>

window.onload = function(){

window.print();

window.onafterprint = function(){

window.close();

}

}

<\/script>

</body>

</html>

`);

receiptWindow.document.close();

}

</script>

</body>
</html>
