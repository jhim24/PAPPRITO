<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO Branches</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#111;
    color:white;
}

/* HEADER */
.header{
    position:relative;
    background:#d71920;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* BACK BUTTON */
.back-btn{
    position:absolute;
    left:10px;
    top:10px;
    background:#ffcc00;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    color:black;
    font-weight:bold;
}

/* GRID */
.branches{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:20px;
}

/* CARD */
.card{
    background:#1a1a1a;
    border-radius:12px;
    padding:12px;
    border:2px solid #ffcc00;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 15px rgba(255,204,0,0.5);
}

/* IMAGE */
.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}

/* TEXT */
.card h3{
    color:#ffcc00;
    margin-bottom:5px;
}

.card p{
    margin:4px 0;
    font-size:14px;
}

.card i{
    margin-right:6px;
    color:#ffcc00;
}

/* ACTION BUTTONS */
.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.btn{
    flex:1;
    text-align:center;
    padding:6px;
    border-radius:6px;
    text-decoration:none;
    font-size:13px;
    background:#d71920;
    color:white;
}

.btn.call{
    background:#ffcc00;
    color:black;
}

/* MOBILE */
@media(max-width:768px){

    /* SINGLE COLUMN */
    .branches{
        grid-template-columns:1fr;
    }

    /* MAIN BRANCH HIGHLIGHT */
    .main-branch{
        order:-1;
        transform:scale(1.02);
        border:3px solid #ffcc00;
        box-shadow:0 0 20px rgba(255,204,0,0.6);
    }

    .main-branch img{
        height:200px;
    }
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back-btn">← Back</a>
    OUR BRANCHES
</div>

<div class="branches">

<!-- MAIN BRANCH -->
<div class="card main-branch">
    <img src="tagaytay.jpg">

    <h3>Papprito Tagaytay</h3>
    <p>Main Branch</p>
    <p><i class="fa-solid fa-location-dot"></i> Tagaytay City</p>

    <p>
        <i class="fa-solid fa-phone"></i>
        <a href="tel:09228404799">0922-840-4799</a>
    </p>

    <div class="actions">
        <a href="https://maps.google.com" target="_blank" class="btn">Map</a>
        <a href="tel:09228404799" class="btn call">Call</a>
    </div>
</div>

<!-- OTHER BRANCH -->
<div class="card">
    <img src="mahogany.jpg">

    <h3>Papprito Mahogany</h3>
    <p>Branch</p>
    <p><i class="fa-solid fa-location-dot"></i> Mahogany Market</p>

    <p>
        <i class="fa-solid fa-phone"></i>
        <a href="tel:09228404799">0922-840-4799</a>
    </p>

    <div class="actions">
        <a href="https://maps.google.com" target="_blank" class="btn">Map</a>
        <a href="tel:09228404799" class="btn call">Call</a>
    </div>
</div>

</div>

</body>
</html>
