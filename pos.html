<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAPPRITO POS</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fb;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#111827;
color:white;
display:flex;
flex-direction:column;
}

.logo{
padding:25px;
font-size:28px;
font-weight:bold;
color:#E91E63;
border-bottom:1px solid rgba(255,255,255,.1);
}

.menu{
list-style:none;
padding:15px;
}

.menu li{
margin-bottom:8px;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-radius:12px;
text-decoration:none;
color:white;
transition:.3s;
}

.menu a:hover,
.menu a.active{
background:#E91E63;
}

/* MAIN */

.main{
flex:1;
display:flex;
overflow:hidden;
}

/* PRODUCTS */

.products-section{
flex:1;
padding:20px;
overflow:auto;
}

.topbar{
display:flex;
gap:15px;
margin-bottom:20px;
}

.search{
flex:1;
}

.search input{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.categories{
display:flex;
gap:10px;
margin-bottom:20px;
overflow:auto;
}

.category{
padding:10px 18px;
background:white;
border:none;
border-radius:30px;
cursor:pointer;
}

.category.active{
background:#E91E63;
color:white;
}

.products-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

.product-card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.08);
cursor:pointer;
transition:.3s;
}

.product-card:hover{
transform:translateY(-5px);
}

.product-card img{
width:100%;
height:180px;
object-fit:cover;
}

.product-info{
padding:15px;
}

.product-name{
font-weight:600;
margin-bottom:8px;
}

.product-price{
color:#E91E63;
font-size:20px;
font-weight:bold;
}

/* CART */

.cart{
width:400px;
background:white;
border-left:1px solid #eee;
display:flex;
flex-direction:column;
padding:20px;
}

.cart-title{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.form-group{
margin-bottom:10px;
}

.form-group input,
.form-group select,
.form-group textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
}

.cart-items{
flex:1;
overflow:auto;
margin-top:15px;
}

.cart-item{
padding:12px;
background:#f9fafb;
border-radius:12px;
margin-bottom:10px;
}

.total{
font-size:28px;
font-weight:bold;
margin-top:15px;
color:#E91E63;
}

.checkout-btn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#E91E63;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.checkout-btn:hover{
opacity:.9;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
PAPPRITO
</div>

<ul class="menu">

<li>
<a href="dashboard.html">
<i class="fas fa-chart-line"></i>
Dashboard
</a>
</li>

<li>
<a href="pos.html" class="active">
<i class="fas fa-cash-register"></i>
POS
</a>
</li>

<li>
<a href="kitchen.html">
<i class="fas fa-utensils"></i>
Kitchen
</a>
</li>

<li>
<a href="products.html">
<i class="fas fa-burger"></i>
Products
</a>
</li>

<li>
<a href="inventory.html">
<i class="fas fa-boxes"></i>
Inventory
</a>
</li>

</ul>

</div>

<!-- MAIN -->

<div class="main">

<!-- LEFT -->

<div class="products-section">

<div class="topbar">

<div class="search">
<input
type="text"
placeholder="Search products..."
id="searchProduct">
</div>

</div>

<div class="categories">

<button class="category active">
All
</button>

<button class="category">
Coffee
</button>

<button class="category">
Milk Tea
</button>

<button class="category">
Burger
</button>

<button class="category">
Rice Meal
</button>

<button class="category">
Dessert
</button>

</div>

<div class="products-grid" id="productsGrid">

<!-- Products Here -->

</div>

</div>

<!-- RIGHT -->

<div class="cart">

<div class="cart-title">
🛒 Order Cart
</div>

<div class="form-group">
<input
type="text"
id="customerName"
placeholder="Customer Name">
</div>

<div class="form-group">
<select id="tableNumber">
<option>Table 1</option>
<option>Table 2</option>
<option>Table 3</option>
<option>Table 4</option>
<option>Take Out</option>
</select>
</div>

<div class="form-group">
<select id="orderType">
<option>DINE IN</option>
<option>TAKE OUT</option>
<option>DELIVERY</option>
</select>
</div>

<div class="form-group">
<select id="paymentMode">
<option>CASH</option>
<option>GCASH</option>
<option>MAYA</option>
<option>CARD</option>
</select>
</div>

<div class="form-group">
<input
type="text"
id="referenceNumber"
placeholder="Reference Number">
</div>

<div class="form-group">
<textarea
id="notes"
placeholder="Order Notes"></textarea>
</div>

<div class="cart-items" id="cartItems">

</div>

<div class="total" id="total">
₱0
</div>

<button
class="checkout-btn"
onclick="checkout()">

PLACE ORDER

</button>

</div>

</div>

<script>

let cart = [];
  
const productsGrid =
document.getElementById("productsGrid");
db.ref("products")
.on("value",snapshot=>{

console.log(snapshot.val());

productsGrid.innerHTML="";

const data=snapshot.val();

if(!data){
alert("No products found");
return;
}

Object.keys(data).forEach(key=>{

const product=data[key];

console.log(product);

productsGrid.innerHTML+=`

<div class="product-card">

<img src="${product.image || ''}">

<div class="product-info">

<div class="product-name">
${product.name || ''}
</div>

<div class="product-price">
₱${product.price || 0}
</div>

</div>

</div>

`;

});

});

productsGrid.innerHTML = "";

const data = snapshot.val();

if(!data) return;

Object.keys(data)
.forEach(key=>{

const product = data[key];

productsGrid.innerHTML += `

<div
class="product-card"
onclick="addToCart(
'${product.name}',
${product.price}
)">

<img src="${product.image}">

<div class="product-info">

<div class="product-name">

${product.name}

</div>

<div class="product-price">

₱${product.price}

</div>

</div>

</div>

`;

});

});

function addToCart(name,price){

const existing =
cart.find(x=>x.name===name);

if(existing){

existing.qty++;

}else{

cart.push({
name,
price,
qty:1
});

}

renderCart();

}

function renderCart(){

let html='';
let total=0;

cart.forEach(item=>{

total += item.price * item.qty;

html += `
<div class="cart-item">
${item.name}<br>
${item.qty} x ₱${item.price}
</div>
`;

});

document.getElementById(
"cartItems"
).innerHTML = html;

document.getElementById(
"total"
).innerText =
"₱" + total;

}

function checkout(){

if(cart.length===0){

alert("Cart Empty");

return;

}

alert("Order Ready For Firebase Save");

}
document
.getElementById("searchProduct")
.addEventListener("keyup",function(){

const keyword =
this.value.toLowerCase();

document
.querySelectorAll(".product-card")
.forEach(card=>{

card.style.display =

card.innerText
.toLowerCase()
.includes(keyword)

? ""

: "none";

});

});
</script>

</body>
</html>
