<!DOCTYPE html>
<html>
<head>
<title>Pappprito POS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    height:100vh;
    background:#f5f5f5;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:linear-gradient(to bottom, #ffcc00, #ff9900);
    padding:20px;
}

.menu-item{
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.menu-item:hover,.active{
    background:#d62828;
    color:#fff;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

/* GRID */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#fff;
    padding:15px;
    border-radius:20px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.food-img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:12px;
}

/* PRICE */
.card p{
    color:#d62828;
    font-weight:bold;
}

/* RIGHT PANEL */
.details{
    width:280px;
    background:#fff;
    padding:20px;
    border-left:2px solid #eee;
}

.details img{
    width:100%;
    border-radius:10px;
}

.price{
    font-size:22px;
    font-weight:bold;
}

/* BUTTON */
.btn{
    width:100%;
    padding:15px;
    background:#d62828;
    border:none;
    color:#fff;
    border-radius:10px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="menu-item active" onclick="loadMenu('beef', this)">Beef</div>
    <div class="menu-item" onclick="loadMenu('pork', this)">Pork</div>
    <div class="menu-item" onclick="loadMenu('chicken', this)">Chicken</div>
    <div class="menu-item" onclick="loadMenu('seafood', this)">Seafood</div>
</div>

<!-- MAIN -->
<div class="main">
    <h2 id="categoryTitle">BEEF</h2>
    <div class="cards" id="menu"></div>
</div>

<!-- RIGHT PANEL -->
<div class="details">
    <img id="preview" src="https://source.unsplash.com/300x200/?bulalo">
    <h2 id="name">Select Item</h2>
    <p class="price" id="price">₱0</p>
    <button class="btn">Add to Cart</button>
</div>

<script>

const menuData = {

beef:[
    {name:"Bulalo Grupo", price:710, img:"https://source.unsplash.com/300x200/?bulalo"},
    {name:"Bulalo Solo", price:185, img:"https://source.unsplash.com/300x200/?beef-soup"},
    {name:"Bistek Tagalog", price:279, img:"https://source.unsplash.com/300x200/?beef-steak"}
],

pork:[
    {name:"Lechon Kawali", price:395, img:"https://source.unsplash.com/300x200/?crispy-pork"},
    {name:"Pork Sisig", price:315, img:"https://source.unsplash.com/300x200/?sisig"},
    {name:"Lumpiang Shanghai", price:235, img:"https://source.unsplash.com/300x200/?spring-rolls"}
],

chicken:[
    {name:"PapsChicken Platter", price:315, img:"https://source.unsplash.com/300x200/?fried-chicken"},
    {name:"Chicken Sisig", price:295, img:"https://source.unsplash.com/300x200/?chicken-dish"}
],

seafood:[
    {name:"Crispy Bangusarap", price:315, img:"https://source.unsplash.com/300x200/?fried-fish"},
    {name:"Calamares", price:305, img:"https://source.unsplash.com/300x200/?calamari"},
    {name:"Crispy Tawilis", price:285, img:"https://source.unsplash.com/300x200/?fish"}
]

};

function loadMenu(category, el){
    document.querySelectorAll(".menu-item").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");

    document.getElementById("categoryTitle").innerText = category.toUpperCase();

    const container = document.getElementById("menu");
    container.innerHTML = "";

    menuData[category].forEach(item=>{
        container.innerHTML += `
        <div class="card" onclick="selectItem('${item.name}', ${item.price}, '${item.img}')">
            <img src="${item.img}" class="food-img">
            <h3>${item.name}</h3>
            <p>₱${item.price}</p>
        </div>`;
    });
}

function selectItem(name, price, img){
    document.getElementById("name").innerText = name;
    document.getElementById("price").innerText = "₱" + price;
    document.getElementById("preview").src = img;
}

/* LOAD DEFAULT */
loadMenu('beef', document.querySelector('.menu-item'));

</script>

</body>
</html>
