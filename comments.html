<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comments & Suggestions</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#111;color:white}

/* HEADER */
.header{background:#d71920;padding:15px;text-align:center;font-weight:bold}
.back-btn{position:absolute;left:10px;top:10px;background:#ffcc00;padding:6px 10px;color:black;border-radius:6px;text-decoration:none}

/* CONTAINER */
.container{max-width:600px;margin:auto;padding:20px}

/* FORM */
.form{display:flex;flex-direction:column;gap:10px}
.form input,.form textarea{padding:10px;border-radius:6px;border:none}
.form button{padding:10px;background:#d71920;color:white;border:none;border-radius:6px}

/* STAR */
.stars{display:flex;gap:5px;font-size:22px;cursor:pointer;color:gray}
.stars span.active{color:gold}

/* COMMENT CARD */
.comment{background:#1a1a1a;padding:12px;border-radius:10px;margin-top:15px}
.comment strong{color:#ffcc00}
.meta{font-size:12px;color:#aaa}
.delete-btn{float:right;background:red;border:none;color:white;padding:5px;border-radius:5px;cursor:pointer}
</style>
</head>

<body>

<div class="header">
<a href="index.html" class="back-btn">←</a>
COMMENTS & SUGGESTIONS
</div>

<div class="container">

<div class="form">
<input type="text" id="name" placeholder="Your Name">
<textarea id="message" placeholder="Write your comment..."></textarea>

<div class="stars" id="stars">
<span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
</div>

<button onclick="addComment()">Submit</button>
</div>

<div id="comments"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjtecedG6UbaJqcMiy-AVKzRzbUbAC8HM",
  authDomain: "papprito-feedback.firebaseapp.com",
  databaseURL: "https://papprito-feedback-default-rtdb.firebaseio.com",
  projectId: "papprito-feedback",
  storageBucket: "papprito-feedback.firebasestorage.app",
  messagingSenderId: "446857159800",
  appId: "1:446857159800:web:4eac74eeff126c8ca2798d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ⭐ STAR RATING
let rating = 0;
const stars = document.querySelectorAll("#stars span");

stars.forEach((star, index)=>{
    star.addEventListener("click", ()=>{
        rating = index + 1;
        stars.forEach((s,i)=>{
            s.classList.toggle("active", i < rating);
        });
    });
});

// ➕ ADD COMMENT
window.addComment = function(){
    let name = document.getElementById("name").value.trim();
    let message = document.getElementById("message").value.trim();

    if(name === "" || message === ""){
        alert("Fill all fields");
        return;
    }

    if(message.length > 200){
        alert("Too long message!");
        return;
    }

    push(ref(db, "comments"), {
        name,
        message,
        rating,
        time: new Date().toLocaleString()
    });

    document.getElementById("name").value="";
    document.getElementById("message").value="";
    rating = 0;
    stars.forEach(s=>s.classList.remove("active"));
}

// 📥 DISPLAY
function displayComments(){
    const commentsRef = ref(db, "comments");

    onValue(commentsRef, (snapshot)=>{
        let container = document.getElementById("comments");
        container.innerHTML="";

        snapshot.forEach(child=>{
            let data = child.val();
            let id = child.key;

            let starsHTML = "★".repeat(data.rating || 0);

            container.innerHTML += `
            <div class="comment">
                <button class="delete-btn" onclick="deleteComment('${id}')">X</button>
                <strong>${data.name}</strong>
                <div class="meta">${data.time || ""}</div>
                <div style="color:gold">${starsHTML}</div>
                <p>${data.message}</p>
            </div>
            `;
        });
    });
}

displayComments();

// ❌ DELETE (ADMIN SIMPLE)
window.deleteComment = function(id){
    let pass = prompt("Enter admin password:");

    if(pass === "admin123"){
        remove(ref(db, "comments/"+id));
    }else{
        alert("Wrong password");
    }
}
</script>

</body>
</html>
