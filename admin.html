<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PAPPRITO LIVE ORDERS</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

h1{
margin-bottom:20px;
}

.order{
background:#1a1a1a;

padding:20px;

border-radius:15px;

margin-bottom:15px;

border-left:5px solid #ffcc00;
}

.item{
margin:5px 0;
}

.total{
color:#ffcc00;
font-weight:bold;
margin-top:10px;
}

.time{
color:#999;
margin-top:10px;
font-size:13px;
}

.status{
background:#d71920;
display:inline-block;

padding:5px 12px;

border-radius:20px;

margin-top:10px;
}

</style>

</head>

<body>

<h1>
🍔 PAPPRITO LIVE ORDERS
</h1>

<div id="orders"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain: "papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId: "papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId: "831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

const ordersDiv =
document.getElementById("orders");

/* LIVE ORDERS */
firebase.database()
.ref("orders")
.on("value", snapshot=>{

ordersDiv.innerHTML = "";

snapshot.forEach(child=>{

const order = child.val();

let itemsHTML = "";

order.items.forEach(item=>{

itemsHTML += `

<div class="item">

${item.name}
- ₱${item.price}

</div>

`;

});

ordersDiv.innerHTML = `

<div class="order">

<h3>
🧾 New Order
</h3>

${itemsHTML}

<div class="total">

Total: ₱${order.total}

</div>

<div class="time">

${order.createdAt}

</div>

<div class="status">

${order.status}

</div>

</div>

` + ordersDiv.innerHTML;

});

});

</script>

</body>
</html>
