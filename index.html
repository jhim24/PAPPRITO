<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie Red Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    background: #0f0f0f;
    color: #fff;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #111;
    padding: 20px;
}

.sidebar h2 {
    color: #ff3b3b;
    margin-bottom: 30px;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.sidebar ul li:hover,
.active {
    background: linear-gradient(45deg, #ff0000, #ffcc00);
    color: black;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.search {
    padding: 8px;
    border-radius: 20px;
    border: none;
    width: 200px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    padding: 15px;
    border-radius: 15px;
    color: #000;
    font-weight: bold;
}

.red { background: #ff3b3b; }
.yellow { background: #ffcc00; }
.orange { background: #ff6b00; }
.light { background: #ffd966; }

/* FOOD */
.food-container {
    display: flex;
    gap: 15px;
}

.food-card {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 15px;
    width: 200px;
    cursor: pointer;
    transition: 0.3s;
}

.food-card:hover {
    transform: scale(1.05);
}

.food-card img {
    width: 100%;
    border-radius: 10px;
}

.food-title {
    margin-top: 10px;
    font-weight: bold;
}

.price {
    color: #ffcc00;
}

/* MODAL (PREVIEW) */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #111;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
    box-shadow: 0 0 20px red;
}

.modal-content img {
    width: 100%;
    border-radius: 10px;
}

.close {
    float: right;
    font-size: 20px;
    cursor: pointer;
    color: red;
}

.modal-title {
    margin-top: 10px;
    font-size: 20px;
}

.modal-price {
    color: #ffcc00;
    font-size: 18px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🔥 Foodie</h2>
    <ul>
        <li class="active">Dashboard</li>
        <li>Menu</li>
        <li>Orders</li>
        <li>Analytics</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h2>Welcome, Chef 👨‍🍳</h2>
        <input class="search" placeholder="Search...">
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card red">$11,256<br>Revenue</div>
        <div class="card yellow">245<br>Orders</div>
        <div class="card orange">$6,556<br>Expenses</div>
        <div class="card light">$4,227<br>Profit</div>
    </div>

    <!-- FOOD -->
    <h3>🔥 Trending Orders</h3>

    <div class="food-container">

        <div class="food-card" onclick="openModal(this)">
            <img src="https://images.unsplash.com/photo-1604908176997-431c4ed5b8c0">
            <div class="food-title">Chicken Meal</div>
            <div class="price">$5.99</div>
        </div>

        <div class="food-card" onclick="openModal(this)">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
            <div class="food-title">Healthy Bowl</div>
            <div class="price">$6.50</div>
        </div>

        <div class="food-card" onclick="openModal(this)">
            <img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1">
            <div class="food-title">Rice Combo</div>
            <div class="price">$5.25</div>
        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modal-img">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-price" id="modal-price"></div>
    </div>
</div>

<script>
function openModal(card) {
    const img = card.querySelector("img").src;
    const title = card.querySelector(".food-title").innerText;
    const price = card.querySelector(".price").innerText;

    document.getElementById("modal-img").src = img;
    document.getElementById("modal-title").innerText = title;
    document.getElementById("modal-price").innerText = price;

    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
