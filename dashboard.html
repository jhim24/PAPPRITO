<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO V2 Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f5f7fb;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#111827;
color:white;
display:flex;
flex-direction:column;
}

.logo{
padding:25px;
font-size:28px;
font-weight:bold;
color:#E91E63;
border-bottom:1px solid rgba(255,255,255,.1);
}

.menu{
list-style:none;
padding:15px;
}

.menu li{
margin-bottom:8px;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-radius:12px;
text-decoration:none;
color:white;
transition:.3s;
}

.menu a:hover,
.menu a.active{
background:#E91E63;
}

/* MAIN */

.main{
flex:1;
padding:25px;
overflow:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
color:#1f2937;
}
#dashboardTitle{

color:#ef4444;

animation:
blink 1s infinite;

}

@keyframes blink{

0%{
opacity:1;
}

50%{
opacity:.4;
}

100%{
opacity:1;
}

}

.user{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#E91E63;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
font-size:14px;
color:#6b7280;
margin-bottom:10px;
}

.card h2{
font-size:32px;
color:#111827;
}

/* CONTENT */

.section{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-bottom:20px;
}

.section h2{
margin-bottom:15px;
}

.orders-table{
width:100%;
border-collapse:collapse;
}

.orders-table th,
.orders-table td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

.status{
padding:6px 10px;
border-radius:20px;
font-size:12px;
color:white;
}

.new{
background:#ef4444;
}

.ready{
background:#3b82f6;
}

.done{
background:#22c55e;
}

@media(max-width:768px){

.sidebar{
width:80px;
}

.logo{
font-size:18px;
text-align:center;
}

.menu a span{
display:none;
}

}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
PAPPRITO
</div>

<ul class="menu">

<li>
<a href="dashboard.html" class="active">
<i class="fas fa-chart-line"></i>
<span>Dashboard</span>
</a>
</li>

<li>
<a href="pos.html">
<i class="fas fa-cash-register"></i>
<span>POS</span>
</a>
</li>

<li>
<a href="kitchen.html">
<i class="fas fa-utensils"></i>
<span>Kitchen</span>
</a>
</li>

<li>
<a href="products.html">
<i class="fas fa-burger"></i>
<span>Products</span>
</a>
</li>

<li>
<a href="inventory.html">
<i class="fas fa-boxes"></i>
<span>Inventory</span>
</a>
</li>

<li>
<a href="sales.html">
<i class="fas fa-peso-sign"></i>
<span>Sales</span>
</a>
</li>

<li>
<a href="reports.html">
<i class="fas fa-file-chart-column"></i>
<span>Reports</span>
</a>
</li>

<li>
<a href="settings.html">
<i class="fas fa-gear"></i>
<span>Settings</span>
</a>
</li>

</ul>

</div>

<div class="main">

<div class="header">

<div class="topbar">

<h1 id="dashboardTitle">
🔴 LIVE DASHBOARD
</h1>

<div id="liveClock"></div>

</div>

<div class="user">
<div class="avatar">P</div>
Admin
</div>

</div>

<div class="cards">

<div class="card">
<h3>Net Sales</h3>
<h2 id="salesToday">₱0</h2>
</div>

<div class="card">
<h3>Total Orders</h3>
<h2 id="totalOrders">0</h2>
</div>

<div class="card">
<h3>Completed Orders</h3>
<h2 id="completedOrders">0</h2>
</div>

<div class="card">
<h3>Profit</h3>
<h2 id="grossProfit">₱0</h2>
</div>

</div>

<div class="section">

<h2>Recent Orders</h2>

<table class="orders-table">

<tr>
<th>Order #</th>
<th>Customer</th>
<th>Status</th>
</tr>

<tbody id="ordersTable">

</tbody>
</table>

</div>

<div class="section">

<h2>Sales Analytics</h2>

<p>
Ready for Chart.js integration
</p>

</div>

</div>
<script>

setInterval(()=>{

document.getElementById(
"liveClock"
).innerText=

new Date()
.toLocaleString();

},1000);

const firebaseConfig = {

apiKey:"AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain:"papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId:"papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId:"831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

function peso(num){

return "₱"+
Number(num||0).toLocaleString();

}
 
firebase.database()
.ref("orders")
.on("value",snapshot=>{

let sales=0;
let orders=0;
let completed=0;

const table=
document.getElementById(
"ordersTable"
);

table.innerHTML="";

snapshot.forEach(child=>{

const order=
child.val();

orders++;

if(
(order.status||"")
.toUpperCase()==="DELIVERED"
){
completed++;
}

(order.items||[])
.forEach(item=>{

sales+=
Number(item.price||0)
*
Number(item.qty||1);

});

table.innerHTML += `

<tr>

<td>
${order.trackingnumber||"-"}
</td>

<td>
${order.customer||"-"}
</td>

<td>

<span class="status ${
(order.status||"").toUpperCase()==="DELIVERED"
? "done"
:
(order.status||"").toUpperCase()==="READY"
? "ready"
: "new"
}">

${order.status||"NEW"}

</span>

</td>

</tr>

`;

});

document.getElementById(
"salesToday"
).innerText=
peso(sales);

document.getElementById(
"totalOrders"
).innerText=
orders;

document.getElementById(
"completedOrders"
).innerText=
completed;

document.getElementById(
"grossProfit"
).innerText=
peso(sales);

});

</script>
</body>
</html>
