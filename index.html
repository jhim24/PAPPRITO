<!DOCTYPE html>
<html>
<head>
<title>TikTok Promo Reel</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
}

/* 🔥 BACKGROUND BLUR */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(25px) brightness(0.6);
    transform:scale(1.2);
    transition:opacity 1s;
}

/* CENTER POSTER */
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:300px;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    animation: float 4s ease-in-out infinite;
    transition:opacity 1s;
}

@keyframes float{
    0%{ transform:translate(-50%, -50%); }
    50%{ transform:translate(-50%, -60%); }
    100%{ transform:translate(-50%, -50%); }
}

/* TEXT */
.title{
    position:absolute;
    top:80px;
    width:100%;
    text-align:center;
    color:#fff;
    font-size:40px;
    font-weight:bold;
}

/* PRICE */
.price{
    position:absolute;
    right:30px;
    top:50%;
    transform:translateY(-50%);
    background:red;
    padding:20px;
    border-radius:50%;
    color:#fff;
    font-size:25px;
    font-weight:bold;
}

/* BADGE */
.badge{
    position:absolute;
    left:20px;
    top:20px;
    background:orange;
    padding:10px 15px;
    border-radius:20px;
    font-weight:bold;
}

/* FADE EFFECT */
.fade{
    opacity:0;
}
</style>

</head>

<body>

<img id="bg" src="rapsilog.jpg" class="bg">
<img id="center" src="rapsilog.jpg" class="center">

<div class="title" id="title">Rapsilog</div>
<div class="price" id="price">₱85</div>
<div class="badge">NEW</div>

<script>
const items = [
    {
        title:"Rapsilog",
        price:"₱85",
        img:"rapsilog.jpg"
    },
    {
        title:"Chicken Meal",
        price:"₱99",
        img:"rapsilog.jpg"
    },
    {
        title:"Burger Combo",
        price:"₱79",
        img:"rapsilog.jpg"
    }
];

let i = 0;

setInterval(()=>{
    i = (i + 1) % items.length;

    const bg = document.getElementById("bg");
    const center = document.getElementById("center");

    // fade out
    bg.classList.add("fade");
    center.classList.add("fade");

    setTimeout(()=>{
        bg.src = items[i].img;
        center.src = items[i].img;
        document.getElementById("title").innerText = items[i].title;
        document.getElementById("price").innerText = items[i].price;

        // fade in
        bg.classList.remove("fade");
        center.classList.remove("fade");
    },500);

},4000);
</script>

</body>
</html>
