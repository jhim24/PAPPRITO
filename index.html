<!DOCTYPE html>
<html>
<head>
<title>PAPAPRITO POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HEADER */
.header{
    background:#d62828;
    color:#fff;
    text-align:center;
    font-size:30px;
    padding:15px;
}

/* ADMIN */
.admin-btn{
    position:absolute;
    top:10px;
    right:10px;
}

/* LAYOUT */
.container{
    display:flex;
    flex:1;
}

/* SIDEBAR */
.sidebar{
    width:150px;
    background:#111;
    color:#fff;
    padding:10px;
}

.menu-item{
    padding:10px;
    margin:5px 0;
    cursor:pointer;
}

.menu-item:hover{
    background:#ffcc00;
    color:#000;
}

/* MAIN */
.main{
    flex:1;
    padding:15px;
    background:#f5f5f5;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:#fff;
    padding:15px;
    border-radius:10px;
    border:2px solid #ffcc00;
    text-align:center;
}

.card:hover{
    border-color:red;
}

/* NAME */
.card h3{
    background:#ffcc00;
    padding:5px;
    border-radius:6px;
}

/* PRICE */
.price{
    background:red;
    color:#fff;
    padding:5px;
    border-radius:6px;
    display:inline-block;
    margin-top:5px;
}

/* UPLOAD */
.upload{
    display:none;
    margin-top:5px;
}

.admin-mode .upload{
    display:block;
}

/* PREVIEW */
.details{
    width:260px;
    padding:15px;
    background:linear-gradient(#fff,#ffe5e5);
    box-shadow:-5px 0 20px rgba(255,0,0,0.2);
}

.details img{
    width:100%;
    border-radius:10px;
}

.details .price{
    box-shadow:0 0 15px red;
}
</style>
</head>

<body>

<div class="header">PAPAPRITO</div>
<button class="admin-btn" onclick="toggleAdmin()">ADMIN</button>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <div onclick="loadMenu('beef')" class="menu-item">Beef</div>
    <div onclick="loadMenu('pork')" class="menu-item">Pork</div>
    <div onclick="loadMenu('chicken')" class="menu-item">Chicken</div>
    <div onclick="loadMenu('seafood')" class="menu-item">Seafood</div>
    <div onclick="loadMenu('veggies')" class="menu-item">Veggies</div>
    <div onclick="loadMenu('noodles')" class="menu-item">Noodles</div>
    <div onclick="loadMenu('sides')" class="menu-item">Sides</div>
    <div onclick="loadMenu('drinks')" class="menu-item">Drinks</div>
    <div onclick="loadMenu('beers')" class="menu-item">Beers</div>
</div>

<!-- MAIN -->
<div class="main" id="main">
    <div class="cards" id="menu"></div>
</div>

<!-- PREVIEW -->
<div class="details">
    <img id="img">
    <h2 id="name">Select Item</h2>
    <p class="price" id="price">₱0</p>
</div>

</div>

<script>

let isAdmin=false;
let currentCategory="";
let saved = localStorage.getItem("menuData");

let menuData = saved ? JSON.parse(saved) : {

beef:[
{name:"Bulalo Grupo",price:710,img:""},
{name:"Bulalo Solo",price:185,img:""},
{name:"Bistek Tagalog",price:279,img:""}
],

pork:[
{name:"Lechon Kawali",price:395,img:""},
{name:"Pork Sisig",price:315,img:""}
],

chicken:[
{name:"Chicken Meal",price:295,img:""}
],

seafood:[
{name:"Bangus",price:315,img:""}
],

veggies:[
{name:"Chop Suey",price:235,img:""}
],

noodles:[
{name:"Palabok",price:195,img:""}
],

sides:[
{name:"Garlic Rice",price:46,img:""}
],

drinks:[
{name:"Softdrinks",price:52,img:""}
],

beers:[
{name:"Red Horse",price:105,img:""}
]

};

function saveData(){
    localStorage.setItem("menuData",JSON.stringify(menuData));
}

function loadMenu(category){
    currentCategory=category;
    let container=document.getElementById("menu");
    container.innerHTML="";

    menuData[category].forEach((item,i)=>{
        let card=document.createElement("div");
        card.className="card";

        let hasImage = item.img 
        ? `<img src="${item.img}" style="width:40px;height:40px;border-radius:5px;margin-top:5px;">`
        : "";

        card.innerHTML=`
            <h3>${item.name}</h3>
            <p class="price">₱${item.price}</p>
            ${hasImage}
            <input type="file" class="upload">
        `;

        /* CLICK */
        card.querySelector("h3").onclick=()=>{
            selectItem(item.name,item.price,item.img);
        };

        /* UPLOAD */
        card.querySelector(".upload").onchange=(e)=>{
            uploadImage(e,i);
        };

        container.appendChild(card);
    });

    applyAdminUI();
}

function selectItem(name,price,img){
    document.getElementById("name").innerText=name;
    document.getElementById("price").innerText="₱"+price;
    document.getElementById("img").src=img || "";
}

function toggleAdmin(){
    isAdmin=!isAdmin;
    applyAdminUI();
}

function applyAdminUI(){
    const main=document.getElementById("main");
    if(isAdmin){
        main.classList.add("admin-mode");
    }else{
        main.classList.remove("admin-mode");
    }
}

/* SAVE ONLY */
function uploadImage(event,index){
    let file = event.target.files[0];
    if(!file) return;

    let reader = new FileReader();

    reader.onload = function(e){
        menuData[currentCategory][index].img = e.target.result;
        saveData();
    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
