<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO POS V3</title>
  
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef1f5;
height:100vh;
overflow:hidden;
}

/* TOPBAR */

.topbar{
height:70px;
background:#2f3b4f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
color:white;
}

.logo{
font-size:28px;
font-weight:bold;
}

.search-box{
width:500px;
}

.search-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
}

/* MAIN */

.container{
display:flex;
height:calc(100vh - 70px);
}

/* LEFT */

.left{
flex:1;
padding:20px;
overflow:auto;
}

/* CATEGORY */

.categories{
display:flex;
gap:10px;
margin-bottom:20px;
overflow-x:auto;
}

.categories button{
padding:12px 20px;
border:none;
border-radius:10px;
background:white;
cursor:pointer;
font-weight:bold;
}

.categories button.active{
background:#4a90e2;
color:white;
}

/* PRODUCTS */

.products-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.product-card{
background:white;
border-radius:12px;
overflow:hidden;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,.1);
transition:.3s;
}

.product-card:hover{
transform:translateY(-5px);
}

.product-card img{
width:100%;
height:180px;
object-fit:cover;
}

.product-name{
padding:12px;
text-align:center;
font-weight:bold;
}

.product-price{
background:#2f3b4f;
color:white;
padding:12px;
text-align:center;
font-size:18px;
font-weight:bold;
}

/* RIGHT CART */

.right{
width:420px;
background:white;
border-left:1px solid #ddd;
display:flex;
flex-direction:column;
}

.cart-header{
background:#2f3b4f;
color:white;
padding:20px;
font-size:30px;
font-weight:bold;
}

.cart-body{
padding:20px;
flex:1;
overflow:auto;
}

.cart-body input,
.cart-body select{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
}

.cart-items{
margin-top:15px;
}

.cart-item{
padding:12px;
border-bottom:1px solid #eee;
}

.total{
font-size:32px;
font-weight:bold;
margin-top:20px;
color:#4a90e2;
}

.checkout-btn{
width:100%;
padding:20px;
background:#4a90e2;
color:white;
border:none;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.container{
flex-direction:column;
}

.right{
width:100%;
height:45vh;
}

.products-grid{
grid-template-columns:
repeat(2,1fr);
}

.search-box{
width:200px;
}

}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo">
🍔 PAPPRITO
</div>

<div class="search-box">
<input
type="text"
placeholder="Search Menu">
</div>

</div>

<!-- MAIN -->

<div class="container">

<!-- LEFT -->

<div class="left">

<div
class="categories"
id="categories">
</div>
  
<div
class="products-grid"
id="productsGrid">
</div>

</div>

<!-- RIGHT -->
  
<div class="right">

<div class="cart-header">
DINE-IN
</div>

<div class="cart-body">

<input
id="customerName"
placeholder="Customer Name">

<select id="tableNumber">
<option>Table 1</option>
<option>Table 2</option>
<option>Table 3</option>
</select>

<select id="orderType">
<option>DINE IN</option>
<option>TAKE OUT</option>
<option>DELIVERY</option>
</select>

<div
class="cart-items"
id="cartItems">

</div>

<div
class="total"
id="total">

₱0

</div>

</div>

<button class="checkout-btn">

PROCEED TO KITCHEN

</button>

</div>

</div>
<script>

const firebaseConfig={
apiKey:"AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",
authDomain:"papprito-orders.firebaseapp.com",
databaseURL:"https://papprito-orders-default-rtdb.firebaseio.com",
projectId:"papprito-orders",
storageBucket:"papprito-orders.firebasestorage.app",
messagingSenderId:"831941801424",
appId:"1:831941801424:web:40a99cdfb312dac2d275d5"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let cart=[];
let allProducts=[];

/* LOAD PRODUCTS */

db.ref("products")
.on("value",snapshot=>{

const productsData=snapshot.val();

if(!productsData) return;

allProducts=[];

let categories=[];

Object.keys(productsData)
.forEach(key=>{

const product=productsData[key];

allProducts.push(product);

if(
product.category &&
!categories.includes(product.category)
){
categories.push(product.category);
}

});

renderCategories(categories);

showCategory("ALL");

});

/* CATEGORIES */

function renderCategories(categories){

let html=`
<button onclick="showCategory('ALL')">
ALL
</button>
`;

categories.forEach(cat=>{

html+=`
<button onclick="showCategory('${cat}')">
${cat}
</button>
`;

});

document.getElementById(
"categories"
).innerHTML=html;

}

/* SHOW PRODUCTS */

function showCategory(category){

let html="";

let products=allProducts;

if(category!=="ALL"){

products=
allProducts.filter(
item=>item.category===category
);

}

products.forEach(product=>{

html+=`

<div
class="product-card"
onclick="addToCart(
'${(product.name||"").replace(/'/g,"")}',
${product.price||0}
)">

<img src="${product.image||''}">

<div class="product-name">
${product.name||''}
</div>

<div class="product-price">
₱${product.price||0}
</div>

</div>

`;

});

document.getElementById(
"productsGrid"
).innerHTML=html;

}

/* ADD TO CART */

function addToCart(name,price){

const existing=
cart.find(
item=>item.name===name
);

if(existing){

existing.qty++;

}else{

cart.push({
name:name,
price:Number(price),
qty:1
});

}

renderCart();

}

/* RENDER CART */

function renderCart(){

let html="";
let total=0;

cart.forEach((item,index)=>{

total+=item.price*item.qty;

html+=`

<div class="cart-item">

<b>${item.name}</b>

<br>

${item.qty} x ₱${item.price}

<br>

₱${item.qty*item.price}

<br><br>

<button
onclick="removeItem(${index})"
style="
background:red;
color:white;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
">

Delete

</button>

</div>

`;

});

document.getElementById(
"cartItems"
).innerHTML=html;

document.getElementById(
"total"
).innerText=
"₱"+total;

}

/* DELETE */

function removeItem(index){

cart.splice(index,1);

renderCart();

}

</script>
</body>
</html>
