<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    display: flex;
    background: #0d0d0d;
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: #111;
    padding: 20px;
}

.sidebar h2 {
    color: #ff3b3b;
}

.sidebar ul {
    list-style: none;
    margin-top: 30px;
}

.sidebar li {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.sidebar li:hover,
.active {
    background: linear-gradient(45deg, red, yellow);
    color: black;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    padding: 15px;
    border-radius: 15px;
    color: black;
    font-weight: bold;
}

.red { background: #ff3b3b; }
.yellow { background: #ffcc00; }
.orange { background: #ff6b00; }
.light { background: #ffd966; }

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

.box {
    width: 200px;
    background: #1a1a1a;
    padding: 15px;
    border-radius: 15px;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 0 10px rgba(255,0,0,0.3);
}

.box:hover {
    transform: scale(1.05);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 20px red;
}

.close {
    float: right;
    cursor: pointer;
    color: red;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🔥 Foodie</h2>
    <ul>
        <li class="active" onclick="showDashboard()">Dashboard</li>
        <li onclick="showMenu()">Menu</li>
        <li>Orders</li>
        <li>Analytics</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">

    <div id="content"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">×</span>
        <h3 id="modalName"></h3>
        <p id="modalPrice"></p>
    </div>
</div>

<script>

/* MENU DATA */
const menu = {
    "BEEF": [["Bulalo Grupo",710],["Bulalo Solo",185],["Bistek Tagalog",279]],
    "PORK": [["Lechon Kawali",395],["Pork Sisig",315],["Lumpiang Shanghai",235]],
    "CHICKEN": [["PapsChicken Platter",315],["Chicken Sisig",295]],
    "SEAFOOD": [["Crispy Bangusarap",315],["Calamares",305],["Crispy Tawilis",285]],
    "VEGGIES": [["Chop Suey",235],["Tortang Talong",192]],
    "NOODLES": [["Canton-Bihon",278],["Palabok",195],["Beef Mami",159],["Chicken Mami",149]],
    "SIDES": [["PapShots",72],["Spicy Tofu",65]],
    "DRINKS": [["Iced Tea",52],["Coffee",59]]
};

/* DASHBOARD VIEW */
function showDashboard() {
    document.getElementById("content").innerHTML = `
        <div class="header">
            <h2>Welcome, Chef 👨‍🍳</h2>
        </div>

        <div class="cards">
            <div class="card red">$11,256<br>Revenue</div>
            <div class="card yellow">245<br>Orders</div>
            <div class="card orange">$6,556<br>Expenses</div>
            <div class="card light">$4,227<br>Profit</div>
        </div>

        <h3>🔥 Trending</h3>
        <div class="grid">
            <div class="box">Chicken Meal</div>
            <div class="box">Healthy Bowl</div>
            <div class="box">Rice Combo</div>
        </div>
    `;
}

/* MENU (CATEGORY VIEW) */
function showMenu() {
    let html = `<h2>Menu Categories</h2><div class="grid">`;

    for (let cat in menu) {
        html += `<div class="box" onclick="showProducts('${cat}')">${cat}</div>`;
    }

    html += `</div>`;
    document.getElementById("content").innerHTML = html;
}

/* PRODUCTS VIEW */
function showProducts(cat) {
    let html = `<h2>${cat}</h2><div class="grid">`;

    menu[cat].forEach(item => {
        html += `
            <div class="box" onclick="openModal('${item[0]}', ${item[1]})">
                ${item[0]}<br>₱${item[1]}
            </div>
        `;
    });

    html += `</div>`;
    document.getElementById("content").innerHTML = html;
}

/* MODAL */
function openModal(name, price) {
    document.getElementById("modalName").innerText = name;
    document.getElementById("modalPrice").innerText = "₱" + price;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

/* LOAD DEFAULT */
showDashboard();

</script>

</body>
</html>
