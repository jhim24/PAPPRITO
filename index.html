<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAPPRITO Restaurant Tagaytay</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#111;color:white;padding-top:70px;padding-bottom:75px;}

/* ================= NAVBAR ================= */
.navbar{
    position:fixed;top:0;width:100%;
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 20px;background:#d71920;z-index:10000;
}
.logo-container{display:flex;align-items:center;gap:10px;}
.logo-container img{width:45px;height:45px;}
.logo-container span{font-weight:bold;font-size:20px;}
.nav-links{display:flex;gap:15px;flex-wrap:wrap;}
.nav-links a{color:white;text-decoration:none;font-size:14px;}

/* ================= HERO ================= */
.hero{
    height:60vh;
    background:url('restaurant-hero.jpg') center/cover;
    display:flex;align-items:center;justify-content:center;text-align:center;
}
.hero h1{font-size:45px;}

/* ================= SECTION ================= */
.section{padding:40px 20px;}
.section h2{text-align:center;margin-bottom:20px;}

/* ================= GRID ================= */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

/* ================= CARD ================= */
.card{
    background:#1a1a1a;border-radius:10px;overflow:hidden;text-align:center;
}
.card img{width:100%;height:200px;object-fit:cover;}
.card h3{background:#ffcc00;color:black;padding:10px;}
.card p{background:#d71920;padding:10px;color:white;}

/* ================= EVENTS ================= */
.events-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
.event-card{
    background:#1a1a1a;padding:20px;border-radius:10px;text-align:center;
}

/* ================= SLIDER ================= */
.slide{display:none;}
.slide.active{display:block;}

/* ================= MENU ================= */
.menu-modal{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,0.85);
    padding-top:100px;
    z-index:9999;
}

.menu-left{
    background:#d71920;
    padding:10px;
    display:flex;
    gap:10px;
    overflow-x:auto;
}

.menu-left li{
    list-style:none;
    padding:6px 12px;
    background:white;
    color:black;
    border-radius:5px;
    cursor:pointer;
}

.menu-center{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;
    padding:15px;
}

.menu-card{
    background:#fff;border-radius:10px;overflow:hidden;
}
.menu-card img{width:100%;height:180px;object-fit:cover;}
.menu-info h4{background:#f4c542;padding:5px;color:black;}
.menu-info p{background:#d71920;padding:5px;color:white;}

.close-menu{
    position:fixed;
    top:110px;right:20px;
    background:red;color:white;
    padding:10px 15px;
    border:none;border-radius:8px;
}

/* ================= IMAGE ================= */
.image-modal{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}
.image-modal img{max-width:90%;max-height:80%;}
.close-image{
    position:absolute;top:20px;right:20px;font-size:25px;
}

/* ================= SOCIAL ================= */
.social-buttons{
    position:fixed;
    bottom:80px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}
.social-buttons a{
    width:50px;height:50px;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;color:white;font-size:20px;
}
.fb{background:#1877F2;}
.ig{background:linear-gradient(45deg,#feda75,#d62976,#962fbf,#4f5bd5);}

/* ================= FOOTER ================= */
.footer-payment{
    position:fixed;
    bottom:0;width:100%;
    background:#d40d13;
    text-align:center;
    padding:5px;
}

/* ================= MOBILE ================= */
@media (max-width:768px){

.hero{height:45vh;}

.grid{
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.navbar{
    flex-direction:column;
    align-items:flex-start;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo-container">
        <img src="papprito-logo.jpg">
        <span>PAPPRITO</span>
    </div>

    <div class="nav-links">
        <a href="#home">HOME</a>
        <a href="#" onclick="openMenu()">MENU</a>
        <a href="#" onclick="openContact()">CONTACT</a>
        <a href="#" onclick="openModal('core')">CORE VALUES</a>
        <a href="#" onclick="openModal('vision')">VISION</a>
        <a href="#" onclick="openModal('mission')">MISSION</a>
        <a href="#" onclick="openModal('about')">ABOUT</a>
        <a href="gallery.html">GALLERY</a>
    </div>
</div>

<!-- HERO -->
<div class="hero" id="home">
    <h1>PAPPRITO RESTAURANT</h1>
</div>

<!-- NEW PRODUCTS -->
<div class="section">
<h2>🔥 New Products</h2>
<div class="grid">
<div class="card" onclick="openProduct('Spaghetti','₱85','spaghetti.jpg')">
<img src="spaghetti.jpg">
<h3>Spaghetti</h3>
<p>₱85</p>
</div>
</div>
</div>

<!-- DINING -->
<div class="section">
<h2>OUR DINING SPACES</h2>
<div class="grid">
<div class="card"><img src="main-dining.jpg"><h3>Main Dining</h3></div>
<div class="card"><img src="roof-deck.jpg"><h3>Roof Deck</h3></div>
</div>
</div>

<!-- EVENTS -->
<div class="section">
<h2>Events & Announcement</h2>
<div class="events-container">
<div class="event-card">Promo</div>
<div class="event-card">Holiday</div>
</div>
</div>

<!-- MENU -->
<div id="menuModal" class="menu-modal">
<button class="close-menu" onclick="closeMenu()">✖</button>
<ul class="menu-left">
<li onclick="showCategory('beef')">Beef</li>
<li onclick="showCategory('pork')">Pork</li>
</ul>
<div id="menuProducts" class="menu-center"></div>
</div>

<!-- IMAGE -->
<div id="imageModal" class="image-modal">
<span class="close-image" onclick="closeImageModal()">✖</span>
<img id="modalImg">
</div>

<!-- SOCIAL -->
<div class="social-buttons">
<a href="#" class="fb"><i class="fab fa-facebook-f"></i></a>
<a href="#" class="ig"><i class="fab fa-instagram"></i></a>
</div>

<!-- FOOTER -->
<div class="footer-payment">
© 2026 PAPPRITO All Rights Reserved
</div>

<script>

/* MENU */
let products={
beef:[{name:"Bulalo",price:"₱185",img:"bulalo.jpg"}],
pork:[{name:"Sisig",price:"₱315",img:"sisig.jpg"}]
};

function openMenu(){
document.getElementById("menuModal").style.display="block";
showCategory('beef');
}
function closeMenu(){
document.getElementById("menuModal").style.display="none";
}
function showCategory(cat){
let c=document.getElementById("menuProducts");
c.innerHTML="";
products[cat].forEach(p=>{
c.innerHTML+=`
<div class="menu-card" onclick="openImageModal('${p.img}')">
<img src="${p.img}">
<div class="menu-info">
<h4>${p.name}</h4>
<p>${p.price}</p>
</div>
</div>`;
});
}

/* IMAGE */
function openImageModal(img){
document.getElementById("imageModal").style.display="flex";
document.getElementById("modalImg").src=img;
}
function closeImageModal(){
document.getElementById("imageModal").style.display="none";
}

/* PRODUCT */
function openProduct(name,price,img){
openImageModal(img);
}

/* MODALS */
function openModal(type){alert(type);}
function openContact(){alert("contact");}

</script>

</body>
</html>
