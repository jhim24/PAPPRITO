<!DOCTYPE html>
<html>
<head>
<title>PAPAPRITO POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    background:#d62828;
    color:#fff;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    padding:15px;
}

/* ADMIN BUTTON */
.admin-btn{
    position:absolute;
    top:10px;
    right:10px;
    padding:8px;
    background:#000;
    color:#fff;
    border:none;
    border-radius:6px;
}

/* LAYOUT */
.container{
    flex:1;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:150px;
    background:#111;
    color:#fff;
    padding:10px;
}

.menu-item{
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    cursor:pointer;
}

.menu-item:hover{
    background:#ffcc00;
    color:#000;
}

/* MAIN */
.main{
    flex:1;
    padding:15px;
    background:#f5f5f5;
}

/* GRID */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:#fff;
    padding:15px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    border:2px solid #ffcc00;
}

.card:hover{
    transform:scale(1.05);
    border-color:red;
}

/* NAME */
.card h3{
    background:#ffcc00;
    padding:6px;
    border-radius:6px;
}

/* PRICE */
.price{
    background:red;
    color:#fff;
    padding:5px 10px;
    border-radius:6px;
    display:inline-block;
    margin-top:8px;
}

/* UPLOAD BUTTON */
.upload-btn{
    margin-top:5px;
    font-size:12px;
    display:none;
}

/* RIGHT PANEL */
.details{
    width:260px;
    padding:15px;
    background:linear-gradient(#fff,#ffe5e5);
    box-shadow:-5px 0 20px rgba(255,0,0,0.2);
}

.details img{
    width:100%;
    border-radius:10px;
}

.details .price{
    box-shadow:0 0 15px red;
    font-size:20px;
}

.btn{
    width:100%;
    padding:12px;
    background:#ff9f1c;
    border:none;
    color:#fff;
    border-radius:8px;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="header">PAPAPRITO</div>
<button class="admin-btn" onclick="toggleAdmin()">ADMIN</button>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="menu-item" onclick="loadMenu('beef')">Beef</div>
    <div class="menu-item" onclick="loadMenu('pork')">Pork</div>
    <div class="menu-item" onclick="loadMenu('chicken')">Chicken</div>
    <div class="menu-item" onclick="loadMenu('seafood')">Seafood</div>
    <div class="menu-item" onclick="loadMenu('veggies')">Veggies</div>
    <div class="menu-item" onclick="loadMenu('noodles')">Noodles</div>
    <div class="menu-item" onclick="loadMenu('sides')">Sides</div>
    <div class="menu-item" onclick="loadMenu('drinks')">Drinks</div>
    <div class="menu-item" onclick="loadMenu('beers')">Beers</div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="cards" id="menu"></div>
</div>

<!-- PREVIEW -->
<div class="details">
    <img id="img" src="rapsilog.jpg">
    <h2 id="name">Select Item</h2>
    <p class="price" id="price">₱0</p>
    <button class="btn">Add to Cart</button>
</div>

</div>

<script>

let isAdmin = false;
let currentCategory = "";

/* MENU DATA */
const menuData = {
beef:[
{name:"Bulalo Grupo",price:710,img:""},
{name:"Bulalo Solo",price:185,img:""},
{name:"Bistek Tagalog",price:279,img:""}
],
pork:[
{name:"Lechon Kawali",price:395,img:""},
{name:"Pork Sisig",price:315,img:""}
],
chicken:[
{name:"Chicken Meal",price:295,img:""}
],
seafood:[
{name:"Bangus",price:315,img:""}
],
veggies:[
{name:"Chop Suey",price:235,img:""}
],
noodles:[
{name:"Palabok",price:195,img:""}
],
sides:[
{name:"Garlic Rice",price:46,img:""}
],
drinks:[
{name:"Softdrinks",price:52,img:""}
],
beers:[
{name:"Red Horse",price:105,img:""}
]
};

function loadMenu(category){
    currentCategory = category;
    let container = document.getElementById("menu");
    container.innerHTML = "";

    menuData[category].forEach((item,index)=>{
        container.innerHTML += `
        <div class="card">
            <h3 onclick="selectItem('${item.name}',${item.price},'${item.img}')">${item.name}</h3>
            <p class="price">₱${item.price}</p>

            <input type="file" class="upload-btn" onchange="uploadImage(event,${index})">
        </div>
        `;
    });

    toggleAdmin();
}

function selectItem(name,price,img){
    document.getElementById("name").innerText = name;
    document.getElementById("price").innerText = "₱"+price;
    document.getElementById("img").src = img || "rapsilog.jpg";
}

function toggleAdmin(){
    isAdmin = !isAdmin;
    document.querySelectorAll('.upload-btn').forEach(btn=>{
        btn.style.display = isAdmin ? "block" : "none";
    });
}

function uploadImage(event,index){
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e){
        menuData[currentCategory][index].img = e.target.result;
    }

    if(file){
        reader.readAsDataURL(file);
    }
}

</script>

</body>
</html>
