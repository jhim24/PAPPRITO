<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PAPPRITO DASHBOARD</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#111827,
#1e293b
);

display:flex;

min-height:100vh;

color:white;

}

/* SIDEBAR */
.sidebar{

width:230px;

background:
linear-gradient(
180deg,
#020617,
#0f172a,
#111827
);

color:white;

padding:20px;

border-right:
1px solid rgba(255,255,255,0.08);

box-shadow:
5px 0 20px rgba(0,0,0,0.25);

}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
color:#ffcc00;
}

.menu{
list-style:none;
}

.menu li{
padding:14px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
transition:0.3s;
}

.menu li:hover{

background:
linear-gradient(
135deg,
#1e293b,
#334155
);

transform:translateX(5px);

}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow:auto;
}

/* TOP */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.topbar h1{
font-size:28px;
}

/* DASHBOARD GRID */
.dashboard-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

margin-bottom:20px;
}

/* CARD */
.card{
padding:20px;
border-radius:18px;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h3{
font-size:14px;
margin-bottom:10px;
}

.card p{
font-size:30px;
font-weight:bold;
}

/* COLORS */
.red{
background:linear-gradient(135deg,#ff4b5c,#ff6b81);
}

.blue{
background:linear-gradient(135deg,#1e90ff,#3742fa);
}

.green{
background:linear-gradient(135deg,#2ed573,#1dd1a1);
}

.purple{
background:linear-gradient(135deg,#a55eea,#8854d0);
}

/* TABLE */
.orders-section{

background:
linear-gradient(
135deg,
#111827,
#1e293b
);

padding:20px;

border-radius:18px;

box-shadow:
0 5px 20px rgba(0,0,0,0.35);

border:
1px solid rgba(255,255,255,0.08);

color:white;

}
.orders-section h2{
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th{

background:
linear-gradient(
135deg,
#334155,
#1e293b
);

color:#ffcc00;

padding:12px;

font-size:13px;

border-bottom:
1px solid rgba(255,255,255,0.08);

}
td{

padding:10px;

border-bottom:
1px solid rgba(255,255,255,0.08);

font-size:12px;

text-align:center;

color:white;

}

.status{
padding:5px 10px;
border-radius:20px;
color:white;
font-size:11px;
font-weight:bold;
display:inline-block;
}

.NEW{
background:#ff4757;
}

.ACCEPTED{
background:#2ed573;
}

.PREPARING{
background:#ffa502;
}

.READY{
background:#1e90ff;
}

.DELIVERED{
background:#57606f;
}
/* BUTTONS */
.accept-btn,
.preparing-btn,
.ready-btn,
.done-btn,
.delete-btn{

border:none;

padding:6px 10px;

border-radius:25px;

font-size:10px;

cursor:pointer;

color:white;

margin:2px;

font-weight:bold;

transition:0.3s;

box-shadow:
0 3px 8px rgba(0,0,0,0.15);

}

/* HOVER EFFECT */
.accept-btn:hover,
.preparing-btn:hover,
.ready-btn:hover,
.done-btn:hover,
.delete-btn:hover{

transform:translateY(-2px) scale(1.05);

opacity:0.9;

}

/* ACCEPT */
.accept-btn{

background:
linear-gradient(135deg,#2ed573,#17c964);

}

/* PREPARING */
.preparing-btn{

background:
linear-gradient(135deg,#ffa502,#ff7f50);

}

/* READY */
.ready-btn{

background:
linear-gradient(135deg,#1e90ff,#3742fa);

}

/* DONE */
.done-btn{

background:
linear-gradient(135deg,#57606f,#747d8c);

}

/* DELETE */
.delete-btn{

background:
linear-gradient(135deg,#ff4757,#ff6b81);

}
/* MOBILE */
@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
}

.dashboard-grid{
grid-template-columns:1fr 1fr;
}

table{
font-size:10px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
🍔 PAPPRITO
</div>

<ul class="menu">

<li onclick="showPage('dashboardPage')">
📊 Dashboard
</li>

<li onclick="showPage('ordersPage')">
🧾 Live Orders
</li>

<li>💰 Sales</li>

<li>📦 Completed</li>

<li>📈 Reports</li>

<li>⚙️ Settings</li>

</ul>

</div>

<!-- MAIN -->
<div class="main">

<!-- TOP -->
<div class="topbar">

<h1>
Dashboard Overview
</h1>

</div>
<div id="dashboardPage">
  
<!-- DASHBOARD CARDS -->
<div class="dashboard-grid">

<div class="card red">

<h3>Net Sales Today</h3>

<p id="salesToday">
₱0
</p>

</div>

<div class="card blue">

<h3>Total Orders</h3>

<p id="totalOrders">
0
</p>

</div>

<div class="card green">

<h3>Completed Orders</h3>

<p id="completedOrders">
0
</p>

</div>

<div class="card purple">

<h3>Gross Profit</h3>

<p id="grossProfit">
₱0
</p>

</div>

</div>
</div>
<!-- LIVE ORDERS -->
<div id="ordersPage" style="display:none;">

<div class="orders-section">

<h2>
🧾 Live Orders
</h2>

<table>

<thead>

<tr>

<th>Order #</th>

<th>Product</th>

<th>Qty</th>

<th>Amount</th>

<th>Status</th>

<th>Time</th>
  
<th>Action</th>
</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

<script>
  function showPage(pageId){

document.getElementById("dashboardPage")
.style.display = "none";

document.getElementById("ordersPage")
.style.display = "none";

document.getElementById(pageId)
.style.display = "block";

}
/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain: "papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId: "papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId: "831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

const table =
document.getElementById("ordersTable");

/* LIVE DATA */
firebase.database()
.ref("orders")
.on("value", snapshot=>{

table.innerHTML = "";

let sales = 0;

let totalOrders = 0;

let completed = 0;

snapshot.forEach(child=>{

const order = child.val();

const orderId =
child.key.slice(-5);

totalOrders++;

sales += Number(order.total);

if(order.status === "DELIVERED"){

completed++;

}

order.items.forEach(item=>{

table.innerHTML += `

<tr>

<td>
#${orderId}
</td>

<td>
${item.name}
</td>

<td>
1
</td>

<td>
₱${item.price}
</td>

<td>

<span class="status ${order.status}">

${order.status}

</span>

</td>

<td>
${order.createdAt}
</td>
<td>

<button class="accept-btn"
onclick="
updateStatus(
'${child.key}',
'ACCEPTED'
)">
ACCEPT
</button>

<button class="preparing-btn"
onclick="
updateStatus(
'${child.key}',
'PREPARING'
)">
PREP
</button>

<button class="ready-btn"
onclick="
updateStatus(
'${child.key}',
'READY'
)">
READY
</button>

<button class="done-btn"
onclick="
updateStatus(
'${child.key}',
'DELIVERED'
)">
DONE
</button>
<button class="delete-btn"
onclick="
deleteOrder(
'${child.key}'
)">
DELETE
</button>
</td>
</tr>

`;

});

});

/* UPDATE DASHBOARD */

document.getElementById("salesToday")
.innerText = "₱" + sales;

document.getElementById("totalOrders")
.innerText = totalOrders;

document.getElementById("completedOrders")
.innerText = completed;

document.getElementById("grossProfit")
.innerText = "₱" + sales;

});
function updateStatus(orderKey,status){

firebase.database()
.ref("orders/" + orderKey)
.update({

status: status

});

}
  function deleteOrder(orderKey){

if(confirm("Delete this order?")){

firebase.database()
.ref("orders/" + orderKey)
.remove();

}

}
</script>

</body>
</html>
