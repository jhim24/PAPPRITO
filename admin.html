<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO Admin Panel</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#ffffff10;
    padding:20px;
    border-radius:10px;
}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#ffcc00;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.product{
    background:#00000050;
    margin-top:10px;
    padding:10px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔒 PAPPRITO Admin</h2>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">

<select id="category">
    <option value="beef">Beef</option>
    <option value="pork">Pork</option>
    <option value="chicken">Chicken</option>
    <option value="seafood">Seafood</option>
    <option value="veggies">Veggies</option>
    <option value="noodles">Noodles</option>
    <option value="sides">Sides</option>
    <option value="drinks">Drinks</option>
    <option value="beers">Beers</option>
</select>

<input type="file" id="imageFile">
<img id="preview" style="width:100px; display:none;">

<button onclick="addProduct()">Add Product</button>

<h3>📦 Products</h3>
<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC4gsiZSRqRsLBcOplI9IRzG1wo47UoWfM",
  authDomain: "papprito-menu.firebaseapp.com",
  projectId: "papprito-menu",
  storageBucket: "papprito-menu.firebasestorage.app",
  messagingSenderId: "397381192330",
  appId: "1:397381192330:web:5a779247b09df85281bb73"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// IMAGE PREVIEW
let uploadedImage = "";

document.getElementById("imageFile").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(){
        uploadedImage = reader.result;
        document.getElementById("preview").src = uploadedImage;
        document.getElementById("preview").style.display = "block";
    };

    if(file) reader.readAsDataURL(file);
});

// ADD PRODUCT
async function addProduct(){

    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let category = document.getElementById("category").value;

    if(!name || !price || !uploadedImage){
        alert("Fill all fields!");
        return;
    }

    await addDoc(collection(db, "menu"), {
        name,
        price,
        category,
        img: uploadedImage
    });

    alert("Saved to Firebase!");

    document.getElementById("name").value="";
    document.getElementById("price").value="";
    document.getElementById("preview").style.display="none";

    loadProducts();
}

// LOAD PRODUCTS
async function loadProducts(){

    const snapshot = await getDocs(collection(db, "menu"));
    const container = document.getElementById("list");

    container.innerHTML="";

    snapshot.forEach((docSnap)=>{
        const item = docSnap.data();

        container.innerHTML += `
        <div class="product">
            <b>${item.name}</b><br>
            ₱${item.price}<br>
            <img src="${item.img}" width="80"><br>
            <button onclick="deleteProduct('${docSnap.id}')">Delete</button>
        </div>
        `;
    });
}

// DELETE
async function deleteProduct(id){
    await deleteDoc(doc(db, "menu", id));
    loadProducts();
}

// INITIAL LOAD
loadProducts();

</script>

</body>
</html>
