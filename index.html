<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie Kitchen</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{display:flex;background:#0d0d0d;color:white;}

/* SIDEBAR */
.sidebar{
    width:230px;
    background:#111;
    height:100vh;
    padding:20px;
}
.sidebar h2{color:white;}
.sidebar ul{list-style:none;margin-top:20px;}
.sidebar li{
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:10px;
}
.sidebar li:hover,.active{
    background:linear-gradient(45deg,#ffcc00,#ff3b3b);
    color:black;
}

/* MAIN */
.main{flex:1;padding:20px;}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

/* CARDS */
.cards{display:flex;gap:15px;margin-bottom:20px;}
.card{
    flex:1;
    padding:15px;
    border-radius:15px;
    color:black;
}
.green{background:#00c853;}
.purple{background:#b388ff;}
.blue{background:#448aff;}
.red{background:#ff5252;}

/* PANEL BOX */
.panel{
    background:#1a1a1a;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
}

/* TRENDING */
.trending{
    display:flex;
    gap:15px;
}
.trend-card{
    background:#111;
    padding:10px;
    border-radius:15px;
    width:200px;
}
.trend-card img{
    width:100%;
    border-radius:10px;
}

/* MENU LAYOUT */
.menu-layout{display:flex;height:100%;}

/* CATEGORY SIDEBAR */
.category-bar{
    width:180px;
    background:#1a1a1a;
    padding:10px;
}
.category{
    padding:10px;
    margin-bottom:8px;
    background:#111;
    border-radius:8px;
    cursor:pointer;
}
.category:hover{
    background:linear-gradient(45deg,red,yellow);
    color:black;
}

/* PRODUCTS */
.products{
    flex:1;
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    padding:10px;
}
.product{
    width:160px;
    background:#111;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
}
.product img{
    width:100%;
    height:120px;
    object-fit:cover;
}
.name{
    background:#ffcc00;
    color:black;
    text-align:center;
    padding:5px;
    font-weight:bold;
}
.price{
    background:#ff3b3b;
    text-align:center;
    padding:5px;
}

/* PREVIEW */
.preview{
    width:250px;
    background:#111;
    padding:15px;
}
.preview img{
    width:100%;
    border-radius:10px;
}
.preview h3{color:#ffcc00;margin-top:10px;}
.preview p{color:#ff3b3b;font-size:18px;}
    /* BACKGROUND */
body {
    display:flex;
    background: linear-gradient(135deg, #1a1a1a, #2b0f0f, #1a1a1a);
    color:white;
}

/* PRODUCTS GRID FIX */
.products {
    flex:1;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap:15px;
    padding:10px;
}

/* PRODUCT CARD FIX */
.product {
    width:100%;
    height:220px;
    background:#111;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.product img {
    width:100%;
    height:130px;
    object-fit:cover;
}

/* PREVIEW */
.preview {
    width:280px;
    position:relative;
    overflow:hidden;
}

/* BACKGROUND IMAGE */
.preview::before {
    content:"";
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    filter:blur(10px) brightness(0.4);
    z-index:0;
}

/* CONTENT */
.preview-content {
    position:relative;
    z-index:1;
    text-align:center;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="preview" id="previewBox">
    <div class="preview-content">

/* DASHBOARD */
function showDashboard(el){
setActive(el);
document.getElementById("main").innerHTML=`
<div class="header">
<h2>Welcome, Sajib 👋</h2>
</div>

<div class="cards">
<div class="card green">$11,256<br>Revenue</div>
<div class="card purple">245<br>Orders</div>
<div class="card blue">$6,556<br>Expense</div>
<div class="card red">$4,227<br>Revenue</div>
</div>

<div class="panel">
<h3>Sales Details</h3>
<p style="margin-top:10px;">(Chart placeholder)</p>
</div>

<div class="panel">
<h3>Trending Orders</h3>
<div class="trending">
<div class="trend-card">
<img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1">

</div>

</div>
</div>
</div>
`;
}

/* MENU */
function showMenu(el){
setActive(el);

let html=`<div class="menu-layout">

<div class="category-bar">`;

for(let cat in menu){
html+=`<div class="category" onclick="showProducts('${cat}')">${cat}</div>`;
}

html+=`</div>

<div class="products" id="products"></div>

<div class="preview">
<h3>Preview</h3>
<img id="pimg">
<h3 id="pname">Select product</h3>
<p id="pprice"></p>
</div>

</div>`;

document.getElementById("main").innerHTML=html;
}

/* PRODUCTS */
function showProducts(cat){
let box=document.getElementById("products");
box.innerHTML="";

menu[cat].forEach(item=>{
box.innerHTML+=`
<div class="product" onclick="preview('${item[0]}','${item[1]}','${item[2]}')">
<img src="${item[2]}">
<div class="name">${item[0]}</div>
<div class="price">₱${item[1]}</div>
</div>`;
});
}

/* PREVIEW */
function preview(name,price,img){
document.getElementById("pimg").src=img;
document.getElementById("pname").innerText=name;
document.getElementById("pprice").innerText="₱"+price;
}

/* ACTIVE MENU */
function setActive(el){
document.querySelectorAll(".sidebar li").forEach(li=>li.classList.remove("active"));
el.classList.add("active");
}

/* INIT */
showDashboard(document.querySelector(".sidebar li"));

</script>
