<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAPPRITO Gallery</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
}

/* TITLE */
h1{
    text-align:center;
    padding:20px;
}

/* GALLERY GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:20px;
}

/* IMAGE */
.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.modal img{
    max-width:90%;
    max-height:80%;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>📸 PAPPRITO GALLERY</h1>

<div class="gallery">

    <img src="food1.jpg" onclick="openImg(this.src)">
    <img src="food2.jpg" onclick="openImg(this.src)">
    <img src="food3.jpg" onclick="openImg(this.src)">
    <img src="food4.jpg" onclick="openImg(this.src)">
    <img src="food5.jpg" onclick="openImg(this.src)">
    <img src="food6.jpg" onclick="openImg(this.src)">

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeImg()">
    <span class="close">✖</span>
    <img id="modalImg">
</div>

<script>
function openImg(src){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalImg").src = src;
}

function closeImg(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
