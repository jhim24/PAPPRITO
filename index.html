<!DOCTYPE html>
<html>
<head>
<title>Pappprito Ultimate Fixed</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family: Arial;
    background:#000;
}

/* ✅ BACKGROUND FIXED SIZE */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    animation: zoom 15s infinite alternate;
}

/* LESS ZOOM (para hindi sobrang laki) */
@keyframes zoom{
    0%{ transform:scale(1); }
    100%{ transform:scale(1.05); }
}

/* OVERLAY */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(to top, rgba(0,0,0,0.5), transparent);
}

/* ✅ PRODUCT SIZE FIX */
.product{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    width:350px; /* 👈 binawasan size */
    max-width:80%;
    animation: float 4s ease-in-out infinite;
    z-index:3;
}

@keyframes float{
    0%{ transform:translate(-50%,0); }
    50%{ transform:translate(-50%,-20px); }
    100%{ transform:translate(-50%,0); }
}

/* TEXT */
.title{
    position:absolute;
    top:80px;
    width:100%;
    text-align:center;
    font-size:50px;
    color:#fff;
    font-weight:bold;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px red; }
    to{ text-shadow:0 0 25px yellow; }
}

/* PRICE */
.price{
    position:absolute;
    right:40px;
    top:50%;
    transform:translateY(-50%);
    background:red;
    padding:20px;
    border-radius:50%;
    font-size:30px;
    color:#fff;
    font-weight:bold;
    box-shadow:0 0 30px red;
}

/* BADGE */
.badge{
    position:absolute;
    left:30px;
    top:30px;
    background:orange;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
}

/* ✅ STRONG SMOKE (VISIBLE) */
.smoke{
    position:absolute;
    bottom:180px;
    left:50%;
    width:120px;
    height:180px;
    background:radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.2) 60%, transparent 100%);
    filter:blur(25px);
    border-radius:50%;
    animation: smoke 4s infinite;
    z-index:5;
}

.smoke:nth-child(2){ left:45%; animation-delay:1s; }
.smoke:nth-child(3){ left:55%; animation-delay:2s; }

@keyframes smoke{
    0%{ transform:translate(-50%,0) scale(1); opacity:0.8; }
    100%{ transform:translate(-50%,-180px) scale(2.2); opacity:0; }
}

/* EGG GLOW */
.egg{
    position:absolute;
    bottom:170px;
    left:58%;
    width:70px;
    height:70px;
    border-radius:50%;
    animation: eggGlow 2s infinite alternate;
    z-index:6;
}

@keyframes eggGlow{
    from{ box-shadow:0 0 15px yellow; }
    to{ box-shadow:0 0 40px orange; }
}
</style>

</head>

<body>

<img src="rapsilog.jpg" class="bg">
<div class="overlay"></div>

<div class="title">sa Rapsilog</div>
<div class="badge">NEW</div>
<div class="price">₱85</div>

<!-- SMOKE -->
<div class="smoke"></div>
<div class="smoke"></div>
<div class="smoke"></div>

<!-- EGG LIGHT -->
<div class="egg"></div>

<!-- PRODUCT -->
<img src="rapsilog.jpg" class="product">

</body>
</html>
