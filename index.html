<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie Restaurant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#111;
    color:white;
}

/* NAVBAR */
.navbar{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    z-index:10;
}

.logo{
    font-size:20px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    gap:30px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:14px;
}

.nav-links a:hover{
    color:#ffcc00;
}

.book-btn{
    background:#ffcc00;
    color:black;
    padding:10px 20px;
    border:none;
    cursor:pointer;
}

/* HERO */
.hero{
    height:100vh;
    background:url('restaurant-hero.jpg') no-repeat center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
}

.hero-content{
    position:relative;
}

.hero-content h1{
    font-size:60px;
    letter-spacing:4px;
}

.hero-content p{
    margin-top:10px;
    font-size:18px;
}

/* SECTION */
.section{
    padding:60px;
    background:#111;
}

/* TITLE CENTER */
.section h2{
    text-align:center;
    margin-bottom:30px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#1a1a1a;
    border-radius:10px;
    overflow:hidden;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* IMAGE */
.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    transition:0.3s;
}

.card:hover img{
    transform:scale(1.05);
}

/* TEXT */
.card h3{
    padding:10px;
    background:#ffcc00;
    color:black;
}

.card p{
    padding:10px;
    color:#ff3b3b;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🍴 Foodie</div>

    <div class="nav-links">
        <a href="#">HOME</a>
        <a href="#">MENU</a>
        <a href="#">ABOUT</a>
        <a href="#">CONTACT</a>
    </div>

    <button class="book-btn">ORDER NOW</button>
</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>PAPRITO RESTAURANT</h1>
        <p>Main Dining • Roof Deck • Conference Room</p>
    </div>
</div>

<!-- OUR SPACES -->
<div class="section">
    <h2>Our Dining Spaces</h2>

    <div class="grid">

        <div class="card">
            <img src="main-dining.jpg">
            <h3>Main Dining</h3>
            <p>Comfortable indoor dining experience</p>
        </div>

        <div class="card">
            <img src="roof-deck.jpg">
            <h3>Roof Deck</h3>
            <p>Open-air dining with great view</p>
        </div>

        <div class="card">
            <img src="basement.jpg">
            <h3>Basement</h3>
            <p>Cozy and private atmosphere</p>
        </div>

        <div class="card">
            <img src="conference-room.jpg">
            <h3>Conference Room</h3>
            <p>Perfect for meetings and events</p>
        </div>

    </div>
</div>

</body>
</html>
