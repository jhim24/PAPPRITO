<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO Menu</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#111;
}

/* HEADER */
.header{
    background:#d71920;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
    position:sticky;
    top:0;
}

/* BACK BUTTON */
.back-btn{
    position:fixed;
    top:15px;
    left:10px;
    background:#ffcc00;
    color:black;
    border:none;
    padding:8px 12px;
    font-weight:bold;
    cursor:pointer;
    border-radius:5px;
    z-index:9999;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar{
    width:90px;
    background:#d71920;
    color:white;
    padding:10px;
    font-size:12px;
}

.sidebar div{
    padding:8px;
    cursor:pointer;
    text-align:center;
}

.sidebar div:hover{
    background:#ffcc00;
    color:black;
}

/* CONTENT */
.content{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #ffcc00;
    display:flex;
    flex-direction:column;
}

/* IMAGE (🔥 UPDATED ONLY HERE) */
.card img{
    width:100%;
    height:220px;
    object-fit:contain; /* 🔥 FULL IMAGE, walang crop */
    background:#fff;
}

/* NAME */
.name{
    background:#ffcc00;
    text-align:center;
    font-weight:bold;
    padding:5px;
}

/* PRICE */
.price{
    background:#d71920;
    color:white;
    text-align:center;
    padding:5px;
    font-weight:bold;
}

/* 📱 MOBILE */
@media(max-width:768px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }

    .sidebar{
        width:80px;
        font-size:11px;
    }

    .card img{
        height:200px;
        object-fit:contain; /* 🔥 SAME FIX SA MOBILE */
    }
}
</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<div class="header">PAPPRITO MENU</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div onclick="show('beef')">Beef</div>
        <div onclick="show('pork')">Pork</div>
        <div onclick="show('chicken')">Chicken</div>
        <div onclick="show('seafood')">Seafood</div>
        <div onclick="show('veggies')">Veggies</div>
        <div onclick="show('noodles')">Noodles</div>
        <div onclick="show('sides')">Sides</div>
        <div onclick="show('drinks')">Drinks</div>
        <div onclick="show('beers')">Beers</div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="grid" id="content"></div>
    </div>

</div>

<script>
<script>
function openModal(type){

    const modal = document.getElementById("modal");
    const title = document.getElementById("modalTitle");
    const content = document.getElementById("modalContent");

    if(!modal || !title || !content) return;

    modal.style.display = "flex";

   if(type==="core"){
    title.innerText="CORE VALUES";
    content.innerText=`CUSTOMER FOCUS
We provide great taste, excellent service, and superior value to all our customers.

INTEGRITY
We do only the right thing and what ought to be done regardless of the situation.

LISTENING WITH HUMILITY
We value feedback, acknowledge and learn from our mistakes.

SPIRIT OF BUSINESS ENTERPRISE
We imbue our employees with entrepreneurial spirit and sense of ownership.

PROFESSIONALISM
We are professional in mind, in word and in deed.

SPIRIT OF FAMILY AND FUN
We foster teamwork, unity, and treat each other like family.`;
}

if(type==="vision"){
    title.innerText="VISION";
    content.innerText=`To be the go-to restaurant for hearty Filipino food, delivering superior value through our delicious and affordable meals.`;
}

if(type==="mission"){
    title.innerText="MISSION";
    content.innerText=`To serve fresh and delicious food, promoting delightful eating to everyone.`;
}

if(type==="about"){
    title.innerText="ABOUT PAPPRITO";
    content.innerText=`Papa Prito entered the bustling and competitive food scene in Tagaytay City on October 30, 2011...

"Lasap Ang Pinoy Sarap"`;
}
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
        closeModal();
    }
});

    document.getElementById("menuModal").style.display="flex";

}

function showCategory(cat){
    const container = document.getElementById("menuProducts");
    container.innerHTML="";

    products[cat].forEach(item=>{
        container.innerHTML+=`
        <div class="menu-card">
            <img src="${item.img}" onclick="openZoom('${item.img}')">
            <div class="menu-info">
                <h4>${item.name}</h4>
                <p>${item.price}</p>
            </div>
        </div>`;
    });
}

/* 🔥 PREMIUM ZOOM */
function openZoom(img){
    document.getElementById("zoomModal").style.display = "flex";
    document.getElementById("zoomImg").src = img;
}

function closeZoom(){
    document.getElementById("zoomModal").style.display = "none";
}
</script>

</html>
