<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comments & Suggestions</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#111;
    color:white;
}

/* HEADER */
.header{
    position:relative;
    background:#d71920;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* BACK BUTTON */
.back-btn{
    position:absolute;
    left:10px;
    top:10px;
    background:#ffcc00;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    color:black;
    font-weight:bold;
}

/* MOBILE FIX */
@media(max-width:768px){
.back-btn{
    position:static;
    display:inline-block;
    margin-bottom:10px;
}
.header{
    text-align:left;
    font-size:16px;
}
}

/* CONTAINER */
.container{
    padding:20px;
    max-width:600px;
    margin:auto;
}

/* FORM */
.form{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.form input,
.form textarea{
    padding:10px;
    border:none;
    border-radius:6px;
}

.form button{
    padding:10px;
    background:#d71920;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* COMMENTS */
.comment{
    background:#1a1a1a;
    padding:12px;
    border-radius:10px;
    margin-top:15px;
    line-height:1.5;
}

.comment strong{
    color:#ffcc00;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back-btn">← Back</a>
    COMMENTS & SUGGESTIONS
</div>

<div class="container">

<div class="form">
    <input type="text" id="name" placeholder="Your Name">
    <textarea id="message" placeholder="Write your comment..."></textarea>
    <button onclick="addComment()">Submit</button>
</div>

<div id="comments"></div>

</div>

<!-- 🔥 FIREBASE ONLINE COMMENTS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjtecedG6UbaJqcMiy-AVKzRzbUbAC8HM",
  authDomain: "papprito-feedback.firebaseapp.com",
  databaseURL: "https://papprito-feedback-default-rtdb.firebaseio.com",
  projectId: "papprito-feedback",
  storageBucket: "papprito-feedback.firebasestorage.app",
  messagingSenderId: "446857159800",
  appId: "1:446857159800:web:4eac74eeff126c8ca2798d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ADD COMMENT
window.addComment = function(){
    let name = document.getElementById("name").value;
    let message = document.getElementById("message").value;

    if(name === "" || message === ""){
        alert("Please fill all fields");
        return;
    }

    push(ref(db, "comments"), {
        name: name,
        message: message
    });

    document.getElementById("name").value="";
    document.getElementById("message").value="";
}

// DISPLAY COMMENTS
function displayComments(){
    const commentsRef = ref(db, "comments");

    onValue(commentsRef, (snapshot) => {
        let container = document.getElementById("comments");
        container.innerHTML = "";

        snapshot.forEach(child => {
            let data = child.val();

            container.innerHTML += `
            <div class="comment">
                <strong>${data.name}</strong>
                <p>${data.message}</p>
            </div>`;
        });
    });
}

displayComments();
</script>

</body>
</html>
