<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO Menu</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#111;
}

/* HEADER */
.header{
    background:#d71920;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
    position:sticky;
    top:0;
}

/* BACK BUTTON */
.back-btn{
    position:fixed;
    top:15px;
    left:10px;
    background:#ffcc00;
    color:black;
    border:none;
    padding:8px 12px;
    font-weight:bold;
    cursor:pointer;
    border-radius:5px;
    z-index:9999;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar{
    width:90px; /* 🔥 FIXED SIZE */
    background:#d71920;
    color:white;
    padding:10px;
    font-size:12px;
}

.sidebar div{
    padding:8px;
    cursor:pointer;
    text-align:center;
}

.sidebar div:hover{
    background:#ffcc00;
    color:black;
}

/* CONTENT */
.content{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    border:2px solid #ffcc00;
    display:flex;
    flex-direction:column;
}

/* IMAGE (PORTRAIT FIX) */
.card img{
    width:100%;
    height:200px; /* 🔥 portrait */
    object-fit:cover;
}

/* NAME */
.name{
    background:#ffcc00;
    text-align:center;
    font-weight:bold;
    padding:5px;
}

/* PRICE */
.price{
    background:#d71920;
    color:white;
    text-align:center;
    padding:5px;
    font-weight:bold;
}

/* 📱 MOBILE */
@media(max-width:768px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }

    .sidebar{
        width:80px;
        font-size:11px;
    }

    .card img{
        height:180px;
    }
}
</style>
</head>

<body>

<button class="back-btn" onclick="history.back()">← Back</button>

<div class="header">PAPPRITO MENU</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div onclick="show('beef')">Beef</div>
        <div onclick="show('pork')">Pork</div>
        <div onclick="show('chicken')">Chicken</div>
        <div onclick="show('seafood')">Seafood</div>
        <div onclick="show('veggies')">Veggies</div>
        <div onclick="show('noodles')">Noodles</div>
        <div onclick="show('sides')">Sides</div>
        <div onclick="show('drinks')">Drinks</div>
        <div onclick="show('beers')">Beers</div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="grid" id="content"></div>
    </div>

</div>

<script>
let menu = {

beef:[
["Bulalo Grupo","₱710","bulalogroup.jpg"],
["Bulalo Solo","₱185","bulalo.jpg"],
["Bistek Tagalog","₱279","bistek.jpg"]
],

pork:[
["Lechon Kawali","₱395","lechon.jpg"],
["Pork Sisig","₱315","sisig.jpg"],
["Lumpiang Shanghai","₱235","lumpia.jpg"]
],

chicken:[
["PapsChicken","₱315","chicken.jpg"],
["Chicken Sisig","₱295","chicken-sisig.jpg"]
],

seafood:[
["Crispy Bangus","₱315","bangus.jpg"],
["Calamares","₱305","calamares.jpg"],
["Crispy Tawilis","₱285","tawilis.jpg"]
],

veggies:[
["Chop Suey","₱235","chopsuey.jpg"],
["Tortang Talong","₱192","talong.jpg"]
],

noodles:[
["Canton-Bihon","₱278","canton.jpg"],
["Palabok","₱195","palabok.jpg"],
["Beef Mami","₱159","mami.jpg"],
["Chicken Mami","₱149","mami2.jpg"]
],

sides:[
["PapShots","₱72","restaurant-hero.jpg"],
["Spicy Tofu","₱65","tofu.jpg"],
["Bola Soup","₱68","soup.jpg"],
["Shanghai","₱49","lumpia.jpg"],
["Banana","₱35","banana.jpg"],
["Garlic Rice","₱46","rice.jpg"],
["Plain Rice","₱32","rice.jpg"]
],

drinks:[
["Softdrinks","₱52","drinks.jpg"],
["1.5L Soda","₱145","drinks.jpg"],
["Iced Tea","₱52","icedtea.jpg"],
["Gulaman","₱52","gulaman.jpg"],
["Pineapple","₱62","juice.jpg"],
["Calamansi","₱62","juice.jpg"],
["Coffee","₱59","coffee.jpg"],
["Hot Choco","₱55","choco.jpg"],
["Water","₱35","water.jpg"]
],

beers:[
["San Mig Light","₱95","sanmig-light.jpg"],
["San Miguel","₱95","sanmig-pale.jpg"],
["Flavored","₱95","sanmig-flavored.jpg"],
["Red Horse","₱105","redhorse.jpg"]
]

};

function show(cat){
    let html = "";
    
    menu[cat].forEach(item=>{
        html += `
        <div class="card">
            <img src="${item[2]}">
            <div class="name">${item[0]}</div>
            <div class="price">${item[1]}</div>
        </div>`;
    });

    document.getElementById("content").innerHTML = html;
}

show('beef');
</script>

</body>
</html>
