<!DOCTYPE html>
<html>
<head>
<title>Pappprito Animated</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
}

/* BACKGROUND */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    animation: zoom 10s infinite alternate;
}

@keyframes zoom{
    0%{ transform:scale(1); }
    100%{ transform:scale(1.1); }
}

/* PLATE FLOAT */
.plate{
    position:absolute;
    bottom:50px;
    left:50%;
    transform:translateX(-50%);
    width:500px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float{
    0%{ transform:translate(-50%,0); }
    50%{ transform:translate(-50%,-25px); }
    100%{ transform:translate(-50%,0); }
}

/* EGG GLOW */
.egg{
    position:absolute;
    bottom:180px;
    left:60%;
    width:80px;
    border-radius:50%;
    animation: glowEgg 2s infinite alternate;
}

@keyframes glowEgg{
    from{ box-shadow:0 0 10px yellow; }
    to{ box-shadow:0 0 40px orange; }
}

/* SMOKE */
.smoke{
    position:absolute;
    bottom:200px;
    left:50%;
    width:100px;
    height:150px;
    background:rgba(255,255,255,0.2);
    filter:blur(20px);
    border-radius:50%;
    animation: smoke 4s infinite;
}

@keyframes smoke{
    0%{
        transform:translate(-50%,0) scale(1);
        opacity:0.5;
    }
    100%{
        transform:translate(-50%,-150px) scale(2);
        opacity:0;
    }
}

/* TEXT */
.text{
    position:absolute;
    top:100px;
    width:100%;
    text-align:center;
    color:#fff;
    font-size:60px;
    font-weight:bold;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px red; }
    to{ text-shadow:0 0 30px yellow; }
}
</style>

</head>

<body>

<!-- BACKGROUND -->
<img src="rapsilog.jpg" class="bg">

<!-- TEXT -->
<div class="text">sa Rapsilog</div>

<!-- SMOKE EFFECT -->
<div class="smoke"></div>

<!-- PLATE (kung may hiwalay ka) -->
<!-- <img src="plate.png" class="plate"> -->

<!-- EGG GLOW (fake highlight) -->
<div class="egg"></div>

</body>
</html>
