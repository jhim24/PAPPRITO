<!DOCTYPE html>
<html>
<head>
<title>Pappprito POS UI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:200px;
    background:#fff;
    border-right:1px solid #ddd;
    padding:20px;
}

.sidebar h2{
    color:#d62828;
}

.menu-item{
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
}

.menu-item:hover{
    background:#ffe5e5;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
    background:#f5f5f5;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

/* RIGHT PANEL */
.details{
    width:300px;
    background:#fff;
    padding:20px;
    border-left:1px solid #ddd;
}

.details img{
    width:100%;
    border-radius:10px;
}

.price{
    color:#d62828;
    font-size:20px;
    font-weight:bold;
}

/* BUTTON */
.btn{
    width:100%;
    padding:15px;
    background:#ff9f1c;
    border:none;
    color:#fff;
    font-size:16px;
    border-radius:10px;
    margin-top:20px;
    cursor:pointer;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🍽 Menu</h2>
    <div class="menu-item">Beef</div>
    <div class="menu-item">Pork</div>
    <div class="menu-item">Chicken</div>
    <div class="menu-item">Seafood</div>
    <div class="menu-item">Drinks</div>
</div>

<!-- MAIN -->
<div class="main">

    <h2>Popular Items</h2>

    <div class="cards">

        <div class="card" onclick="showItem('Rapsilog','₱85','rapsilog.jpg')">
            <img src="rapsilog.jpg">
            <h3>Rapsilog</h3>
            <p>₱85</p>
        </div>

        <div class="card" onclick="showItem('Chicken Meal','₱99','rapsilog.jpg')">
            <img src="rapsilog.jpg">
            <h3>Chicken Meal</h3>
            <p>₱99</p>
        </div>

        <div class="card" onclick="showItem('Burger','₱79','rapsilog.jpg')">
            <img src="rapsilog.jpg">
            <h3>Burger</h3>
            <p>₱79</p>
        </div>

    </div>

</div>

<!-- RIGHT PANEL -->
<div class="details">
    <img id="img" src="rapsilog.jpg">
    <h2 id="name">Rapsilog</h2>
    <p class="price" id="price">₱85</p>

    <button class="btn">Add to Cart</button>
</div>

<script>
function showItem(name, price, img){
    document.getElementById("name").innerText = name;
    document.getElementById("price").innerText = price;
    document.getElementById("img").src = img;
}
</script>

</body>
</html>
