<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant System</title>

<style>
body {
    display: flex;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 200px;
    height: 100vh;
    background: #111;
    padding: 20px;
}

.sidebar h2 {
    color: #ff3b3b;
}

.sidebar ul {
    list-style: none;
    margin-top: 20px;
}

.sidebar li {
    padding: 10px;
    cursor: pointer;
    border-radius: 8px;
}

.sidebar li:hover,
.active {
    background: linear-gradient(45deg, red, yellow);
    color: black;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

.box {
    background: #111;
    border: 2px solid #ffcc00;
    padding: 20px;
    border-radius: 15px;
    cursor: pointer;
    width: 180px;
    text-align: center;
    box-shadow: 0 0 10px red;
}

.box:hover {
    transform: scale(1.05);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 20px red;
}

.close {
    color: red;
    cursor: pointer;
    float: right;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🔥 Foodie</h2>
    <ul>
        <li onclick="showMenu()">Menu</li>
        <li>Orders</li>
        <li>Analytics</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">
    <h2 id="title">Select Menu</h2>
    <div id="content" class="grid"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">×</span>
        <h3 id="modalName"></h3>
        <p id="modalPrice"></p>
    </div>
</div>

<script>

/* DATA */
const menu = {
    "BEEF": [
        ["Bulalo Grupo", 710],
        ["Bulalo Solo", 185],
        ["Bistek Tagalog", 279]
    ],
    "PORK": [
        ["Lechon Kawali", 395],
        ["Pork Sisig", 315],
        ["Lumpiang Shanghai", 235]
    ],
    "CHICKEN": [
        ["PapsChicken Platter", 315],
        ["Chicken Sisig", 295]
    ],
    "SEAFOOD": [
        ["Crispy Bangusarap", 315],
        ["Calamares", 305],
        ["Crispy Tawilis", 285]
    ],
    "VEGGIES": [
        ["Chop Suey", 235],
        ["Tortang Talong", 192]
    ],
    "NOODLES": [
        ["Canton-Bihon", 278],
        ["Palabok", 195],
        ["Beef Mami", 159],
        ["Chicken Mami", 149]
    ],
    "SIDES": [
        ["PapShots", 72],
        ["Spicy Tofu", 65]
    ],
    "DRINKS": [
        ["Iced Tea", 52],
        ["Coffee", 59]
    ]
};

/* SHOW CATEGORIES */
function showMenu() {
    document.getElementById("title").innerText = "Menu Categories";
    const content = document.getElementById("content");
    content.innerHTML = "";

    for (let category in menu) {
        let div = document.createElement("div");
        div.className = "box";
        div.innerText = category;

        div.onclick = () => showProducts(category);

        content.appendChild(div);
    }
}

/* SHOW PRODUCTS */
function showProducts(category) {
    document.getElementById("title").innerText = category;
    const content = document.getElementById("content");
    content.innerHTML = "";

    menu[category].forEach(item => {
        let div = document.createElement("div");
        div.className = "box";
        div.innerHTML = `${item[0]}<br>₱${item[1]}`;

        div.onclick = () => openModal(item[0], item[1]);

        content.appendChild(div);
    });
}

/* MODAL */
function openModal(name, price) {
    document.getElementById("modalName").innerText = name;
    document.getElementById("modalPrice").innerText = "₱" + price;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
