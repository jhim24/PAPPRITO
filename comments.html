<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comments & Suggestions</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#111;
    color:white;
}

/* HEADER */
.header{
    position:relative;
    background:#d71920;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* BACK BUTTON */
.back-btn{
    position:absolute;
    left:10px;
    top:10px;
    background:#ffcc00;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    color:black;
    font-weight:bold;
}

/* CONTAINER */
.container{
    padding:20px;
    max-width:600px;
    margin:auto;
}

/* FORM */
.form{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.form input,
.form textarea{
    padding:10px;
    border:none;
    border-radius:6px;
    font-size:14px;
}

.form textarea{
    min-height:100px;
}

.form button{
    padding:10px;
    background:#d71920;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* COMMENTS */
.comment{
    background:#1a1a1a;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}

.comment strong{
    color:#ffcc00;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back-btn">← Back</a>
    COMMENTS & SUGGESTIONS
</div>

<div class="container">

<div class="form">
    <input type="text" id="name" placeholder="Your Name">
    <textarea id="message" placeholder="Write your comment..."></textarea>
    <button onclick="addComment()">Submit</button>
</div>

<div id="comments"></div>

</div>

<script>
function addComment(){
    let name = document.getElementById("name").value;
    let message = document.getElementById("message").value;

    if(name === "" || message === ""){
        alert("Please fill all fields");
        return;
    }

    let comments = JSON.parse(localStorage.getItem("comments")) || [];

    comments.push({name, message});
    localStorage.setItem("comments", JSON.stringify(comments));

    displayComments();

    document.getElementById("name").value = "";
    document.getElementById("message").value = "";
}

function displayComments(){
    let comments = JSON.parse(localStorage.getItem("comments")) || [];
    let container = document.getElementById("comments");

    container.innerHTML = "";

    comments.forEach(c => {
        container.innerHTML += `
        <div class="comment">
            <strong>${c.name}</strong>
            <p>${c.message}</p>
        </div>`;
    });
}

displayComments();
</script>

</body>
</html>
