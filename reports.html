<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PAPPRITO REPORTS</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:
linear-gradient(
135deg,
#020617,
#071226,
#0f172a
);
color:white;
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:230px;
background:
linear-gradient(
180deg,
#020617,
#081226,
#0f172a
);
padding:20px;
border-right:
1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:24px;
font-weight:bold;
color:#ffcc00;
margin-bottom:30px;
}

.menu{
list-style:none;
}

.menu li{
padding:14px;
margin-bottom:10px;
border-radius:14px;
cursor:pointer;
transition:0.3s;
font-size:14px;
}

.menu li:hover,
.menu li.active{
background:#111827;
color:#ffcc00;
}
/* INSTALL BOX */
.install-box{

margin-top:20px;

padding:12px;

border-radius:16px;

text-align:center;

background:
linear-gradient(
135deg,
#ec4899,
#be185d
);

box-shadow:
0 5px 15px rgba(0,0,0,0.25);

width:160px;

margin-left:auto;
margin-right:auto;

}
.install-box i{

font-size:28px;

margin-bottom:10px;

}

.install-box h3{

font-size:14px;

margin-bottom:8px;

}

.install-box p{

font-size:32px;

font-weight:bold;

}
/* MAIN */
.main{
flex:1;
padding:25px;
overflow-y:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.topbar h1{
font-size:36px;
}

/* CARDS */
.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:12px;

margin-bottom:18px;

}
.card{

padding:14px;

border-radius:18px;

box-shadow:
0 5px 15px rgba(0,0,0,0.25);

min-height:120px;

}

.card h3{

font-size:13px;

margin-bottom:6px;

}

.card p{

font-size:20px;

font-weight:bold;

margin-top:10px;

}

.sales{
background:
linear-gradient(
135deg,
#22c55e,
#15803d
);
}

.orders{
background:
linear-gradient(
135deg,
#3b82f6,
#1d4ed8
);
}

.completed{
background:
linear-gradient(
135deg,
#f59e0b,
#d97706
);
}

.payments{
background:
linear-gradient(
135deg,
#8b5cf6,
#6d28d9
);
}

/* REPORT BOX */
.report-box{

background:
rgba(255,255,255,0.04);

padding:18px;

border-radius:18px;

margin-bottom:15px;

border:
1px solid rgba(255,255,255,0.08);

}

.report-box h2{
margin-bottom:18px;
font-size:20px;
color:#ffcc00;
}

.report-item{
padding:12px 0;
border-bottom:
1px solid rgba(255,255,255,0.05);

display:flex;
justify-content:space-between;
}
/* FILTER */

.report-filter{
display:flex;
gap:15px;
flex-wrap:wrap;
background:#111827;
padding:20px;
border-radius:18px;
margin-bottom:20px;
align-items:end;
}

.filter-box{
display:flex;
flex-direction:column;
gap:5px;
}

.filter-box label{
font-size:13px;
color:#cbd5e1;
}

.filter-box input,
.filter-box select{
padding:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
min-width:170px;
}

.report-filter button{
padding:10px 20px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
cursor:pointer;
font-weight:bold;
}

/* TABLE */

.sales-table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

.sales-table th{
background:#1d4ed8;
padding:12px;
text-align:left;
}

.sales-table td{
padding:12px;
border-bottom:
1px solid rgba(255,255,255,0.08);
}

.sales-table tr:hover{
background:rgba(255,255,255,0.05);
}
  /* PRINT ONLY REPORT */

@media print{

body *{
visibility:hidden;
}

#printArea,
#printArea *{
visibility:visible;
}

#printArea{
position:absolute;
left:0;
top:0;
width:100%;
background:white;
padding:20px;
}

.sidebar,
.topbar,
.report-filter,
.cards,
button{
display:none !important;
}

.sales-table{
color:black;
}

.sales-table th{
background:#ddd !important;
color:black;
}

}
/* MOBILE */
@media(max-width:768px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
overflow-x:auto;
}

.menu{
display:flex;
gap:8px;
}

.menu li{
white-space:nowrap;
margin-bottom:0;
}

.main{
padding:15px;
}

.cards{
display:flex;
overflow-x:auto;
}

.card{
min-width:220px;
flex-shrink:0;
}

.topbar h1{
font-size:28px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-chart-line"></i>
PAPPRITO
</div>

<ul class="menu">
<li onclick="location.href='completed.html'">
<i class="fa-solid fa-circle-check"></i>
Completed
</li>
<li onclick="location.href='dashboard.html'">
<i class="fa-solid fa-house"></i>
Dashboard
</li>

<li class="active">
<i class="fa-solid fa-chart-pie"></i>
Reports
</li>

</ul>
<div class="install-box">

<i class="fa-solid fa-mobile-screen"></i>

<h3>
App Installs
</h3>

<p id="installCount">
0
</p>

</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">

<h1>

<i class="fa-solid fa-chart-line"></i>

Reports Overview

</h1>

<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">

<input type="date" id="startDate">

<input type="date" id="endDate">

<button onclick="filterReports()" style="
padding:10px 15px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
">
Filter
</button>

<button onclick="window.print()" style="
padding:10px 15px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
">
🖨 Print
</button>

</div>

</div>
  <!-- FILTER -->
<div class="report-filter">

<div class="filter-box">

<label>From Date</label>
<input type="date" id="fromDate">

</div>

<div class="filter-box">

<label>To Date</label>
<input type="date" id="toDate">

</div>

<div class="filter-box">

<label>Payment</label>

<select id="paymentFilter">

<option value="">All</option>
<option value="GCASH">GCASH</option>
<option value="CASH">CASH</option>

</select>

</div>

<div class="filter-box">

<label>Status</label>

<select id="statusFilter">

<option value="">All</option>
<option value="PENDING">PENDING</option>
<option value="DELIVERED">DELIVERED</option>

</select>

</div>

<button onclick="loadDailySales()">

<i class="fa-solid fa-magnifying-glass"></i>

Preview

</button>

<button onclick="printReport()">

<i class="fa-solid fa-print"></i>

Print

</button>

</div>
<!-- CARDS -->
<div class="cards">

<div class="card sales">
<h3>Total Sales</h3>
<p id="totalSales">₱0</p>
</div>

<div class="card orders">
<h3>Total Orders</h3>
<p id="totalOrders">0</p>
</div>

<div class="card completed">
<h3>Completed Orders</h3>
<p id="completedOrders">0</p>
</div>

<div class="card payments">
<h3>GCash Payments</h3>
<p id="gcashTotal">₱0</p>
</div>
<div class="card sales">

<h3>Today Sales</h3>

<p id="todaySales">
₱0
</p>

</div>

<div class="card orders">

<h3>This Week</h3>

<p id="weekSales">
₱0
</p>

</div>
</div>
<!-- PRINT AREA -->
<div id="printArea">

<!-- DAILY SALES -->
<div class="report-box">

<h2>

<i class="fa-solid fa-chart-column"></i>

Daily Sales Report

</h2>

<div style="overflow:auto;">

<table class="sales-table">

<thead>

<tr>

<th>Date</th>
<th>Order ID</th>
<th>Total</th>
<th>Payment</th>
<th>Status</th>

</tr>

</thead>

<tbody id="dailySalesBody">

</tbody>

</table>

</div>
</div>
</div>
<!-- BEST SELLERS -->
<div class="report-box">

<h2>

<i class="fa-solid fa-fire"></i>

Best Selling Products

</h2>
<div id="bestSellers"></div>

</div>

<!-- PAYMENT REPORT -->
<div class="report-box">

<h2>

<i class="fa-solid fa-credit-card"></i>

Payment Summary

</h2>

<div id="paymentSummary"></div>

</div>

<!-- ORDER TYPES -->
<div class="report-box">

<h2>

<i class="fa-solid fa-box"></i>

Order Types

</h2>

<div id="orderTypes"></div>

</div>

</div>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain: "papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId: "papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId: "831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

/* DATA */

let sales = 0;
let totalOrders = 0;
let completed = 0;
let gcash = 0;
let todaySales = 0;
let weekSales = 0;
let products = {};
let payments = {};
let types = {};
/* APP INSTALLS */

firebase.database()
.ref("analytics/pwaUsers")
.on("value", snapshot=>{

document.getElementById(
"installCount"
).innerText =
snapshot.numChildren();

});
firebase.database()
.ref("orders")
.on("value", snapshot=>{

sales = 0;
totalOrders = 0;
completed = 0;
gcash = 0;
todaySales = 0;
weekSales = 0;
products = {};
payments = {};
types = {};

snapshot.forEach(child=>{

const order = child.val();
const orderDate =
new Date(order.createdAt);

const now =
new Date();

/* TODAY */

if(
orderDate.toDateString()
=== now.toDateString()
){

todaySales +=
Number(order.total);

}

/* WEEK */

const diffTime =
now - orderDate;

const diffDays =
diffTime /
(1000 * 60 * 60 * 24);

if(diffDays <= 7){

weekSales +=
Number(order.total);

}
totalOrders++;

sales += Number(order.total);

if(order.status === "DELIVERED"){
completed++;
}

if(order.payment === "GCASH"){
gcash += Number(order.total);
}

/* PRODUCTS */
order.items.forEach(item=>{

if(!products[item.name]){
products[item.name] = 0;
}

products[item.name] += item.qty || 1;

});

/* PAYMENTS */
if(!payments[order.payment]){
payments[order.payment] = 0;
}

payments[order.payment] += Number(order.total);

/* TYPES */
if(!types[order.orderType]){
types[order.orderType] = 0;
}

types[order.orderType]++;

});

/* UPDATE CARDS */

document.getElementById("totalSales")
.innerText = "₱" + sales;

document.getElementById("totalOrders")
.innerText = totalOrders;

document.getElementById("completedOrders")
.innerText = completed;

document.getElementById("gcashTotal")
.innerText = "₱" + gcash;
document.getElementById(
"todaySales"
).innerText =
"₱" + todaySales;

document.getElementById(
"weekSales"
).innerText =
"₱" + weekSales;
/* BEST SELLERS */

let bestHTML = "";

Object.entries(products)
.sort((a,b)=>b[1]-a[1])
.forEach(([name,qty])=>{

bestHTML += `

<div class="report-item">

<span>${name}</span>

<strong>${qty} sold</strong>

</div>

`;

});

document.getElementById("bestSellers")
.innerHTML = bestHTML;

/* PAYMENT SUMMARY */

let paymentHTML = "";

Object.entries(payments)
.forEach(([pay,total])=>{

paymentHTML += `

<div class="report-item">

<span>${pay}</span>

<strong>₱${total}</strong>

</div>

`;

});

document.getElementById("paymentSummary")
.innerHTML = paymentHTML;

/* ORDER TYPES */

let typeHTML = "";

Object.entries(types)
.forEach(([type,count])=>{

typeHTML += `

<div class="report-item">

<span>${type}</span>

<strong>${count}</strong>

</div>

`;

});

document.getElementById("orderTypes")
.innerHTML = typeHTML;

});
function filterReports(){

const start =
document.getElementById("startDate").value;

const end =
document.getElementById("endDate").value;

firebase.database()
.ref("orders")
.once("value", snapshot=>{

let sales = 0;
let orders = 0;

snapshot.forEach(child=>{

const order = child.val();

const orderDate =
new Date(order.createdAt);

const formatted =
orderDate.toISOString().split("T")[0];

if(
(!start || formatted >= start) &&
(!end || formatted <= end)
){

sales += Number(order.total);
orders++;

}

});

document.getElementById("totalSales")
.innerText = "₱" + sales;

document.getElementById("totalOrders")
.innerText = orders;

});

}
  function loadDailySales(){

const fromDate =
document.getElementById("fromDate").value;

const toDate =
document.getElementById("toDate").value;

const payment =
document.getElementById("paymentFilter").value;

const status =
document.getElementById("statusFilter").value;

firebase.database()
.ref("orders")
.once("value", snapshot=>{

let html = "";

snapshot.forEach(child=>{

const order = child.val();

const orderDate =
new Date(order.createdAt);

const formatted =
orderDate.toISOString().split("T")[0];

if(
(!fromDate || formatted >= fromDate) &&
(!toDate || formatted <= toDate) &&
(!payment || order.payment === payment) &&
(!status || order.status === status)
){

html += `

<tr>

<td>${formatted}</td>

<td>#${child.key.slice(-5)}</td>

<td>₱${order.total}</td>

<td>${order.payment}</td>

<td>${order.status}</td>

</tr>

`;

}

});

document.getElementById(
"dailySalesBody"
).innerHTML = html;

});

}
  function printReport(){

window.print();

}
</script>

</body>
</html>
