<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PAPPRITO MENU</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#111;
color:white;
overflow-x:hidden;
}

/* HEADER */

.header{

background:#d71920;

color:white;

padding:12px;

display:flex;

align-items:center;

gap:10px;

position:sticky;

top:0;

z-index:999;
}

.back-btn{

background:#ffcc00;

border:none;

padding:8px 14px;

cursor:pointer;

font-weight:bold;

border-radius:8px;
}

#cartIcon{

margin-left:auto;

background:#ffcc00;

color:black;

padding:8px 14px;

border-radius:10px;

font-weight:bold;

cursor:pointer;
}

/* LAYOUT */

.container{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{

width:160px;

background:#d71920;

color:white;

padding:12px;

overflow-y:auto;
}

.sidebar h3{

font-size:14px;

margin-bottom:12px;

text-align:center;
}

.sidebar ul{
list-style:none;
}

.sidebar li{

padding:10px;

cursor:pointer;

font-size:13px;

border-radius:8px;

margin-bottom:5px;

transition:0.3s;
}

.sidebar li:hover{

background:#ffcc00;

color:black;
}

/* PRODUCTS */

.products{

flex:1;

padding:15px;

display:grid;

grid-template-columns:repeat(4,1fr);

gap:15px;
}

/* CARD */

.card{

background:#1a1a1a;

border-radius:18px;

overflow:hidden;

border:2px solid #ffcc00;

box-shadow:0 6px 18px rgba(0,0,0,0.4);

transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

/* IMAGE */

.card img{

width:100%;

height:220px;

object-fit:cover;

display:block;

cursor:pointer;
}

/* INFO */

.card-info{
text-align:center;
}

.card-info h4{

background:#ffcc00;

color:black;

padding:10px;

font-size:15px;

font-weight:bold;
}

.card-info p{

background:#d71920;

color:white;

padding:10px;

font-size:14px;

font-weight:bold;
}

/* CART BUTTON */

.cart-btn{

width:90%;

margin:12px auto 15px;

display:block;

background:linear-gradient(
45deg,
#ffcc00,
#ff3b3b
);

color:white;

border:none;

padding:10px;

border-radius:30px;

font-weight:bold;

cursor:pointer;

transition:0.3s;
}

.cart-btn:hover{

transform:scale(1.05);

box-shadow:
0 0 10px #ffcc00,
0 0 20px #ff0000;
}

/* ZOOM */

.zoom-modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,0.95);

justify-content:center;

align-items:center;

z-index:99999;
}

.zoom-modal img{

max-width:95%;

max-height:90%;

border-radius:12px;
}

.zoom-close{

position:absolute;

top:20px;

right:20px;

color:white;

font-size:30px;

cursor:pointer;
}

/* CART MODAL */

.cart-modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,0.7);

justify-content:center;

align-items:center;

z-index:999999;
}

.cart-content{

background:#1a1a1a;

width:90%;

max-width:420px;

padding:20px;

border-radius:15px;

max-height:80vh;

overflow-y:auto;
}

.cart-content h2{

margin-bottom:15px;

text-align:center;
}

.cart-item{

padding:12px 0;

border-bottom:1px solid #333;
}

.checkout-btn{

display:block;

margin-top:20px;

background:#0084ff;

color:white;

text-align:center;

padding:12px;

border-radius:30px;

text-decoration:none;

font-weight:bold;
}

.close-cart{

margin-top:10px;

width:100%;

padding:10px;

background:#ff3b3b;

border:none;

color:white;

border-radius:30px;

cursor:pointer;
}

.remove-btn{

background:#ff3b3b;

border:none;

color:white;

padding:5px 10px;

border-radius:8px;

cursor:pointer;

font-size:12px;
}

/* FLOATING CART */

#floatingCart{

position:fixed;

bottom:15px;

left:50%;

transform:translateX(-50%);

width:95%;

max-width:500px;

background:linear-gradient(
45deg,
#ffcc00,
#ff3b3b
);

padding:15px 20px;

border-radius:20px;

display:flex;

justify-content:space-between;

align-items:center;

z-index:999999;

box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

#floatingCart button{

background:white;

color:black;

border:none;

padding:10px 18px;

border-radius:12px;

font-weight:bold;

cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

/* HEADER */

.header{

flex-wrap:wrap;
padding:10px;
gap:8px;

}

.header h2{

font-size:18px;

}

/* SEARCH */

#trackingSearch{

width:100% !important;
margin-left:0 !important;
flex:1;

}

/* TRACK BUTTON */

.header button{

padding:10px 12px;
font-size:12px;

}

/* CART */

#cartIcon{

margin-left:0;
width:100%;
text-align:center;

}

/* LAYOUT */

.container{

flex-direction:column;

}

/* SIDEBAR */

.sidebar{

width:100%;
padding:10px;
overflow-x:auto;

}

.sidebar h3{

margin-bottom:8px;

}

.sidebar ul{

display:flex;
gap:8px;
overflow-x:auto;
padding-bottom:5px;

}

.sidebar li{

white-space:nowrap;
flex-shrink:0;
padding:8px 12px;
font-size:12px;

}

/* PRODUCTS */

.products{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

padding:15px;

}

/* CARD */

.card{

border-radius:14px;

}

.card img{

height:140px;

}

.card-info h4{

font-size:13px;
padding:8px;

}

.card-info p{

font-size:12px;
padding:8px;

}

.cart-btn{

width:92%;
font-size:12px;
padding:9px;

}

/* FLOATING CART */

#floatingCart{

width:95%;
padding:12px;
bottom:10px;
border-radius:15px;
font-size:13px;

}

#floatingCart button{

padding:8px 12px;
font-size:12px;

}

/* CART MODAL */

.cart-content{

width:95%;
padding:15px;
border-radius:15px;

}

.cart-content h2{

font-size:20px;

}

/* INPUTS */

input,
textarea,
select{

font-size:14px;

}

}
  @media(max-width:480px){

.products{

grid-template-columns:1fr;

}

.card img{

height:220px;

}

}
</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<button
class="back-btn"
onclick="history.back()">

← Back

</button>

<h2>MENU</h2>

<input
type="text"
id="trackingSearch"
placeholder="Enter Tracking Number"
style="
padding:10px;
border:none;
border-radius:10px;
width:220px;
margin-left:auto;
">

<button
onclick="trackOrder()"
style="
background:#0084ff;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-left:8px;
">

TRACK

</button>

<div id="cartIcon">

🛒 Cart
(<span id="cartCount">0</span>)

</div>

</div>
<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Category</h3>

<ul id="categoryList">

</ul>

</div>

<!-- PRODUCTS -->

<div
class="products"
id="products">

</div>

</div>

<!-- ZOOM -->

<div
id="zoomModal"
class="zoom-modal"
onclick="closeZoom()">

<span class="zoom-close">

✖

</span>

<img id="zoomImg">

</div>

<!-- FLOATING CART -->

<div id="floatingCart">

<div>

🛒
<span id="floatingCount">
0
</span>
items

</div>

<div id="floatingTotal">
₱0
</div>

<button onclick="openCart()">

View Cart

</button>

</div>

<!-- CART MODAL -->

<div id="cartModal"
class="cart-modal">

<div class="cart-content">

<h2>
🛒 Your Cart
</h2>

<div id="cartItems">

</div>

<h3 id="cartTotal">

Total: ₱0

</h3>

<input
type="text"
id="customerName"
placeholder="Customer Name"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
">

<input
type="text"
id="customerPhone"
placeholder="Customer Phone Number"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
">

<textarea
id="customerAddress"
placeholder="Customer Address"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
resize:none;
height:80px;
"></textarea>

<select
id="orderType"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
">

<option>DINE IN</option>
<option>TAKE OUT</option>
<option>DELIVERY</option>

</select>

<select
id="paymentMode"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
">

<option>CASH</option>
<option>GCASH</option>
<option>MAYA</option>
<option>CARD</option>

</select>

<input
type="text"
id="referenceNumber"
placeholder="Reference Number"
style="
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
">

<button
onclick="placeOrder()"
style="
width:100%;
padding:14px;
margin-top:15px;
background:linear-gradient(
45deg,
#008000,
#00cc66
);
color:white;
border:none;
border-radius:30px;
font-weight:bold;
font-size:15px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
">

PLACE ORDER

</button>

<button
class="close-cart"
onclick="closeCart()">

Close

</button>

</div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey:
"AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain:
"papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId:
"papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId:
"831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* PRODUCTS */

let allProducts = [];

/* LOAD PRODUCTS */

firebase.database()
.ref("products")
.on("value", snapshot=>{

allProducts = [];

const productsData =
snapshot.val();

if(!productsData){
return;
}

let categories = [];

Object.keys(productsData)
.forEach(key=>{

const product =
productsData[key];

allProducts.push(product);

if(
!categories.includes(
product.category
)
){

categories.push(
product.category
);

}

});

/* RENDER CATEGORY */

renderCategories(
categories
);

/* DEFAULT */

show(categories[0]);

});

/* CATEGORY */

function renderCategories(categories){

const sidebar =
document.getElementById(
"categoryList"
);

sidebar.innerHTML = "";

categories.forEach(cat=>{

sidebar.innerHTML += `

<li onclick="show('${cat}')">

${cat.toUpperCase()}

</li>

`;

});

}

/* SHOW PRODUCTS */

function show(cat){

const container =
document.getElementById(
"products"
);

container.innerHTML = "";

const filtered =

allProducts.filter(
item =>
item.category === cat
);

filtered.forEach(item=>{

container.innerHTML += `

<div class="card">

<img
src="${item.image}"
onclick="openZoom('${item.image}')">

<div class="card-info">

<h4>

${item.name}

</h4>

<p>

₱${item.price}

</p>

<button
class="cart-btn"
onclick="addToCart(
'${item.name}',
'₱${item.price}'
)">

ADD TO CART

</button>

</div>

</div>

`;

});

}

/* ZOOM */

function openZoom(img){

document.getElementById(
"zoomModal"
).style.display="flex";

document.getElementById(
"zoomImg"
).src = img;

}

function closeZoom(){

document.getElementById(
"zoomModal"
).style.display="none";

}

/* CART */

let cart = [];

/* ADD TO CART */

function addToCart(name,price){

const cleanPrice =
parseInt(
price.replace(/[₱,]/g,"")
) || 0;

const existing =
cart.find(
item => item.name === name
);

if(existing){

existing.qty += 1;

}else{

cart.push({

name:name,
price:cleanPrice,
qty:1

});

}

updateCart();

}

/* REMOVE */

function removeItem(name){

cart =
cart.filter(
item => item.name !== name
);

updateCart();

}

/* UPDATE CART */

function updateCart(){

document.getElementById(
"cartCount"
).innerText = cart.length;

document.getElementById(
"floatingCount"
).innerText = cart.length;

const items =
document.getElementById(
"cartItems"
);

items.innerHTML = "";

let total = 0;

cart.forEach(item=>{

total +=
item.price * item.qty;

items.innerHTML += `

<div class="cart-item">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">

<div>

${item.name}

<br>

₱${item.price}
x
${item.qty}

</div>

<div>

₱${item.price * item.qty}

</div>

<button
class="remove-btn"
onclick="removeItem('${item.name}')">

✖

</button>

</div>

</div>

`;

});

document.getElementById(
"cartTotal"
).innerText =
"Total: ₱" + total;

document.getElementById(
"floatingTotal"
).innerText =
"₱" + total;

}

/* OPEN CART */

document.getElementById(
"cartIcon"
).addEventListener(
"click",
()=>{

document.getElementById(
"cartModal"
).style.display="flex";

});

/* FLOATING BUTTON */

function openCart(){

document.getElementById(
"cartModal"
).style.display="flex";

}

/* CLOSE CART */

function closeCart(){

document.getElementById(
"cartModal"
).style.display="none";

}

/* PLACE ORDER */

function placeOrder(){

if(cart.length === 0){

alert('Cart is empty');

return;

}

const customerName =
document.getElementById(
'customerName'
).value;

const customerPhone =
document.getElementById(
'customerPhone'
).value;

const customerAddress =
document.getElementById(
'customerAddress'
).value;

const paymentMode =
document.getElementById(
'paymentMode'
).value;

const referenceNumber =
document.getElementById(
'referenceNumber'
).value;

const trackingNumber =
'PAP-' + Date.now();

const orderType =
document.getElementById(
'orderType'
).value;

if(customerName === ''){

alert('Enter Customer Name');

return;

}

let total = 0;

cart.forEach(item=>{

total += item.price * item.qty;

});

const orderData = {

trackingnumber:
trackingNumber,

orderNumber:
trackingNumber,

customer:
customerName,

phone:
customerPhone,

address:
customerAddress,

orderType:
orderType,

payment:
paymentMode,

reference:
referenceNumber,

notes:'',
items:cart,
total:total,

status:'NEW',

createdAt:
new Date().toLocaleString(),

timestamp:
Date.now()

};

/* SAVE ORDER */

db.ref('orders')
.push(orderData)
.then(()=>{

alert(
'ORDER SUCCESSFUL\n\n' +
'TRACKING NUMBER:\n' +
trackingNumber
);

cart = [];

updateCart();

closeCart();

document.getElementById(
'customerName'
).value='';

document.getElementById(
'customerPhone'
).value='';

document.getElementById(
'customerAddress'
).value='';

document.getElementById(
'referenceNumber'
).value='';

});

db.ref('orders')
.push(orderData)
.then(()=>{

alert(
'ORDER SUCCESSFUL\n\n' +
'TRACKING NUMBER:\n' +
trackingNumber
);

cart = [];

updateCart();

closeCart();

document.getElementById(
'customerName'
).value='';

document.getElementById(
'customerPhone'
).value='';

document.getElementById(
'customerAddress'
).value='';

document.getElementById(
'referenceNumber'
).value='';

});

}
/* TRACK ORDER */

function trackOrder(){

const trackingNumber =

document.getElementById(
'trackingSearch'
).value.trim();

if(trackingNumber === ''){

alert('Enter Tracking Number');

return;

}

db.ref('orders')
.once('value',snapshot=>{

let found = false;

snapshot.forEach(child=>{

const order = child.val();

if(
order.trackingnumber ===
trackingNumber
){

found = true;

alert(

'ORDER FOUND\n\n' +

'Customer: ' +
(order.customer || '-') +

'\n\nStatus: ' +
(order.status || '-') +

'\n\nPayment: ' +
(order.payment || '-') +

'\n\nReference: ' +
(order.reference || '-') +

'\n\nType: ' +
(order.orderType || '-') +

'\n\nAddress: ' +
(order.address || '-')

);

}

});

if(!found){

alert('Tracking Number Not Found');

}

});

}
  
</script>

</body>
</html>
