<!DOCTYPE html>
<html>
<head>
<title>Pappprito POS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    height:100vh;
    background:#f5f5f5;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:linear-gradient(to bottom, #ffcc00, #ff9900);
    padding:20px;
}

.sidebar h2{
    margin-bottom:20px;
}

.menu-item{
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.menu-item:hover,
.active{
    background:#d62828;
    color:#fff;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

.main h2{
    color:#d62828;
}

/* GRID */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
    gap:20px;
}

/* 🔥 CARD DESIGN */
.card{
    background:linear-gradient(135deg, #fff, #fff5cc);
    padding:20px;
    border-radius:20px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

/* GLOW BORDER */
.card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:20px;
    padding:2px;
    background:linear-gradient(45deg,#ffcc00,#ff0000);
    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
}

/* SHINE EFFECT */
.card::after{
    content:"";
    position:absolute;
    top:-100%;
    left:-100%;
    width:200%;
    height:200%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
    transform:rotate(25deg);
    transition:0.5s;
}

.card:hover::after{
    top:100%;
    left:100%;
}

/* HOVER */
.card:hover{
    transform:translateY(-8px) scale(1.05);
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

/* TITLE */
.card h3{
    margin:10px 0;
}

/* PRICE BADGE */
.card p{
    position:absolute;
    top:10px;
    right:10px;
    background:#d62828;
    color:#fff;
    padding:5px 12px;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
}

/* RIGHT PANEL */
.details{
    width:280px;
    background:#fff;
    padding:20px;
    border-left:2px solid #eee;
}

.details h2{
    color:#d62828;
}

.price{
    font-size:22px;
    font-weight:bold;
    margin:10px 0;
}

/* BUTTON */
.btn{
    width:100%;
    padding:15px;
    background:#d62828;
    border:none;
    color:#fff;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#a61c1c;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🍽 Menu</h2>
    <div class="menu-item active" onclick="loadMenu('beef', this)">Beef</div>
    <div class="menu-item" onclick="loadMenu('pork', this)">Pork</div>
    <div class="menu-item" onclick="loadMenu('chicken', this)">Chicken</div>
    <div class="menu-item" onclick="loadMenu('seafood', this)">Seafood</div>
    <div class="menu-item" onclick="loadMenu('veggies', this)">Veggies</div>
    <div class="menu-item" onclick="loadMenu('noodles', this)">Noodles</div>
    <div class="menu-item" onclick="loadMenu('sides', this)">Sides</div>
    <div class="menu-item" onclick="loadMenu('drinks', this)">Drinks</div>
    <div class="menu-item" onclick="loadMenu('beers', this)">Beers</div>
</div>

<!-- MAIN -->
<div class="main">
    <h2 id="categoryTitle">BEEF</h2>
    <div class="cards" id="menu"></div>
</div>

<!-- RIGHT PANEL -->
<div class="details">
    <h2 id="name">Select Item</h2>
    <p class="price" id="price">₱0</p>
    <button class="btn">Add to Cart</button>
</div>

<script>

const menuData = {

beef:[
    {name:"Bulalo Grupo", price:710},
    {name:"Bulalo Solo", price:185},
    {name:"Bistek Tagalog", price:279}
],

pork:[
    {name:"Lechon Kawali", price:395},
    {name:"Pork Sisig", price:315},
    {name:"Lumpiang Shanghai", price:235}
],

chicken:[
    {name:"PapsChicken Platter", price:315},
    {name:"Chicken Sisig", price:295}
],

seafood:[
    {name:"Crispy Bangusarap", price:315},
    {name:"Calamares", price:305},
    {name:"Crispy Tawilis", price:285}
],

veggies:[
    {name:"Chop Suey", price:235},
    {name:"Tortang Talong", price:192}
],

noodles:[
    {name:"Canton-Bihon", price:278},
    {name:"Palabok", price:195},
    {name:"Beef Mami", price:159},
    {name:"Chicken Mami", price:149}
],

sides:[
    {name:"PapShots", price:72},
    {name:"Spicy Tofu", price:65},
    {name:"Bola Bola Soup", price:68},
    {name:"Lumpiang Shanghai (3pcs)", price:49},
    {name:"Fried Banana (4pcs)", price:35},
    {name:"Garlic Rice", price:46},
    {name:"Plain Rice", price:32}
],

drinks:[
    {name:"Special Turon", price:95},
    {name:"Leche Flan", price:82},
    {name:"Coffee Jelly", price:75},
    {name:"Softdrinks", price:52},
    {name:"Softdrinks 1.5L", price:145},
    {name:"Iced Tea", price:52},
    {name:"Iced Coffee", price:59},
    {name:"Hot Choco", price:55},
    {name:"Bottled Water", price:35}
],

beers:[
    {name:"San Mig Light", price:95},
    {name:"San Miguel Pale Pilsen", price:95},
    {name:"San Miguel Flavored", price:95},
    {name:"Red Horse", price:105}
]

};

function loadMenu(category, el){
    document.querySelectorAll(".menu-item").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");

    document.getElementById("categoryTitle").innerText = category.toUpperCase();

    const container = document.getElementById("menu");
    container.innerHTML = "";

    menuData[category].forEach(item=>{
        container.innerHTML += `
        <div class="card" onclick="selectItem('${item.name}', ${item.price})">
            <h3>${item.name}</h3>
            <p>₱${item.price}</p>
        </div>`;
    });
}

function selectItem(name, price){
    document.getElementById("name").innerText = name;
    document.getElementById("price").innerText = "₱" + price;
}

/* DEFAULT LOAD */
loadMenu('beef', document.querySelector('.menu-item'));

</script>

</body>
</html>
