<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO MENU</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

/* HEADER */
.header{
    background:#d71920;
    color:white;
    padding:12px;
    display:flex;
    align-items:center;
    gap:10px;
}

.back-btn{
    background:#ffcc00;
    border:none;
    padding:6px 12px;
    cursor:pointer;
    font-weight:bold;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 50px);
}

/* SIDEBAR (SMALLER) */
.sidebar{
    width:130px;
    background:#d71920;
    color:white;
    padding:10px;
    overflow-y:auto;
}

.sidebar h3{
    font-size:13px;
    margin-bottom:10px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    padding:8px;
    cursor:pointer;
    font-size:12px;
}

.sidebar li:hover{
    background:#ffcc00;
    color:black;
}

/* PRODUCTS */
.products{
    flex:1;
    padding:12px;
    overflow-y:auto;

    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

/* CARD (POSTER STYLE) */
.card{
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
    border:2px solid #f4c542;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

/* IMAGE (POSTER LOOK) */
.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    object-position:center;
    display:block;
}
/* NAME */
.card h4{
    margin:0;
    padding:8px;
    background:#ffcc00;
    text-align:center;
    font-size:14px;
    font-weight:bold;
}

/* PRICE */
.card p{
    margin:0;
    padding:8px;
    background:#d71920;
    color:white;
    text-align:center;
    font-size:13px;
    font-weight:bold;
}

/* ZOOM */
.zoom-modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.zoom-modal img{
    max-width:95%;
    max-height:90%;
    border-radius:10px;
}

.zoom-close{
    position:absolute;
    top:20px;
    right:20px;
    font-size:28px;
    color:white;
}

/* MOBILE */
@media(max-width:768px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        display:flex;
        overflow-x:auto;
    }

    .sidebar ul{
        display:flex;
        gap:10px;
    }

    .products{
        grid-template-columns:repeat(2,1fr);
    }

    .card img{
        height:220px;
    }
}
</style>
</head>

<body>

<div class="header">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <h2>MENU</h2>
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Category</h3>
        <ul>
            <li onclick="show('beef')">Beef</li>
            <li onclick="show('pork')">Pork</li>
            <li onclick="show('chicken')">Chicken</li>
            <li onclick="show('seafood')">Seafood</li>
            <li onclick="show('veggies')">Veggies</li>
            <li onclick="show('noodles')">Noodles</li>
            <li onclick="show('sides')">Sides</li>
            <li onclick="show('drinks')">Drinks</li>
            <li onclick="show('beers')">Beers</li>
        </ul>
    </div>

    <!-- PRODUCTS -->
    <div class="products" id="products"></div>

</div>

<!-- ZOOM -->
<div id="zoomModal" class="zoom-modal" onclick="closeZoom()">
    <span class="zoom-close">✖</span>
    <img id="zoomImg">
</div>

<script>
const data = {

beef:[
{name:"Bulalo Grupo",price:"₱710",img:"bulalogroup.jpg"},

],

],

veggies:[
{name:"Chop Suey",price:"₱235",img:"chopsuey.jpg"},
{name:"Tortang Talong",price:"₱192",img:"talong.jpg"}
],

noodles:[
{name:"Canton-Bihon",price:"₱278",img:"canton.jpg"},
{name:"Palabok",price:"₱195",img:"palabok.jpg"},

],

beers:[

{name:"San Miguel Pale",price:"₱95",img:"sanmig-pale.jpg"},
{name:"San Miguel Flavored",price:"₱95",img:"sanmig-flavored.jpg"},
{name:"Red Horse",price:"₱105",img:"redhorse.jpg"}
]

};

function show(cat){
    const container = document.getElementById("products");
    container.innerHTML="";

    data[cat].forEach(item=>{
        container.innerHTML += `
        <div class="card">
            <img src="${item.img}" onclick="openZoom('${item.img}')">
           <h4>${item.name || "Coming Soon"}</h4>
            <p>${item.price}</p>
        </div>`;
    });
}

/* ZOOM */
function openZoom(img){
    document.getElementById("zoomModal").style.display="flex";
    document.getElementById("zoomImg").src = img;
}

function closeZoom(){
    document.getElementById("zoomModal").style.display="none";
}

/* DEFAULT */
show('beef');
</script>

</body>
</html>
