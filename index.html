<!DOCTYPE html>
<html>
<head>
<title>Pappprito POS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
}

/* 🔥 HEADER */
.header{
    width:100%;
    background:linear-gradient(90deg,#d62828,#ffcc00);
    color:#fff;
    font-weight:bold;
    font-size:28px;
    padding:15px 20px;
    letter-spacing:2px;
    box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

/* MAIN LAYOUT WRAPPER */
.wrapper{
    display:flex;
    height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:linear-gradient(180deg,#d62828,#a4161a);
    color:#fff;
    padding:20px;
}

.menu-item{
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
}

.menu-item:hover{
    background:rgba(255,255,255,0.2);
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
    background:#f5f5f5;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

/* PRICE */
.price{
    display:inline-block;
    background:#ff0000;
    color:#fff;
    padding:5px 12px;
    border-radius:8px;
    font-weight:bold;
    margin-top:5px;
}

/* RIGHT PANEL */
.details{
    width:300px;
    background:#ffcc00;
    padding:20px;
    border-left:1px solid #ddd;
}

/* RUNNING LIGHT */
.preview-wrapper{
    position:relative;
    border-radius:12px;
    padding:4px;
    background:linear-gradient(90deg, red, orange, yellow, red);
    background-size:300% 300%;
    animation: moveLight 3s linear infinite;
}

.preview-wrapper img{
    width:100%;
    border-radius:10px;
}

/* ANIMATION */
@keyframes moveLight{
    0%{ background-position:0% 50%; }
    100%{ background-position:100% 50%; }
}
</style>

</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
    PAPPRITO
</div>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🍽 Menu</h2>
    <div class="menu-item" onclick="loadMenu('beef')">Beef</div>
    <div class="menu-item" onclick="loadMenu('pork')">Pork</div>
    <div class="menu-item" onclick="loadMenu('chicken')">Chicken</div>
    <div class="menu-item" onclick="loadMenu('seafood')">Seafood</div>
    <div class="menu-item" onclick="loadMenu('veggies')">Veggies</div>
    <div class="menu-item" onclick="loadMenu('noodles')">Noodles</div>
    <div class="menu-item" onclick="loadMenu('sides')">Sides</div>
    <div class="menu-item" onclick="loadMenu('drinks')">Drinks</div>
    <div class="menu-item" onclick="loadMenu('beers')">Beers</div>
</div>

<!-- MAIN -->
<div class="main">
    <h2 id="categoryTitle">Menu</h2>
    <div class="cards" id="menu"></div>
</div>

<!-- RIGHT PANEL -->
<div class="details">

    <div class="preview-wrapper">
        <img id="img" src="rapsilog.jpg">
    </div>

    <h2 id="name">Select Item</h2>
    <p class="price" id="price">₱0</p>

</div>

</div>

<script>

const menuData = {

beef:[
    {name:"Bulalo Grupo", price:710, img:"bulalogroup.jpg"},
    {name:"Bulalo Solo", price:185, img:"solobulalo.jpg"},
    {name:"Bistek Tagalog", price:279, img:"bistek.jpg"}
],

pork:[
    {name:"Lechon Kawali", price:395, img:"rapsilog.jpg"},
    {name:"Pork Sisig", price:315, img:"rapsilog.jpg"},
    {name:"Lumpiang Shanghai", price:235, img:"rapsilog.jpg"}
],

chicken:[
    {name:"PapsChicken Platter", price:315, img:"rapsilog.jpg"},
    {name:"Chicken Sisig", price:295, img:"rapsilog.jpg"}
]

};

function loadMenu(category){
    const container = document.getElementById("menu");
    const title = document.getElementById("categoryTitle");

    title.innerText = category.toUpperCase();
    container.innerHTML = "";

    menuData[category].forEach(item => {
        container.innerHTML += `
        <div class="card" onclick="selectItem('${item.name}', ${item.price}, '${item.img}')">
            <img src="${item.img}">
            <h3>${item.name}</h3>
            <p class="price">₱${item.price}</p>
        </div>
        `;
    });
}

function selectItem(name, price, img){
    document.getElementById("name").innerText = name;
    document.getElementById("price").innerText = "₱" + price;
    document.getElementById("img").src = img;
}

</script>

</body>
</html>
