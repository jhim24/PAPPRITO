<!DOCTYPE html>
<html>
<head>
<title>Pappprito Website</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#ffcc00;
    position:fixed;
    width:100%;
    z-index:10;
}

.navbar a{
    text-decoration:none;
    margin:0 10px;
    color:#000;
    font-weight:bold;
}

/* HERO */
.hero{
    height:100vh;
    background:url('rapsilog.jpg') center/cover;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:#fff;
    text-align:center;
}

.hero h1{
    font-size:50px;
    background:rgba(0,0,0,0.5);
    padding:10px 20px;
    border-radius:10px;
}

/* BUTTON */
.btn{
    margin-top:20px;
    padding:15px 30px;
    background:red;
    color:#fff;
    border:none;
    border-radius:30px;
    font-size:18px;
}

/* MENU */
.menu{
    padding:80px 20px;
    background:#f5f5f5;
    text-align:center;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:#fff;
    width:250px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
}

.card h3{
    margin:10px 0;
}

/* CONTACT */
.contact{
    padding:60px;
    text-align:center;
}

/* FOOTER */
.footer{
    background:#111;
    color:#fff;
    text-align:center;
    padding:20px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>Pappprito</b></div>
    <div>
        <a href="#">Home</a>
        <a href="#menu">Menu</a>
        <a href="#contact">Contact</a>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <h1>Masarap maging affordable</h1>
    <button class="btn">Order Now</button>
</section>

<!-- MENU -->
<section class="menu" id="menu">
    <h2>Our Menu</h2>

    <div class="cards">

        <div class="card">
            <img src="rapsilog.jpg">
            <h3>Rapsilog</h3>
            <p>₱85</p>
        </div>

        <div class="card">
            <img src="rapsilog.jpg">
            <h3>Chicken Meal</h3>
            <p>₱99</p>
        </div>

        <div class="card">
            <img src="rapsilog.jpg">
            <h3>Burger</h3>
            <p>₱79</p>
        </div>

    </div>
</section>

<!-- CONTACT -->
<section class="contact" id="contact">
    <h2>Contact Us</h2>
    <p>📞 0923-123-4567</p>
    <p>📍 Tagaytay City</p>
</section>

<!-- FOOTER -->
<div class="footer">
    © 2026 Pappprito Website
</div>

</body>
</html>
