<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO Branches</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#111;
    color:white;
}

/* HEADER */
.header{
    position:relative;
    background:#d71920;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* BACK BUTTON */
.back-btn{
    position:absolute;
    left:10px;
    top:10px;
    background:#ffcc00;
    border:none;
    padding:6px 12px;
    cursor:pointer;
    font-weight:bold;
    border-radius:6px;
    color:black;
    text-decoration:none;
}

/* GRID */
.branches{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

/* CARD */
.card{
    background:#1a1a1a;
    border-radius:12px;
    padding:15px;
    text-align:center;
    border:2px solid #ffcc00;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

/* TEXT */
.card h3{
    margin-bottom:10px;
    color:#ffcc00;
}

.card p{
    margin:5px 0;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:6px 12px;
    background:#d71920;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

/* MOBILE */
@media(max-width:768px){
    .branches{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back-btn">← Back</a>
    OUR BRANCHES
</div>

<div class="branches">

<div class="card">
<h3>Papprito Tagaytay</h3>
<p>Main Branch</p>
<p>📞 09123456789</p>
<a href="#" class="btn">View Map</a>
</div>

<div class="card">
<h3>Papprito Mahogany</h3>
<p>Branch</p>
<p>📞 0922-840-4799</p>
<a href="#" class="btn">View Map</a>
</div>

</div>

</body>
</html>
