<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO POS V3</title>
  
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#eef1f5;
height:100vh;
overflow:hidden;
}

/* TOPBAR */

.topbar{
height:70px;
background:#2f3b4f;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
color:white;
}

.logo{
font-size:28px;
font-weight:bold;
}

.search-box{
width:500px;
}

.search-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
}

/* MAIN */

.container{
display:flex;
height:calc(100vh - 70px);
}
.left{
order:1;
flex:1;
}

.right{
order:2;
width:420px;
}
/* LEFT */

.left{
flex:1;
padding:20px;
overflow:auto;
}

/* CATEGORY */

.categories{
display:flex;
gap:10px;
margin-bottom:20px;
overflow-x:auto;
}

.categories button{

display:flex;
align-items:center;
gap:8px;

padding:12px 22px;

border:none;

border-radius:30px;

background:white;

color:#2f3b4f;

font-weight:bold;

font-size:14px;

cursor:pointer;

box-shadow:0 3px 10px rgba(0,0,0,.08);

transition:.3s;

white-space:nowrap;

}

.categories button:hover{

background:#4a90e2;

color:white;

transform:translateY(-2px);

}

/* PRODUCTS */

.products-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.product-card{

background:#fff;

border-radius:18px;

overflow:hidden;

cursor:pointer;

border:1px solid #e5e7eb;

box-shadow:0 8px 20px rgba(0,0,0,.08);

transition:.25s;

display:flex;

flex-direction:column;

}

.product-card:hover{

transform:translateY(-6px);

box-shadow:0 15px 35px rgba(0,0,0,.18);

}
.product-card:hover{
transform:translateY(-5px);
}

.product-card img{

width:100%;

height:200px;

object-fit:cover;

background:#f3f4f6;

}

.product-name{

padding:15px 15px 5px;

font-size:18px;

font-weight:700;

color:#1f2937;

text-align:center;

min-height:55px;

}

.product-price{

padding:15px;

background:#4a90e2;

color:white;

font-size:22px;

font-weight:bold;

text-align:center;

}
/* RIGHT CART */

.right{
width:420px;
background:white;
border-left:1px solid #ddd;
display:flex;
flex-direction:column;
}

.cart-header{
background:#2f3b4f;
color:white;
padding:20px;
font-size:30px;
font-weight:bold;
}

.cart-body{
padding:20px;
flex:1;
overflow:auto;
}

.cart-body input,
.cart-body select{
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
}

.cart-items{
margin-top:15px;
}

.cart-item{
padding:12px;
border-bottom:1px solid #eee;
}

.total{
font-size:32px;
font-weight:bold;
margin-top:20px;
color:#4a90e2;
}

.checkout-btn{
width:100%;
padding:20px;
background:#4a90e2;
color:white;
border:none;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.container{
flex-direction:column;
}

.right{
width:100%;
height:45vh;
}

.products-grid{
grid-template-columns:
repeat(2,1fr);
}

.search-box{
width:200px;
}

}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo">

🍔 PAPPRITO POS

</div>

<div class="search-box">

<input
id="searchProduct"
type="text"
placeholder="🔍 Search Products...">

</div>

<div style="
display:flex;
align-items:center;
gap:20px;
font-size:15px;
">

<div id="liveClock">

00:00:00

</div>

<div>

<i class="fa-solid fa-user"></i>

ADMIN

</div>

</div>

</div>
<div style="
display:flex;
align-items:center;
gap:20px;
">

<div id="liveClock"
style="
font-weight:bold;
font-size:15px;
">
</div>

<div style="
display:flex;
align-items:center;
gap:8px;
">

<i class="fa-solid fa-user"></i>

<span>Cashier</span>

</div>

</div>

</div>

<!-- MAIN -->

<div class="container">

<!-- LEFT -->

<div class="left">

<!-- CATEGORY -->

<div
class="categories"
id="categories">

</div>

<hr style="
border:none;
border-top:1px solid #ddd;
margin:15px 0;
">

<h3 style="
margin-bottom:15px;
color:#2f3b4f;
">

🍽 MENU

</h3>

<div
class="products-grid"
id="productsGrid">

</div>
  
</div>

<!-- RIGHT -->
  
<div class="right">

<div class="cart-header">
DINE-IN
</div>

<div class="cart-body">
<div style="
background:#f8fafc;
padding:15px;
border-radius:12px;
margin-bottom:15px;
">

<h3 style="
margin-bottom:15px;
color:#2f3b4f;
">
🛒 Order Summary
</h3>

<div style="
display:flex;
gap:10px;
">

<div style="
flex:1;
background:white;
padding:10px;
border-radius:10px;
text-align:center;
">

<div style="font-size:12px">
ITEMS
</div>

<div id="summaryItems"
style="
font-size:22px;
font-weight:bold;
">
0
</div>

</div>

<div style="
flex:1;
background:white;
padding:10px;
border-radius:10px;
text-align:center;
">

<div style="font-size:12px">
QTY
</div>

<div id="summaryQty"
style="
font-size:22px;
font-weight:bold;
">
0
</div>

</div>

<div style="
flex:1;
background:white;
padding:10px;
border-radius:10px;
text-align:center;
">

<div style="font-size:12px">
TOTAL
</div>

<div id="summaryTotal"
style="
font-size:22px;
font-weight:bold;
color:#4a90e2;
">
₱0
</div>

</div>

</div>

</div>
<input
id="customerName"
placeholder="Customer Name">

<select id="tableNumber">
<option>Table 1</option>
<option>Table 2</option>
<option>Table 3</option>
</select>

<select id="orderType">
<option>DINE IN</option>
<option>TAKE OUT</option>
<option>DELIVERY</option>
</select>
<select id="paymentMode">
<option>CASH</option>
<option>GCASH</option>
<option>MAYA</option>
<option>CARD</option>
</select>

<input
id="referenceNumber"
placeholder="Reference Number">
<div
class="cart-items"
id="cartItems">

</div>

<div
class="total"
id="total">

₱0

</div>

</div>

<button class="checkout-btn">

PROCEED TO KITCHEN

</button>

</div>

</div>
<script>

const firebaseConfig={
apiKey:"AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",
authDomain:"papprito-orders.firebaseapp.com",
databaseURL:"https://papprito-orders-default-rtdb.firebaseio.com",
projectId:"papprito-orders",
storageBucket:"papprito-orders.firebasestorage.app",
messagingSenderId:"831941801424",
appId:"1:831941801424:web:40a99cdfb312dac2d275d5"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let cart=[];
let allProducts=[];

/* LOAD PRODUCTS */

db.ref("products")
.on("value",snapshot=>{

const productsData=snapshot.val();

if(!productsData) return;

allProducts=[];

let categories=[];

Object.keys(productsData)
.forEach(key=>{

const product=productsData[key];

allProducts.push(product);

if(
product.category &&
!categories.includes(product.category)
){
categories.push(product.category);
}

});

renderCategories(categories);

showCategory("ALL");

});

/* CATEGORIES */

function renderCategories(categories){

let html=`

<button onclick="showCategory('ALL')">

🍽 ALL

</button>

`;

categories.forEach(cat=>{

let icon="🍽";

if(cat.toLowerCase().includes("coffee")) icon="☕";
else if(cat.toLowerCase().includes("burger")) icon="🍔";
else if(cat.toLowerCase().includes("drink")) icon="🥤";
else if(cat.toLowerCase().includes("dessert")) icon="🍰";
else if(cat.toLowerCase().includes("rice")) icon="🍛";
else if(cat.toLowerCase().includes("meal")) icon="🍽";

html+=`

<button onclick="showCategory('${cat}')">

${icon}

${cat}

</button>

`;
});

document.getElementById(
"categories"
).innerHTML=html;

}

/* SHOW PRODUCTS */

function showCategory(category){

let html="";

let products=allProducts;

if(category!=="ALL"){

products=
allProducts.filter(
item=>item.category===category
);

}

products.forEach(product=>{

html+=`

<div
class="product-card"
onclick="addToCart(
'${(product.name||"").replace(/'/g,"")}',
${product.price||0}
)">

<img src="${product.image||''}">

<div style="padding:15px;">

<h3 style="
font-size:18px;
margin-bottom:8px;
color:#2f3b4f;
">

${product.name||''}

</h3>

<div style="
font-size:13px;
color:#888;
margin-bottom:10px;
">

${product.category||''}

</div>

<div style="
display:flex;
justify-content:space-between;
align-items:center;
">

<b style="
font-size:24px;
color:#4a90e2;
">

₱${product.price||0}

</b>

<button style="
background:#4a90e2;
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
">

+ ADD

</button>

</div>

</div>

</div>

`;
});

document.getElementById(
"productsGrid"
).innerHTML=html;

}

/* ADD TO CART */

function addToCart(name,price){

const existing=
cart.find(
item=>item.name===name
);

if(existing){

existing.qty++;

}else{

cart.push({
name:name,
price:Number(price),
qty:1
});

}

renderCart();

}

/* RENDER CART */

function renderCart(){

let total=0;

let html=`

<table style="
width:100%;
border-collapse:collapse;
">

<thead>

<tr style="
background:#4a90e2;
color:white;
">

<th style="padding:8px;">SN</th>

<th style="padding:8px;">ITEM</th>

<th style="padding:8px;">QTY</th>

<th style="padding:8px;">AMOUNT</th>

<th style="padding:8px;">ACTION</th>

</tr>

</thead>

<tbody>

`;

cart.forEach((item,index)=>{

total += item.price * item.qty;

html += `

<tr>

<td style="text-align:center;padding:8px;">
${index+1}
</td>

<td style="padding:8px;">
${item.name}
</td>

<td style="text-align:center;">

<button
onclick="decreaseQty(${index})"
style="
width:28px;
height:28px;
border:none;
background:#ff9800;
color:white;
border-radius:6px;
cursor:pointer;
">

-

</button>

<b style="margin:0 8px;">
${item.qty}
</b>

<button
onclick="increaseQty(${index})"
style="
width:28px;
height:28px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
">

+

</button>

</td>

<td style="text-align:right;padding-right:10px;">

₱${item.price * item.qty}

</td>

<td style="text-align:center;">

<button
onclick="removeItem(${index})"
style="
background:#e53935;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
">

🗑

</button>

</td>

</tr>

`;

});
html += `
</tbody>
</table>
`;
document.getElementById(
"cartItems"
).innerHTML=html;

document.getElementById(
"total"
).innerText=
"₱"+total;

let qty=0;

cart.forEach(item=>{
qty+=item.qty;
});

document.getElementById(
"summaryItems"
).innerText=
cart.length;

document.getElementById(
"summaryQty"
).innerText=
qty;

document.getElementById(
"summaryTotal"
).innerText=
"₱"+total;
}

/* DELETE */

function removeItem(index){

cart.splice(index,1);

renderCart();

}
  function increaseQty(index){

cart[index].qty++;

renderCart();

}

function decreaseQty(index){

if(cart[index].qty>1){

cart[index].qty--;

}else{

cart.splice(index,1);

}

renderCart();

}
setInterval(()=>{

document.getElementById(
"liveClock"
).innerHTML=
new Date().toLocaleTimeString();

},1000);
  
</script>
</body>
</html>
