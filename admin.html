<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - PAPPRITO</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#ffffff10;
    padding:20px;
    border-radius:10px;
}

h1{
    text-align:center;
}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#ffcc00;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

img{
    margin-top:10px;
    border-radius:5px;
}

.product{
    background:#00000050;
    margin-top:10px;
    padding:10px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔐 Admin Panel</h1>

<h3>Add Product</h3>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">

<select id="category">
    <option value="beef">Beef</option>
    <option value="pork">Pork</option>
    <option value="chicken">Chicken</option>
    <option value="seafood">Seafood</option>
    <option value="veggies">Veggies</option>
    <option value="noodles">Noodles</option>
    <option value="sides">Sides</option>
    <option value="drinks">Drinks</option>
    <option value="beers">Beers</option>
</select>

<input type="file" id="imageFile">
<img id="preview" style="width:100px; display:none;">

<button onclick="addProduct()">Add Product</button>

<h3>📦 Products</h3>
<div id="list"></div>

</div>

<script>
let uploadedImage = "";

// LOAD IMAGE PREVIEW
document.getElementById("imageFile").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(){
        uploadedImage = reader.result;
        document.getElementById("preview").src = uploadedImage;
        document.getElementById("preview").style.display = "block";
    };

    if(file){
        reader.readAsDataURL(file);
    }
});

// ADD PRODUCT
function addProduct(){
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let category = document.getElementById("category").value;

    if(!name || !price || !uploadedImage){
        alert("Fill all fields!");
        return;
    }

    let data = JSON.parse(localStorage.getItem("menuData")) || {};

    if(!data[category]) data[category] = [];

    data[category].push({
        name:name,
        price:price,
        img:uploadedImage
    });

    localStorage.setItem("menuData", JSON.stringify(data));

    alert("Product added!");

    document.getElementById("name").value="";
    document.getElementById("price").value="";
    document.getElementById("preview").style.display="none";

    loadProducts();
}

// LOAD PRODUCTS
function loadProducts(){
    let data = JSON.parse(localStorage.getItem("menuData")) || {};
    let container = document.getElementById("list");
    container.innerHTML="";

    for(let cat in data){
        data[cat].forEach((item,index)=>{
            container.innerHTML += `
            <div class="product">
                <b>${item.name}</b><br>
                ₱${item.price}<br>
                <img src="${item.img}" width="80"><br>

                <button onclick="editProduct('${cat}',${index})">Edit</button>
                <button onclick="deleteProduct('${cat}',${index})">Delete</button>
            </div>
            `;
        });
    }
}

// DELETE
function deleteProduct(cat,index){
    let data = JSON.parse(localStorage.getItem("menuData"));

    data[cat].splice(index,1);

    localStorage.setItem("menuData", JSON.stringify(data));
    loadProducts();
}

// EDIT
function editProduct(cat,index){
    let data = JSON.parse(localStorage.getItem("menuData"));
    let item = data[cat][index];

    document.getElementById("name").value = item.name;
    document.getElementById("price").value = item.price;

    uploadedImage = item.img;
    document.getElementById("preview").src = item.img;
    document.getElementById("preview").style.display="block";

    data[cat].splice(index,1);
    localStorage.setItem("menuData", JSON.stringify(data));

    loadProducts();
}

// INITIAL LOAD
loadProducts();
</script>

</body>
</html>
