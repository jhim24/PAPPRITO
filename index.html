<!DOCTYPE html>
<html>
<head>
<title>PAPAPRITO POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* 🔥 HEADER */
.header{
    background:#d62828;
    color:#fff;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    padding:15px;
    letter-spacing:2px;
}

/* LAYOUT */
.container{
    flex:1;
    display:flex;
}

/* 🔥 SIDEBAR */
.sidebar{
    width:150px;
    background:#111;
    color:#fff;
    padding:10px;
}

.menu-item{
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.menu-item:hover{
    background:#ffcc00;
    color:#000;
}

/* MAIN */
.main{
    flex:1;
    padding:15px;
    background:#f5f5f5;
}

/* GRID */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
}

/* 🔥 CARD */
.card{
    background:#fff;
    padding:10px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    border:2px solid #ffcc00;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    border-color:red;
}

.card img{
    width:100%;
    height:100px;
    object-fit:cover;
    border-radius:8px;
}

/* 🟡 PRODUCT NAME */
.card h3{
    background:#ffcc00;
    padding:5px;
    border-radius:6px;
    font-size:14px;
    margin-top:8px;
}

/* 🔴 PRICE */
.price{
    background:red;
    color:#fff;
    padding:4px 10px;
    border-radius:6px;
    display:inline-block;
    margin-top:5px;
    font-weight:bold;
}

/* 🔥 RIGHT PANEL */
.details{
    width:260px;
    padding:15px;
    background:linear-gradient(180deg,#fff,#ffe5e5);
    box-shadow:-5px 0 20px rgba(255,0,0,0.2);
}

.details img{
    width:100%;
    border-radius:10px;
}

/* 🔥 GLOW EFFECT */
.details .price{
    box-shadow:0 0 15px red;
    font-size:20px;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    background:#ff9f1c;
    border:none;
    color:#fff;
    border-radius:8px;
    margin-top:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">PAPAPRITO</div>

<div class="container">

<!-- 🔥 SIDEBAR -->
<div class="sidebar">
    <div class="menu-item" onclick="loadMenu('beef')">Beef</div>
    <div class="menu-item" onclick="loadMenu('pork')">Pork</div>
    <div class="menu-item" onclick="loadMenu('chicken')">Chicken</div>
    <div class="menu-item" onclick="loadMenu('seafood')">Seafood</div>
    <div class="menu-item" onclick="loadMenu('veggies')">Veggies</div>
    <div class="menu-item" onclick="loadMenu('noodles')">Noodles</div>
    <div class="menu-item" onclick="loadMenu('sides')">Sides</div>
    <div class="menu-item" onclick="loadMenu('drinks')">Drinks</div>
    <div class="menu-item" onclick="loadMenu('beers')">Beers</div>
</div>

<!-- 🔥 MAIN -->
<div class="main">
    <div class="cards" id="menu"></div>
</div>

<!-- 🔥 RIGHT PANEL -->
<div class="details">
    <img id="img" src="rapsilog.jpg">
    <h2 id="name">Select Item</h2>
    <p class="price" id="price">₱0</p>
    <button class="btn">Add to Cart</button>
</div>

</div>

<script>

const menuData = {

beef:[
{name:"Bulalo Grupo",price:710,img:"bulalogroup.jpg"},
{name:"Bulalo Solo",price:185,img:"solobulalo.jpg"},
{name:"Bistek Tagalog",price:279,img:"bistek.jpg"}
],

pork:[
{name:"Lechon Kawali",price:395,img:"rapsilog.jpg"},
{name:"Pork Sisig",price:315,img:"rapsilog.jpg"},
{name:"Lumpiang Shanghai",price:235,img:"rapsilog.jpg"}
],

chicken:[
{name:"PapsChicken Platter",price:315,img:"rapsilog.jpg"},
{name:"Chicken Sisig",price:295,img:"rapsilog.jpg"}
],

seafood:[
{name:"Crispy Bangusarap",price:315,img:"rapsilog.jpg"},
{name:"Calamares",price:305,img:"rapsilog.jpg"},
{name:"Crispy Tawilis",price:285,img:"rapsilog.jpg"}
],

veggies:[
{name:"Chop Suey",price:235,img:"rapsilog.jpg"},
{name:"Tortang Talong",price:192,img:"rapsilog.jpg"}
],

noodles:[
{name:"Canton-Bihon",price:278,img:"rapsilog.jpg"},
{name:"Palabok",price:195,img:"rapsilog.jpg"},
{name:"Beef Mami",price:159,img:"rapsilog.jpg"},
{name:"Chicken Mami",price:149,img:"rapsilog.jpg"}
],

sides:[
{name:"PapShots",price:72,img:"rapsilog.jpg"},
{name:"Spicy Tofu",price:65,img:"rapsilog.jpg"},
{name:"Bola-Bola Soup",price:68,img:"rapsilog.jpg"},
{name:"Lumpiang Shanghai (3pcs)",price:49,img:"rapsilog.jpg"},
{name:"Fried Banana",price:35,img:"rapsilog.jpg"},
{name:"Garlic Rice",price:46,img:"rapsilog.jpg"},
{name:"Plain Rice",price:32,img:"rapsilog.jpg"}
],

drinks:[
{name:"Special Turon",price:95,img:"rapsilog.jpg"},
{name:"Leche Flan",price:82,img:"rapsilog.jpg"},
{name:"Coffee Jelly",price:75,img:"rapsilog.jpg"},
{name:"Softdrinks",price:52,img:"rapsilog.jpg"},
{name:"Iced Tea",price:52,img:"rapsilog.jpg"}
],

beers:[
{name:"San Mig Light",price:95,img:"rapsilog.jpg"},
{name:"Red Horse",price:105,img:"rapsilog.jpg"}
]

};

function loadMenu(category){
    let container = document.getElementById("menu");
    container.innerHTML = "";

    menuData[category].forEach(item=>{
        container.innerHTML += `
        <div class="card" onclick="selectItem('${item.name}',${item.price},'${item.img}')">
            <img src="${item.img}">
            <h3>${item.name}</h3>
            <p class="price">₱${item.price}</p>
        </div>
        `;
    });
}

function selectItem(name,price,img){
    document.getElementById("name").innerText = name;
    document.getElementById("price").innerText = "₱"+price;
    document.getElementById("img").src = img;
}

</script>

</body>
</html>
