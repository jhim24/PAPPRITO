<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PAPPRITO LIVE ORDERS</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

h1{
margin-bottom:20px;
}

.order{
background:#1a1a1a;

padding:20px;

border-radius:15px;

margin-bottom:15px;

border-left:5px solid #ffcc00;
}

.item{
margin:5px 0;
}

.total{
color:#ffcc00;
font-weight:bold;
margin-top:10px;
}

.time{
color:#999;
margin-top:10px;
font-size:13px;
}

.status{
background:#d71920;
display:inline-block;

padding:5px 12px;

border-radius:20px;

margin-top:10px;
}
  /* ACTION BUTTONS */
.actions{
margin-top:12px;

display:flex;
gap:8px;
flex-wrap:wrap;
}

.actions button{
border:none;

padding:6px 12px;

border-radius:20px;

font-size:11px;

cursor:pointer;

font-weight:bold;
}

/* ACCEPT */
.accept-btn{
background:#28a745;
color:white;
}

/* PREPARING */
.preparing-btn{
background:#ff9800;
color:white;
}

/* READY */
.ready-btn{
background:#2196f3;
color:white;
}

/* DELIVERED */
.done-btn{
background:#777;
color:white;
}
  /* DELETE */
.delete-btn{
background:#ff3b3b;
color:white;
}
  /* TABLE DESIGN */
.order table{
margin-top:12px;
width:100%;

border-collapse:collapse;
border:1px solid #444;
font-size:12px;
}

.order th{
background:#d71920;

color:white;

padding:8px;

font-size:12px;

border:1px solid #666;
}

.order td{
padding:7px;

border:1px solid #444;

text-align:center;

font-size:11px;
}

/* SMALL ORDER CARD */
.order{
padding:15px;
border-radius:12px;
}

/* SMALL TITLE */
.order h3{
font-size:15px;
margin-bottom:5px;
}

/* TOTAL */
.total{
font-size:13px;
}

/* TIME */
.time{
font-size:11px;
}

/* STATUS */
.status{
font-size:10px;

padding:4px 10px;

margin-top:8px;
}

</style>

</head>

<body>

<h1>
🍔 PAPPRITO LIVE ORDERS
</h1>

<div id="orders"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain: "papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId: "papprito-orders",

storageBucket:
"papprito-orders.firebasestorage.app",

messagingSenderId: "831941801424",

appId:
"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

const ordersDiv =
document.getElementById("orders");

/* LIVE ORDERS */
firebase.database()
.ref("orders")
.on("value", snapshot=>{
document.getElementById("notifySound")
.play();
ordersDiv.innerHTML = "";

snapshot.forEach(child=>{
const orderId = child.key.slice(-5);
const order = child.val();
const orderKey = child.key;
let rows = "";

order.items.forEach(item=>{

rows += `

<tr>

<td>${item.name}</td>

<td>1</td>

<td>₱${item.price}</td>

</tr>

`;

});

ordersDiv.innerHTML = `

<div class="order">

<h3>
🧾 Order #${orderId}
</h3>

<table
width="100%"
border="0"
cellpadding="10"
style="
border-collapse:collapse;
margin-top:15px;
">

<tr style="
background:#d71920;
color:white;
">

<th>Product</th>
<th>Qty</th>
<th>Amount</th>

</tr>

${rows}

</table>

<div class="total">

Total: ₱${order.total}

</div>

<div class="time">

${order.createdAt}

</div>

<div class="status">

${order.status}

</div>
<div class="actions">

<button class="accept-btn"

onclick="
updateStatus(
'${orderKey}',
'ACCEPTED'
)">

ACCEPT

</button>

<button class="preparing-btn"

onclick="
updateStatus(
'${orderKey}',
'PREPARING'
)">

PREPARING

</button>

<button class="ready-btn"

onclick="
updateStatus(
'${orderKey}',
'READY'
)">

READY

</button>

<button class="done-btn"

onclick="
updateStatus(
'${orderKey}',
'DELIVERED'
)">

DONE
<button class="delete-btn"

onclick="
deleteOrder(
'${orderKey}'
)">

DELETE

</button>

</div>
</div>

` + ordersDiv.innerHTML;

});

});
/* UPDATE STATUS */
function updateStatus(orderKey,status){

firebase.database()
.ref("orders/" + orderKey)
.update({

status: status

});

}
  /* DELETE ORDER */
function deleteOrder(orderKey){

if(confirm("Delete this order?")){

firebase.database()
.ref("orders/" + orderKey)
.remove();

}

}
</script>
<audio id="notifySound">

<source
src="https://www.soundjay.com/buttons/sounds/button-3.mp3"
type="audio/mpeg">

</audio>
</body>
</html>
