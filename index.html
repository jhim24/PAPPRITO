<!DOCTYPE html>
<html>
<head>
<title>Pappprito POS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#fff;
    border-right:1px solid #ddd;
    padding:20px;
}

.sidebar h2{
    color:#d62828;
}

.menu-item{
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
}

.menu-item:hover{
    background:#ffe5e5;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
    background:#f5f5f5;
}

/* GRID */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#fff;
    padding:15px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card:hover{
    transform:scale(1.05);
}

/* RIGHT PANEL */
.details{
    width:300px;
    background:#fff;
    padding:20px;
    border-left:1px solid #ddd;
}

.price{
    color:#d62828;
    font-size:22px;
    font-weight:bold;
}

/* BUTTON */
.btn{
    width:100%;
    padding:15px;
    background:#ff9f1c;
    border:none;
    color:#fff;
    border-radius:10px;
    margin-top:20px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🍽 Menu</h2>
    <div class="menu-item" onclick="loadMenu('beef')">Beef</div>
    <div class="menu-item" onclick="loadMenu('pork')">Pork</div>
    <div class="menu-item" onclick="loadMenu('chicken')">Chicken</div>
    <div class="menu-item" onclick="loadMenu('seafood')">Seafood</div>
    <div class="menu-item" onclick="loadMenu('veggies')">Veggies</div>
    <div class="menu-item" onclick="loadMenu('noodles')">Noodles</div>
    <div class="menu-item" onclick="loadMenu('sides')">Sides</div>
    <div class="menu-item" onclick="loadMenu('drinks')">Drinks</div>
    <div class="menu-item" onclick="loadMenu('beers')">Beers</div>
</div>

<!-- MAIN -->
<div class="main">
    <h2 id="categoryTitle">Menu</h2>
    <div class="cards" id="menu"></div>
</div>

<!-- RIGHT PANEL -->
<div class="details">
    <h2 id="name">Select Item</h2>
    <p class="price" id="price">₱0</p>
    <button class="btn">Add to Cart</button>
</div>

<script>

const menuData = {

beef:[
    {name:"Bulalo Grupo", price:710},
    {name:"Bulalo Solo", price:185},
    {name:"Bistek Tagalog", price:279}
],

pork:[
    {name:"Lechon Kawali", price:395},
    {name:"Pork Sisig", price:315},
    {name:"Lumpiang Shanghai", price:235}
],

chicken:[
    {name:"PapsChicken Platter", price:315},
    {name:"Chicken Sisig", price:295}
],

seafood:[
    {name:"Crispy Bangusarap", price:315},
    {name:"Calamares", price:305},
    {name:"Crispy Tawilis", price:285}
],

veggies:[
    {name:"Chop Suey", price:235},
    {name:"Tortang Talong", price:192}
],

noodles:[
    {name:"Canton-Bihon", price:278},
    {name:"Palabok", price:195},
    {name:"Beef Mami", price:159},
    {name:"Chicken Mami", price:149}
],

sides:[
    {name:"PapShots", price:72},
    {name:"Spicy Tofu", price:65},
    {name:"Bola Bola Soup", price:68},
    {name:"Lumpiang Shanghai (3pcs)", price:49},
    {name:"Fried Banana (4pcs)", price:35},
    {name:"Garlic Rice", price:46},
    {name:"Plain Rice", price:32}
],

drinks:[
    {name:"Special Turon", price:95},
    {name:"Leche Flan", price:82},
    {name:"Coffee Jelly", price:75},
    {name:"Softdrinks", price:52},
    {name:"Softdrinks 1.5L", price:145},
    {name:"Iced Tea", price:52},
    {name:"Iced Coffee", price:59},
    {name:"Hot Choco", price:55},
    {name:"Bottled Water", price:35}
],

beers:[
    {name:"San Mig Light", price:95},
    {name:"San Miguel Pale Pilsen", price:95},
    {name:"San Miguel Flavored", price:95},
    {name:"Red Horse", price:105}
]

};

function loadMenu(category){
    const container = document.getElementById("menu");
    const title = document.getElementById("categoryTitle");

    title.innerText = category.toUpperCase();

    container.innerHTML = "";

    menuData[category].forEach(item => {
        container.innerHTML += `
        <div class="card" onclick="selectItem('${item.name}', ${item.price})">
            <h3>${item.name}</h3>
            <p>₱${item.price}</p>
        </div>
        `;
    });
}

function selectItem(name, price){
    document.getElementById("name").innerText = name;
    document.getElementById("price").innerText = "₱" + price;
}

</script>

</body>
</html>
