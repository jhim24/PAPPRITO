<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPPRITO Menu</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#111;
    color:black;
}

/* HEADER */
.header{
    background:#d71920;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

/* LAYOUT */
.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:120px;
    background:#d71920;
    color:white;
    padding:10px;
}

.sidebar div{
    padding:10px;
    cursor:pointer;
}

.sidebar div:hover{
    background:#ffcc00;
    color:black;
}

/* CONTENT */
.content{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

/* MENU BOX */
.box{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    border:3px solid #ffcc00;
}

.box h3{
    margin-top:0;
}

/* ITEM */
.item{
    display:flex;
    justify-content:space-between;
    padding:5px 0;
    border-bottom:1px dashed #ccc;
}
</style>
</head>

<body>

<div class="header">PAPPRITO MENU</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div onclick="show('beef')">Beef</div>
        <div onclick="show('pork')">Pork</div>
        <div onclick="show('chicken')">Chicken</div>
        <div onclick="show('seafood')">Seafood</div>
        <div onclick="show('veggies')">Veggies</div>
        <div onclick="show('noodles')">Noodles</div>
        <div onclick="show('sides')">Sides</div>
        <div onclick="show('drinks')">Drinks</div>
        <div onclick="show('beers')">Beers</div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content"></div>

</div>

<script>
let menu = {

beef:[
["Bulalo Grupo","₱710"],
["Bulalo Solo","₱185"],
["Bistek Tagalog","₱279"]
],

pork:[
["Lechon Kawali","₱395"],
["Pork Sisig","₱315"],
["Lumpiang Shanghai","₱235"]
],

chicken:[
["PapsChicken Platter","₱315"],
["Chicken Sisig","₱295"]
],

seafood:[
["Crispy Bangusarap","₱315"],
["Calamares","₱305"],
["Crispy Tawilis","₱285"]
],

veggies:[
["Chop Suey","₱235"],
["Tortang Talong","₱192"]
],

noodles:[
["Canton-Bihon","₱278"],
["Palabok","₱195"],
["Beef Mami","₱159"],
["Chicken Mami","₱149"]
],

sides:[
["PapShots","₱72"],
["Spicy Tofu","₱65"],
["Bola Bola Soup","₱68"],
["Lumpiang Shanghai","₱49"],
["Fried Banana","₱35"],
["Garlic Rice","₱46"],
["Plain Rice","₱32"]
],

drinks:[
["Softdrinks","₱52"],
["1.5L Softdrinks","₱145"],
["Iced Tea","₱52"],
["Black Gulaman","₱52"],
["Pineapple Juice","₱62"],
["Calamansi Juice","₱62"],
["Iced Coffee","₱59"],
["Hot Choco","₱55"],
["Water","₱35"]
],

beers:[
["San Mig Light","₱95"],
["San Miguel Pale","₱95"],
["San Miguel Flavored","₱95"],
["Red Horse","₱105"]
]

};

function show(cat){
    let html = `<div class="box"><h3>${cat.toUpperCase()}</h3>`;
    
    menu[cat].forEach(item=>{
        html += `<div class="item">
                    <span>${item[0]}</span>
                    <span>${item[1]}</span>
                 </div>`;
    });

    html += `</div>`;
    document.getElementById("content").innerHTML = html;
}

show('beef');
</script>

</body>
</html>
